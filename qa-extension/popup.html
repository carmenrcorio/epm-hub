<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:420px;min-height:200px;max-height:600px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F1F32;color:#C8DFF0;overflow-y:auto}
body::-webkit-scrollbar{width:4px}body::-webkit-scrollbar-thumb{background:#2D5480;border-radius:2px}
.header{background:#091420;padding:12px 14px;border-bottom:1px solid #1A3050;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.logo{font-size:13px;font-weight:800;color:#EAF3FF}.logo span{color:#3A9EFF}
.header-sub{font-size:10px;color:#3A6080;flex:1}
.run-btn{padding:6px 14px;background:#3A9EFF;border:none;border-radius:5px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.run-btn:hover{background:#1769FF}
.run-btn:disabled{background:#1A3050;color:#3A5878;cursor:not-allowed}
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:32px;color:#3A6080;font-size:12px}
.spin{width:18px;height:18px;border:2px solid #1A3050;border-top-color:#3A9EFF;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:24px 16px;color:#3A6080;font-size:12px;line-height:1.8}
.empty strong{color:#C8DFF0}
.score-bar{padding:12px 14px;background:#091420;border-bottom:1px solid #1A3050;display:flex;align-items:center;gap:12px}
.score-ring{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;border:3px solid}
.score-details{flex:1}
.score-name{font-size:13px;font-weight:700;color:#EAF3FF}
.score-sub{font-size:11px;color:#3A6080;margin-top:2px}
.section{border-bottom:1px solid #1A3050}
.section-hdr{padding:9px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.section-hdr:hover{background:#091420}
.section-ico{font-size:13px;flex-shrink:0}
.section-title{font-size:11px;font-weight:700;color:#C8DFF0;flex:1}
.section-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px}
.badge-ok{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.badge-warn{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.badge-err{background:#EF444418;color:#EF4444;border:1px solid #EF444433}
.badge-info{background:#3A9EFF18;color:#70B8FF;border:1px solid #3A9EFF33}
.section-chevron{font-size:10px;color:#3A6080;transition:transform .15s}
.section-chevron.open{transform:rotate(90deg)}
.section-body{padding:0 14px 12px;display:none}
.section-body.open{display:block}
.row{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid #0D1E3344;font-size:11px}
.row:last-child{border:none}
.row-label{color:#3A6080;min-width:120px;flex-shrink:0;font-weight:600}
.row-val{color:#C8DFF0;flex:1;line-height:1.5}
.row-val.ok{color:#10B981}.row-val.warn{color:#F59E0B}.row-val.err{color:#EF4444}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.stat{background:#091420;border:1px solid #1A3050;border-radius:6px;padding:8px 10px;text-align:center}
.stat-n{font-size:18px;font-weight:800;color:#3A9EFF}
.stat-l{font-size:9px;color:#3A6080;margin-top:2px}
.tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;margin:2px;background:#1A3050;color:#7AAACA}
.tag.custom{background:#A78BFA18;color:#A78BFA;border:1px solid #A78BFA33}
.tag.new{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.tag.warn{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.tag.err{background:#EF444418;color:#EF4444;border:1px solid #EF444433}
.suggestion-row{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid #0D1E3344;font-size:11px;color:#C8DFF0;line-height:1.55}
.suggestion-row:last-child{border:none}
.suggestion-row::before{content:'💡';font-size:11px;flex-shrink:0;margin-top:1px}
.issue-row{display:flex;gap:8px;align-items:flex-start;padding:5px 0;font-size:11px;color:#F59E0B;line-height:1.5}
.issue-row.err{color:#EF4444}
.issue-row::before{content:'⚠';font-size:10px;flex-shrink:0;margin-top:1px}
.issue-row.err::before{content:'✗'}
.tabs-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:2px}
.tab-item{background:#091420;border-radius:5px;padding:6px 8px;text-align:center;border:1px solid}
.tab-item.ok{border-color:#10B98130;color:#10B981}
.tab-item.soon{border-color:#1A3050;color:#3A6080}
.tab-item.err{border-color:#EF444430;color:#EF4444}
.tab-name{font-size:10px;font-weight:700}
.tab-status{font-size:9px;margin-top:1px;opacity:.8}
.ts{font-size:10px;color:#3A6080;padding:8px 0 4px}
.copy-btn{display:block;width:100%;margin-top:8px;padding:7px;background:#1A3050;border:1px solid #2D5480;border-radius:5px;color:#7AAACA;font-size:11px;font-weight:600;cursor:pointer;text-align:center}
.copy-btn:hover{background:#243F60;color:#C8DFF0}
.debug{background:#091420;border:1px solid #1A3050;border-radius:5px;padding:8px 10px;font-size:10px;color:#3A6080;margin:8px 0;line-height:1.6;font-family:monospace}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="logo">1<span>P</span> EPM Hub QA</div>
    <div class="header-sub" id="page-url">Loading…</div>
  </div>
  <button class="run-btn" id="runBtn" onclick="runQA()">▶ Run QA</button>
</div>
<div id="content">
  <div class="empty">
    <strong>How to use:</strong><br/>
    1. Open your EPM Hub in a tab<br/>
    2. Click that tab so it's active<br/>
    3. Click <strong>▶ Run QA</strong> above<br/><br/>
    Works on: epm-hub.vercel.app and localhost
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
