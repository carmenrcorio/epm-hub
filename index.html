'ai-ml':{
  emoji:'🤖',name:'AI & Machine Learning',color:'#A855F7',
  hook:'AI has created the most dangerous new credential attack surface in enterprise history — and most organizations have no governance model for it whatsoever. Every AI tool your team uses requires an API key. Every AI agent you build needs credentials to function. Every developer using GitHub Copilot, Cursor, or Claude has an access token that IT doesn\'t know about. The "shadow AI" problem is the shadow IT problem, but the credentials are worth more and the blast radius is larger.',
  credential_inv:'OpenAI / Azure OpenAI API keys (GPT-4, o1, o3 access) · Anthropic API keys (Claude) · Google Gemini API credentials · Cohere, Mistral, Hugging Face access tokens · GitHub Copilot / Cursor / Codeium tokens · AI image generation API keys (Midjourney, Stability AI, DALL-E) · Vector database credentials (Pinecone, Weaviate, Qdrant, Chroma) · Model serving infrastructure (AWS SageMaker, Azure ML, GCP Vertex AI) · Fine-tuning dataset storage access (S3 buckets, GCS, Azure Blob) · AI agent tool credentials (the CRM, database, email, and Slack access your AI agents use to take actions) · LangChain / LlamaIndex framework configuration secrets · Embedding model API keys',
  pains:['AI API keys (OpenAI, Anthropic, Cohere) hardcoded in notebooks, committed to git repos, or pasted into Slack — each one capable of running up six-figure API bills or accessing sensitive model outputs if compromised','No governance model for AI agent credentials — when your AI agent needs to call Salesforce, query your database, or send an email, where do those credentials live? Most teams answer "in the code" or "in an env file"','Shadow AI explosion: engineers, marketers, and analysts signing up for GPT-4, Midjourney, and Perplexity with company email addresses, creating unmanaged credential accounts outside IT visibility — and outside the Domain Breach Report unless 1Password is watching','AI tool sprawl: the average enterprise now uses 40+ AI tools, each requiring its own API key or OAuth token, none of which are centrally governed','Prompt injection risk: if an AI agent processes documents or emails that contain credential-like strings, it could exfiltrate them — 1Password means real credentials are never in plaintext contexts that AI models could process or leak','EU AI Act and emerging AI governance frameworks are beginning to require auditability of AI system access controls — "who authorized this AI to have these credentials" is a compliance question that is coming'],
  features:[
    {fid:'cli',tag:'AI SECRETS',tc:'#A855F7',bc:'#7C3AED18',why:'Inject AI API keys (OpenAI, Anthropic, Cohere) into model serving code at runtime via op:// references. The API key never exists in plaintext anywhere the model can reach it. The solution to the "AI trained on your secrets" risk class.'},
    {fid:'service-accounts',tag:'AI AGENTS',tc:'#4D8EFF',bc:'#1769FF18',why:'Every AI agent workflow gets a named service account. The CRM credentials your agent uses, the database query tokens, the email access — all under named machine identities with scoped permissions and a full audit trail. "Who authorized this AI to have this access" has an answer.'},
    {fid:'secrets-automation',tag:'AI PIPELINE',tc:'#10B981',bc:'#10B98118',why:'AI training pipelines, fine-tuning jobs, and model deployment workflows inject secrets at runtime via 1Password Secrets Automation. No hardcoded credentials in Jupyter notebooks or training scripts that get shared, versioned, or accidentally published.'},
    {fid:'domain-breach',tag:'SHADOW AI',tc:'#F59E0B',bc:'#F59E0B18',why:'Domain Breach Report monitors for company emails appearing in breach datasets — including the AI platform breaches that are now happening regularly. When ChatGPT, Midjourney, or any AI tool your team is using unofficially gets breached, you know within hours.'},
    {fid:'auth-policies',tag:'AI TOOL GOVERN',tc:'#EF4444',bc:'#EF444418',why:'Auth Policies can prevent employees from creating accounts at unapproved AI services using company email — the Account Creation Control setting routes them to IT-approved instances instead of personal shadow accounts.'},
    {fid:'ssh',tag:'ML INFRA',tc:'#00C4BE',bc:'#00C4BE18',why:'SSH keys and infrastructure credentials for GPU clusters, model serving endpoints, and ML compute environments governed in 1Password. Individual attribution on every researcher\'s access to training infrastructure.'},
  ],
  personas:[
    {role:'Head of AI / Chief AI Officer',q:'"Your AI agents — the ones that take actions by calling Salesforce, querying databases, sending emails — where do the credentials for those tool calls live right now? Is there a named identity for each agent workflow, or are they running under a developer\'s personal credentials?"'},
    {role:'ML Engineering Lead',q:'"Your Jupyter notebooks and training scripts — if I searched them right now, how many OpenAI or Anthropic API keys would I find in plaintext? And what happens to those keys when a researcher who worked on that model leaves the team?"'},
    {role:'CISO',q:'"Your team is using 40+ AI tools. Do you know which ones are signed up with company email addresses? Do you have a Domain Breach Report watching for when those services are compromised? Because AI platform breaches are now a regular occurrence."'},
    {role:'CTO',q:'"When the EU AI Act\'s access control auditability requirements become enforceable — or when a client asks how you govern AI system credentials — what\'s your answer? \'We have a policy\' is no longer sufficient."'},
  ],
  vault_structure:'🤖 Production AI API Keys (DevOps + Senior ML Eng only) · 🧪 Development AI API Keys (ML team) · 🔧 AI Agent Service Accounts (named per agent workflow) · 🗄️ Vector DB + Model Store Credentials · 📦 Training Data Access (S3, GCS — scoped by project) · 🔑 AI Tool OAuth Tokens (managed, not shadow)',
  csm_insight:'The AI conversation opens with a question IT can almost never answer: "where do your AI API keys live?" The silence that follows is the sales moment. Then you go deeper: when an AI agent takes an action on behalf of a user, what credential is it using, and who authorized that? This is a governance problem nobody has solved yet — and 1Password\'s Service Accounts + CLI + Secrets Automation is the actual technical answer. This conversation elevates 1Password from "password manager" to "AI security infrastructure." Lead with it in any tech-forward account.',
  stat1:'40+',stat1l:'Average enterprise AI tools in use — each requiring a credential that IT doesn\'t govern',
  stat2:'Zero',stat2l:'AI API keys in plaintext with CLI + Secret References — architecturally guaranteed',
  stat3:'EU AI Act',stat3l:'Incoming requirement for auditability of AI system access controls — coming now'},

'executive':{
  emoji:'👔',name:'Executive & C-Suite',color:'#F59E0B',
  hook:'Executives are the highest-value credential targets in any organization. A compromised CEO email account enables wire fraud. A compromised CISO laptop at a border crossing exposes the entire security strategy. A CFO whose banking credentials live on a sticky note is one social engineering call away from a nine-figure loss. Executives also have the lowest tolerance for security friction — which is exactly why Travel Mode and Families exist.',
  credential_inv:'Corporate banking authorization credentials (wire initiation, treasury access) · Board portal credentials (Diligent, Boardvantage, Nasdaq Boardvantage) · Executive communication platforms (Signal, encrypted email) · Investor and LP portal access · M&A deal room credentials (Intralinks, Datasite, Merrill DatasiteOne) · Corporate travel accounts with personal data · Executive security systems (home monitoring, personal device management) · C-suite social media and LinkedIn credentials · Personal financial platform access (if corporate accounts involved) · Conference and speaking platform credentials',
  pains:['Executive credential targets are the highest-value in the organization — CEO email access enables BEC fraud, CFO banking credentials enable wire fraud, CISO system access enables strategic intelligence theft','International travel is a constant for C-suite — border crossings with full credential access in jurisdictions with data disclosure requirements, competitor intelligence operations, and state-sponsored surveillance','Board portal and M&A deal room credentials contain the most commercially sensitive information in the company — board resolutions, acquisition targets, financial forecasts — and are shared via email as the default','Wire fraud and BEC attacks specifically target CFO and finance executive credentials because the payoff is immediate and the window of opportunity is brief','Executive shadow IT: C-suite members routinely use personal accounts for sensitive business communications because corporate security feels too cumbersome — creating unmanaged credential exposure','No MFA on executive accounts because "it\'s too much friction" — the most dangerous security gap in most organizations is the person with the most access and the least authentication enforcement'],
  features:[
    {fid:'travel-mode',tag:'BORDER',tc:'#F59E0B',bc:'#F59E0B18',why:'Travel Mode is the executive feature. Partners, CEOs, and board members crossing international borders — sensitive vaults disappear at customs, reappear after. Board portal credentials, M&A deal room access, banking credentials — invisible to border searches. No competitor has this. This is the feature that makes executives care about 1Password.'},
    {fid:'auth-policies',tag:'EXEC MFA',tc:'#EF4444',bc:'#EF444418',why:'MFA enforced on executive accounts — the most impactful security control, applied to the highest-value targets. Passkeys for the executives who want zero friction: biometric, no token, no OTP.'},
    {fid:'passkeys',tag:'ZERO FRICTION',tc:'#4D8EFF',bc:'#1769FF18',why:'Passkeys eliminate the MFA friction that causes executives to disable security controls. Touch ID on the MacBook Pro is not a security burden. It\'s faster than typing a password. Executives who try passkeys don\'t go back.'},
    {fid:'cred-mgmt',tag:'BOARD PORTAL',tc:'#A78BFA',bc:'#7C3AED18',why:'Board portal credentials, M&A deal room access, and investor portal logins in encrypted vaults — not email threads, not sticky notes, not the EA\'s shared spreadsheet. Granular access controls mean board members access only what they need.'},
    {fid:'free-families',tag:'PERSONAL SECURITY',tc:'#10B981',bc:'#10B98118',why:'Executive personal accounts being compromised is a corporate security problem. Free Families extends 1Password to executive personal use — their home banking, their personal email, their family\'s accounts. The most compromised attack surface for executives is personal accounts used to pivot to corporate access.'},
    {fid:'app-policies',tag:'LEAST PRIV',tc:'#00C4BE',bc:'#00C4BE18',why:'Executive accounts have the highest privileges — which makes least-privilege policy enforcement most important, not least. Vault segmentation ensures executive access to M&A data doesn\'t cascade to production systems or employee records.'},
  ],
  personas:[
    {role:'CEO',q:'"When you travel internationally — particularly to markets with heightened surveillance risk — your laptop currently contains full access to board communications, banking credentials, and M&A deal room data. What\'s your current control if a border agent demands access to that device?"'},
    {role:'CFO',q:'"Your banking authorization credentials — wire initiation, treasury access — where do those live right now? If I asked you to show me the audit trail for the last 30 days of access to those credentials, what would you show me?"'},
    {role:'Chief of Staff / EA',q:'"You manage executive credentials on behalf of the C-suite — travel accounts, conference registrations, board portal access. Are those credentials in your personal password manager, a shared spreadsheet, or an IT-governed system?"'},
    {role:'Board Chair',q:'"Your board portal credentials contain everything a hostile actor would want about this company — board resolutions, executive compensation, M&A targets. Are those credentials MFA-protected, and do you know the last time anyone audited who has access?"'},
  ],
  vault_structure:'👔 Executive Vault (C-suite only, Owner-level access) · 🏦 Financial Authorization Vault (CFO + CEO, Events API monitored) · 📋 Board & Governance Portal Access · 🔒 M&A Deal Room Credentials (restricted by active deal) · 🌍 Travel-Safe Vault (marked for Travel Mode) · 👤 EA Access (scoped, no executive credentials)',
  csm_insight:'The executive conversation is either closed by Travel Mode or by the banking credential story. For executives who travel internationally: Travel Mode is the feature that makes them personally invested in 1Password. For CFO conversations: "where are your wire authorization credentials right now" is the opener. The answer is almost always "in my head" or "in a spreadsheet" — and that becomes the conversation. Don\'t sell features to executives. Sell protection from the specific, named scenarios that keep them up at night.',
  stat1:'$2.7B',stat1l:'Wire fraud and BEC losses in 2023 — executive credentials are the primary target (FBI IC3)',
  stat2:'Travel Mode',stat2l:'Only 1Password has it — zero competitors offer credential vault disappearance at border crossings',

'shared-workstations':{
  emoji:'🖥️',name:'Shared Workstations & Multi-User Environments',color:'#6366F1',
  hook:'The shared workstation problem is one of the most widespread and least-solved credential challenges in enterprise environments. Healthcare nursing stations, retail point-of-sale terminals, lab instrument computers, manufacturing floor HMIs, school computer labs — all have the same fundamental problem: multiple people, one computer, one shared login. 1Password doesn\'t eliminate the shared computer, but it transforms how credentials are managed on and around it.',
  credential_inv:'Shared workstation OS logins (Windows local accounts, domain accounts used across shifts) · Application credentials accessed from shared terminals (LIMS, EHR, POS, SCADA HMI) · Instrument-specific software logins on shared lab workstations · Shared kiosk and self-service terminal management credentials · Break room computer credentials for shift workers without personal devices · Manufacturing floor terminal access to ERP and production management systems · School computer lab credentials for shared student workstations · Retail back-office shared computers with multiple employees per shift',
  pains:['The fundamental tension: shared workstations exist because individual accounts create friction at the point of work — nurses can\'t be logging in and out of EHR systems between every patient interaction, retail associates can\'t manage separate POS sessions per transaction. But shared credentials create compliance liability and eliminate audit trail.','No individual attribution on actions taken from shared workstations — when a transaction is voided, a record is modified, or an access event occurs, you can\'t determine who was at the keyboard','21 CFR Part 11, HIPAA, and PCI-DSS all require individual attribution on access to regulated data — which shared workstation credentials fundamentally cannot provide in their current form','Instrument software on shared lab computers with a single service account login — everyone uses the same account, and the audit log shows the account name, not the researcher','Password rotation on shared workstation accounts is operationally painful — any change requires updating every person who uses that workstation, which means it rarely happens','The "I was last logged in" problem: shift workers arriving at a shared workstation where the previous shift never logged out — and taking actions under the previous person\'s session'],
  features:[
    {fid:'onboarding',tag:'INDIVIDUAL CONTEXT',tc:'#6366F1',bc:'#6366F118',why:'The practical solution for shared workstations: each user gets their own 1Password account. QR Code Sign-In lets them quickly authenticate to their personal 1Password vault on any shared device. Shared application credentials live in a team vault accessible to all authorized users — but the 1Password access event shows which individual retrieved the credential. Individual attribution, shared access model.'},
    {fid:'cred-mgmt',tag:'SHARED VAULT',tc:'#4D8EFF',bc:'#1769FF18',why:'Shared workstation application credentials (the LIMS login, the POS system password, the EHR shared service account) live in a team vault that all authorized shift workers can access — but each individual retrieves them through their own 1Password account. The shared credential, but individual access events.'},
    {fid:'auth-policies',tag:'MFA ON SHARED',tc:'#10B981',bc:'#10B98118',why:'MFA enforcement on the 1Password account each user authenticates with — even on a shared device. The authentication event is individual even when the downstream credential is shared.'},
    {fid:'events-api',tag:'SHIFT AUDIT',tc:'#F59E0B',bc:'#F59E0B18',why:'Events API logs show which 1Password user account retrieved the shared workstation credential and when — creating the individual attribution layer that shared OS logins cannot provide. HIPAA and 21 CFR Part 11 audit trail built on top of shared infrastructure.'},
    {fid:'item-expiry',tag:'CREDENTIAL ROTATION',tc:'#EF4444',bc:'#EF444418',why:'Shared workstation credentials with set rotation schedules — Item Expiry alerts the vault admin before the rotation window. When credentials are updated in the vault, every user who retrieves the credential from the vault gets the current version automatically. No manual distribution.'},
    {fid:'location-items',tag:'STATION CONTEXT',tc:'#A78BFA',bc:'#7C3AED18',why:'Location-based items surface the right credentials when a user with 1Password on mobile approaches a specific workstation — the instrument credentials for Bench 3, the POS credentials for Register 7. Reduces lookup time on the floor.'},
  ],
  personas:[
    {role:'IT Director / Operations Technology',q:'"Your shared workstations — the nursing stations, the lab benches, the retail POS terminals — right now every action taken from those is attributed to the shared account, not the individual. If a compliance auditor asked you who accessed patient records on Ward 4 between 2am and 6am last Tuesday, what do you show them?"'},
    {role:'Compliance / Quality Assurance',q:'"For your 21 CFR Part 11 or HIPAA audit, the auditor will ask for individual attribution on regulated data access. Your shared workstation accounts can\'t provide that. How are you currently addressing that gap?"'},
    {role:'Lab Manager / Research IT',q:'"Your instrument workstations — the HPLC, the sequencer, the mass spec — they all have shared service account logins. When the FDA inspects, what does your electronic records attribution look like?"'},
    {role:'CISO',q:'"The shared workstation problem is often where compliance gaps are widest. What\'s your current plan to achieve individual attribution on regulated system access from terminals that physically can\'t be dedicated to single users?"'},
  ],
  vault_structure:'🖥️ Shared Station Credentials Vault (all authorized shift workers have access, individual retrieval logged) · 👤 Individual User Vaults (personal credentials, QR Sign-In context) · 🔑 Admin / Override Credentials (supervisors only) · 📋 Instrument-Specific Vaults (per instrument, per lab) · 🔄 Rotation-Tracked Credentials (Item Expiry set)',
  csm_insight:'The shared workstation conversation is one of the most nuanced in the 1Password book — we don\'t fully solve the shared workstation problem, but we meaningfully improve it. Be honest about what 1Password does and doesn\'t do here: we don\'t replace OS-level authentication or eliminate shared accounts at the system level. What we provide is individual attribution at the credential retrieval layer — each person retrieving the shared credential through their own 1Password account creates an individual access event. For compliance-sensitive environments, that audit layer is genuinely valuable even if it\'s not a complete solution. Position it as an improvement, not a transformation. Customers in research labs and healthcare who have this problem are often large, strategic accounts — the relationship value is high even when the use case is imperfect.',
  stat1:'Individual audit',stat1l:'Attribution created at 1Password retrieval layer even for shared downstream credentials',
  stat2:'21 CFR Part 11',stat2l:'Compliance audit trail improvement — each retrieval event is individually attributed',
  stat3:'Zero',stat3l:'Password distribution needed when shared credential rotates — vault update reaches all authorized users'},

'operations':{
  emoji:'🏗️',name:'Operations & Facilities',color:'#84CC16',
  hook:'Operations teams manage the credentials nobody thinks about until they matter — facility access codes, building management system logins, vendor access for maintenance, HVAC and utilities management portals. These credentials are often the entry point attackers use when they can\'t get through the front door. The Oldsmar water treatment attack started with a facilities-adjacent remote access credential.',
  credential_inv:'Building management system credentials (BMS, BAS — HVAC, lighting, access control) · Facility security system admin access (CCTV, badge access, alarm systems) · Vendor and contractor access credentials for facility maintenance · Shipping and receiving platform logins · Fleet management system credentials · Facilities procurement and vendor portal access · Physical security system management credentials · Operational equipment monitoring platform logins · Property management portal credentials · Utility provider account access (electricity, gas, water monitoring platforms)',
  pains:['Facility vendor and contractor credentials never formally managed — HVAC technician has VPN access from a job two years ago that was never revoked. This is the Colonial Pipeline and Oldsmar pattern repeated in every facilities department.','Building management system credentials shared with multiple facilities managers and vendors with no audit trail — when a door access record is modified or a thermostat is changed, attribution is impossible','Physical security system admin credentials (CCTV, badge access) in a spreadsheet that\'s been copied to every facilities manager who\'s joined the team in five years','High contractor volume in facilities — HVAC, electrical, plumbing, cleaning services — each with some level of system access that never gets formally revoked','No process for credential rotation when a facilities vendor relationship ends — the vendor\'s credentials to building management systems outlast the contract by months or years','Facilities credentials are often treated as "low risk" — which is why they\'re the entry point attackers exploit. An attacker with BMS access can manipulate physical security systems, disable fire suppression, or create physical access.'],
  features:[
    {fid:'guest-accounts',tag:'VENDOR ACCESS',tc:'#84CC16',bc:'#84CC1618',why:'Facility vendor and contractor access scoped to specific system credentials with automatic expiry. HVAC technician gets access to the BMS during the maintenance window, credential self-destructs when the work order closes. No persistent contractor access outlasting the engagement.'},
    {fid:'item-expiry',tag:'ACCESS EXPIRY',tc:'#4D8EFF',bc:'#1769FF18',why:'Every vendor and contractor credential in a facilities vault has an expiry date matching the service contract. When the contract ends, 1Password alerts before expiry and access self-destructs after — no manual revocation required.'},
    {fid:'location-items',tag:'SITE CREDENTIALS',tc:'#F59E0B',bc:'#F59E0B18',why:'Location-based credentials surface automatically when a facilities manager or field tech arrives at a specific building or site. The BMS credentials for Building C appear when the technician is on-site — not across all sites.'},
    {fid:'cred-mgmt',tag:'FACILITY VAULT',tc:'#10B981',bc:'#10B98118',why:'Building management credentials, vendor access codes, facility security system logins, and utility portal access organized in structured vaults by site and system type — replacing the shared spreadsheet and the sticky note on the control room wall.'},
    {fid:'secure-sharing',tag:'VENDOR SHARE',tc:'#A78BFA',bc:'#7C3AED18',why:'Share specific facility system credentials with vendors via time-limited encrypted links for maintenance windows. Never the master access, never via email, never persistent.'},
    {fid:'events-api',tag:'FACILITY AUDIT',tc:'#EF4444',bc:'#EF444418',why:'Every facility system credential access logged and attributed. When a physical security event occurs, the audit trail for who accessed which facility system credential is already built.'},

let curDid=null;
function buildDeptSidebar(){
  const sb=document.getElementById('sidebar');sb.innerHTML='';
  sb.appendChild(buildIntelModeBar());
  const h=document.createElement('div');h.className='sec-hdr';h.style.color='#10B981';h.textContent='SELECT DEPARTMENT';sb.appendChild(h);
  Object.entries(DEPARTMENTS).filter(([did,D])=>!srch||D.name.toLowerCase().includes(srch)).forEach(([did,D])=>{
    const el=document.createElement('div');el.className=`ni${curDid===did?' active':''}`;
    if(curDid===did)el.style.borderLeftColor=D.color;
    el.innerHTML=`<span style="font-size:16px">${D.emoji}</span><span class="nn">${D.name}${D._custom?'<span class="custom-badge">CUSTOM</span>':''}</span>`;
    el.onclick=()=>showDept(did);sb.appendChild(el);
  });
}

function renderDept(did){
  const D=DEPARTMENTS[did];if(!D)return;
  const pains=D.pains.map(p=>`<div class="pain-row"><span class="px">✗</span><span class="pt2">${p}</span></div>`).join('');
  const feats=D.features.map(f=>{const feat=FEATURES.find(x=>x.id===f.fid);return`<div class="sc has-add-bad" onclick="switchTab('features');selectFeature('${f.fid}')"><button class="add-bad-btn" title="Add to Build a Doc" onclick="event.stopPropagation();ensureBADProject();BAD.addWidget(makeDeptWidget('${did}','usecase'));showBADAddedToast(BAD.getCurrentProject().name)">📌</button>
    <span class="sol-tag" style="background:${f.bc};color:${f.tc};border:1px solid ${f.tc}44">${f.tag}</span>
    <div class="sol-name">${feat?feat.n:f.fid}</div>
    <div class="sol-desc">${f.why}</div>
    <div class="sol-link">View feature page →</div></div>`;}).join('');
  const personas=D.personas.map(p=>`<div class="pc"><div class="pc-r">${p.role}</div><div class="pc-q">${p.q}</div></div>`).join('');
  document.getElementById('detail').innerHTML=`
    <div class="ind-hero">
      <div class="ind-eye" style="color:${D.color}">${D.emoji} ${D.name.toUpperCase()} · DEPARTMENT INTEL</div>
      <div class="ind-title">${D.name}</div>
      <div class="ind-hook">${D.hook}</div>
    </div>
    <div class="ind-body">
      <div style="display:flex;flex-direction:column;gap:13px">
        <div class="blk" style="border-left:3px solid ${D.color}">
          <div class="blk-t" style="color:${D.color}">WHAT THIS DEPARTMENT MANAGES (CREDENTIAL INVENTORY)</div>
          <div class="pt" style="white-space:normal;font-size:12px;color:#7A9AB8;line-height:1.7">${D.credential_inv}</div>
        </div>
        <div class="blk br has-add-bad"><button class="add-bad-btn" title="Add pain points to Build a Doc" onclick="ensureBADProject();BAD.addWidget(makeDeptWidget('${did}','pains'));showBADAddedToast(BAD.getCurrentProject().name)">📌</button><div class="blk-t red">KEY PAIN POINTS</div>${pains}</div>
        <div class="stat-row">
          <div class="sb"><div class="sn" style="color:${D.color}">${D.stat1}</div><div class="sl">${D.stat1l}</div></div>
          <div class="sb"><div class="sn" style="color:${D.color}">${D.stat2}</div><div class="sl">${D.stat2l}</div></div>
          <div class="sb"><div class="sn" style="color:${D.color}">${D.stat3}</div><div class="sl">${D.stat3l}</div></div>
        </div>
        <div class="blk bg"><div class="blk-t green">DISCOVERY QUESTIONS BY PERSONA</div><div class="pgrid">${personas}</div></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:13px">
        <div class="blk bl"><div class="blk-t blue">TOP FEATURES FOR THIS DEPARTMENT — CLICK TO VIEW</div><div class="sol-grid">${feats}</div></div>
        <div class="blk ba">
          <div class="blk-t amber">RECOMMENDED VAULT STRUCTURE</div>
          <div class="pt" style="font-size:12px;white-space:normal;line-height:1.75;color:#7A9AB8">${D.vault_structure}</div>
        </div>
        <div class="blk" style="border-left:3px solid #A78BFA;background:#7C3AED08">
          <div class="blk-t purple">💡 CSM CONVERSATION INSIGHT</div>
          <div class="pt" style="font-size:12px;white-space:normal;line-height:1.75;color:#C8D8E8">${D.csm_insight}</div>
        </div>
      </div>
    </div>`;
  document.getElementById('detail').scrollTop=0;
}

function showDept(did){curDid=did;buildDeptSidebar();renderDept(did);}

// Single-select chips (only one active at a time)
function cbChipSingle(btn, groupId) {
  document.querySelectorAll(`#${groupId} .cb-chip`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Multi-select toggle chips
function cbChipToggle(btn, groupId) {
  btn.classList.toggle('active');
}

// Append chip value to a text input
function cbChipAppend(inputId, val) {
  const el = document.getElementById(inputId);
  if (!el) return;
  if (el.value && !el.value.endsWith(' ')) el.value += ', ';
  el.value += val;
  el.focus();
}

// Tag input: press Enter to add a tag
function cbTagKey(e, tagsId, inputId) {
  if (e.key !== 'Enter' && e.key !== ',') return;
  e.preventDefault();
  const input = document.getElementById(inputId);
  const val = input.value.trim().replace(/,$/, '');
  if (val) { cbAddTag(tagsId, val); input.value = ''; }
}

function cbAddTag(tagsId, val) {
  val = val.trim();
  if (!val) return;
  const wrap = document.getElementById(tagsId);
  if (!wrap) return;
  // Avoid duplicates
  const existing = [...wrap.querySelectorAll('.cb-tag-pill')].map(p => p.dataset.val);
  if (existing.includes(val)) return;
  const pill = document.createElement('span');
  pill.className = 'cb-tag-pill';
  pill.dataset.val = val;
  pill.innerHTML = `${val}<button onclick="this.parentElement.remove()" title="Remove">×</button>`;
  wrap.appendChild(pill);
}

function cbGetTags(tagsId) {
  const wrap = document.getElementById(tagsId);
  if (!wrap) return [];
  return [...wrap.querySelectorAll('.cb-tag-pill')].map(p => p.dataset.val);
}

function cbGetActiveChips(groupId) {
  const group = document.getElementById(groupId);
  if (!group) return [];
  return [...group.querySelectorAll('.cb-chip.active')].map(b => b.textContent.trim());
}

// Auto-populate tech stack suggestions when industry changes
function cbIndustryChange(iid) {
  const tools = TECH_STACKS[iid];
  if (!tools || !tools.length) return;
  // Refresh stack suggestions with industry-specific tools
  const sug = document.getElementById('stack-suggestions');
  if (!sug) return;
  const industryTools = tools.map(t => t.tool);
  // Add industry tools to front of suggestions
  const existing = [...sug.querySelectorAll('.cb-sug')].map(s => s.textContent);
  industryTools.forEach(t => {
    if (!existing.includes(t)) {
      const span = document.createElement('span');
      span.className = 'cb-sug cb-sug-ind';
      span.textContent = t;
      span.onclick = () => cbAddTag('stack-tags', t);
      sug.insertBefore(span, sug.firstChild);
    }
  });
  // Also pre-populate compliance chips based on industry
  const ind = INDUSTRIES[iid];
  if (ind && ind.compliance) {
    ind.compliance.forEach(c => {
      const chips = document.querySelectorAll('#chips-compliance .cb-chip');
      chips.forEach(chip => {
        if (c.includes(chip.textContent) || chip.textContent.includes(c.split(' ')[0])) {
          chip.classList.add('active');
        }
      });
    });
  }
}

function cbRestoreState() {
  cbDepts.forEach(did => {
    const el = document.getElementById('cbck-' + did);
    if (el) el.classList.add('checked');
  });
  // Re-render industry tags if any are already selected
  if (cbSelectedIndustries.length) cbRenderIndustryTags();
}

function copyExecNarrative() {
  if (!cbLastResult) return;
  const { result: r, company } = cbLastResult;
  const ec = r.executive_narrative || {};
  const lines = [
    `1PASSWORD EPM — ${company.toUpperCase()}`, '',
    ec.one_pager_headline || '',  '',
    'THE PROBLEM:', ec.problem_statement || '', '',
    'THE SOLUTION:', ec.solution_statement || '', '',
    'BUSINESS CASE:',
    ...(ec.business_case||[]).map(b => `→ ${b}`), '',
    'RISK OF INACTION:',
    ec.risk_of_inaction || ''
  ];
  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btns = document.querySelectorAll('.cb-action-btn');
    if (btns[1]) { btns[1].textContent = '✓ Copied!'; setTimeout(() => btns[1].textContent = '📝 Copy Exec Narrative', 2000); }
  });
}

// Render tech stack section for industry pages
function renderTechStack(iid) {
  const tools = TECH_STACKS[iid];
  if (!tools || !tools.length) return '';
  return `
    <div class="ts-wrap">
      <div class="ts-hdr" style="color:var(--blue)">🔧 COMMON TECH STACK & HOW 1PASSWORD INTEGRATES</div>
      <div class="ts-grid">
        ${tools.map(t => `
          <div class="ts-tool">
            <div class="ts-tool-top">
              <span class="ts-tool-name">${t.tool}</span>
            </div>
            <div class="ts-tool-cat">${t.cat}</div>
            <div class="ts-tool-note" style="color:var(--t3);margin-bottom:6px">${t.gap}</div>
            <div style="font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--blue);margin-bottom:3px">HOW 1PASSWORD HELPS</div>
            <div class="ts-tool-note">${t.how}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

// Render tech stack for department pages
function renderDeptTechStack(did) {
  // Departments share industry tech stacks based on their relevant verticals
  // We'll show a curated subset of tools relevant to each department
  const D = DEPARTMENTS[did];
  if (!D) return '';
  const xref = XREF;
  // Gather relevant tools from the industries this dept appears in
  const deptInds = Object.entries(XREF).filter(([fid,x]) => x.dep && x.dep.some(d => d.toLowerCase().includes(D.name.split(' ')[0].toLowerCase()))).map(([fid]) => fid).slice(0, 5);
  if (!deptInds.length) return '';
  return `
    <div class="ts-wrap">
      <div class="ts-hdr" style="color:#10B981">🔑 KEY FEATURES FOR THIS DEPARTMENT'S WORKFLOW</div>
      <div class="ts-grid">
        ${D.features.map(f => {const feat=FEATURES.find(x=>x.id===f.fid);return feat?`
          <div class="ts-tool">
            <div class="ts-tool-top"><span class="ts-tool-name">${feat.n}</span></div>
            <div class="ts-tool-cat">${f.tag}</div>
            <div class="ts-tool-note">${f.why}</div>
          </div>`:''}).join('')}
      </div>
    </div>`;
}

let curCompId = null;

function showCompete() {
  document.getElementById('sidebar').style.display = '';
  buildCompeteSidebar();
  if (curCompId) renderCompetitor(curCompId);
  else renderCompetitor('lastpass');
}

function buildCompeteSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  const h = document.createElement('div');
  h.className = 'sec-hdr'; h.style.color = '#EF4444'; h.textContent = '⚔️ COMPETITORS';
  sb.appendChild(h);
  Object.entries(COMPETITORS).forEach(([cid, C]) => {
    const el = document.createElement('div');
    el.className = 'ni' + (curCompId === cid ? ' active' : '');
    if (curCompId === cid) el.style.borderLeftColor = C.color;
    el.innerHTML = `<span style="font-size:16px">${C.emoji}</span><span class="nn">${C.name}</span>`;
    el.onclick = () => { curCompId = cid; buildCompeteSidebar(); renderCompetitor(cid); };
    sb.appendChild(el);
  });
  // Add a divider and some context
  const note = document.createElement('div');
  note.style.cssText = 'padding:16px 14px;font-size:10px;color:var(--t4);line-height:1.6;border-top:1px solid var(--border);margin-top:8px';
  note.textContent = 'Confidential · CSM use only. Battle cards and win themes for competitive evaluations.';
  sb.appendChild(note);
}

const BAD = {
  projects: [],
  currentProjectId: null,
  pendingWidget: null,
  newProject(name) {
    const p = { id: 'p' + Date.now(), name: name || 'My Document', widgets: [] };
    this.projects.push(p); this.currentProjectId = p.id; return p;
  },
  getCurrentProject() { return this.projects.find(p => p.id === this.currentProjectId) || null; },
  addWidget(widget) {
    const p = this.getCurrentProject(); if (!p || !widget) return;
    const offset = p.widgets.length * 22;
    widget.id = 'w' + Date.now();
    widget.x = 40 + (offset % 180); widget.y = 40 + (offset % 180);
    widget.w = widget.w || 340; widget.h = widget.h || 220;
    p.widgets.push(widget);
    if (document.getElementById('bad-canvas')) renderBAD();
  },
  removeWidget(id) {
    const p = this.getCurrentProject(); if (!p) return;
    p.widgets = p.widgets.filter(w => w.id !== id); renderBAD();
  },
  updateWidget(id, props) {
    const p = this.getCurrentProject(); if (!p) return;
    const w = p.widgets.find(x => x.id === id); if (w) Object.assign(w, props);
  }
};

function ensureBADProject() {
  if (BAD.projects.length === 0) BAD.newProject('My Document');
  if (!BAD.currentProjectId && BAD.projects.length > 0) BAD.currentProjectId = BAD.projects[0].id;
}

function showBADPicker(widgetData) {
  ensureBADProject(); BAD.pendingWidget = widgetData;
  if (BAD.projects.length === 1) { BAD.addWidget(widgetData); showBADAddedToast(BAD.projects[0].name); return; }

}

let badOrientation='portrait';
function showBAD(toggleHTML) {

          <div class="bad-canvas" id="bad-canvas" style="width:${cW}px;height:${cH}px;min-height:${cH}px;border:2px dashed #3A608066;background:#fff;position:relative;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.4)"></div>

function refreshBADToolbar() {
  const sel = document.getElementById('bad-project-select'); if (!sel) return;
  sel.innerHTML = BAD.projects.map(p=>`<option value="${p.id}"${p.id===BAD.currentProjectId?' selected':''}>${p.name}</option>`).join('');
}

function renderBAD() {
  const canvas = document.getElementById('bad-canvas'); if (!canvas) return;
  const p = BAD.getCurrentProject();
  if (!p || p.widgets.length === 0) {
    canvas.innerHTML = `<div class="bad-empty-canvas">
      <div class="bad-empty-canvas-ico">📄</div>
      <div class="bad-empty-canvas-t">Document is empty</div>
      <div class="bad-empty-canvas-s">Browse any tab and click 📌 on content blocks to add them here. Or use the + buttons above.</div>
    </div>`; return;
  }
  canvas.innerHTML = '';
  p.widgets.forEach(w => {
    const el = document.createElement('div');
    el.className = 'bad-widget'; el.id = 'bw-'+w.id;
    el.style.cssText = `left:${w.x}px;top:${w.y}px;width:${w.w}px;height:${w.h}px`;
    let bodyHTML = '';
    if (w.type === 'text') {
      bodyHTML = `<div contenteditable="true" style="flex:1;padding:12px;font-size:13px;color:var(--t1);outline:none;white-space:pre-wrap;overflow:auto" onblur="BAD.updateWidget('${w.id}',{content:this.innerHTML})">${w.content||'Click to edit...'}</div>`;
    } else if (w.type === 'title') {
      bodyHTML = `<div style="padding:12px 13px"><input style="font-size:18px;font-weight:800;color:var(--t1);background:transparent;border:none;outline:none;width:100%;font-family:inherit" value="${(w.heading||'').replace(/"/g,'&quot;')}" onchange="BAD.updateWidget('${w.id}',{heading:this.value})"/><input style="font-size:12px;color:var(--t3);background:transparent;border:none;outline:none;width:100%;margin-top:4px;font-family:inherit" value="${(w.subtitle||'').replace(/"/g,'&quot;')}" onchange="BAD.updateWidget('${w.id}',{subtitle:this.value})"/></div>`;
    } else if (w.render) {
      try { bodyHTML = `<div style="padding:12px 13px;overflow:auto;flex:1">${w.render(w)}</div>`; }
      catch(e) { bodyHTML = `<div style="padding:12px;color:#EF4444">Error rendering</div>`; }
    }
    el.innerHTML = `<div class="bad-widget-hdr" onmousedown="badStartDrag(event,'${w.id}')">
      <div class="bad-widget-stripe" style="background:${w.color}"></div>
      <div class="bad-widget-title">${w.title}</div>
      <div class="bad-widget-btns">
        <button class="bad-wbtn" title="Duplicate" onclick="badDuplicateWidget('${w.id}')">⧉</button>
        <button class="bad-wbtn" title="Remove" onclick="BAD.removeWidget('${w.id}')">✕</button>
      </div></div>
      ${bodyHTML}
      <div class="bad-widget-footer"><div class="bad-resize" onmousedown="badStartResize(event,'${w.id}')"></div></div>`;
    canvas.appendChild(el);
  });
}

let _drag=null, _resize=null;
function badStartDrag(e,wid){
  e.preventDefault();
  const el=document.getElementById('bw-'+wid);
  _drag={wid,el,ox:e.clientX-el.offsetLeft,oy:e.clientY-el.offsetTop};
  el.classList.add('selected'); el.style.zIndex=100;
}
function badStartResize(e,wid){
  e.preventDefault(); e.stopPropagation();
  const el=document.getElementById('bw-'+wid);
  const w=BAD.getCurrentProject()?.widgets.find(x=>x.id===wid);
  _resize={wid,el,x0:e.clientX,y0:e.clientY,w0:w?.w||300,h0:w?.h||200};
}
document.addEventListener('mousemove',e=>{
  if(_drag){const x=Math.max(0,e.clientX-_drag.ox),y=Math.max(0,e.clientY-_drag.oy);_drag.el.style.left=x+'px';_drag.el.style.top=y+'px';BAD.updateWidget(_drag.wid,{x,y});}
  if(_resize){const w=Math.max(180,e.clientX-_resize.x0+_resize.w0),h=Math.max(100,e.clientY-_resize.y0+_resize.h0);_resize.el.style.width=w+'px';_resize.el.style.height=h+'px';BAD.updateWidget(_resize.wid,{w,h});}
});
document.addEventListener('mouseup',()=>{
  if(_drag){_drag.el.style.zIndex='';_drag.el.classList.remove('selected');_drag=null;}
  _resize=null;
});

function badNewProject(){const n=prompt('Document name:','New Document');if(!n)return;BAD.newProject(n);showBAD();}
function badRenameProject(){const p=BAD.getCurrentProject();if(!p)return;const n=prompt('Rename:',p.name);if(n){p.name=n;refreshBADToolbar();}}

function badDuplicateWidget(wid){
  const p=BAD.getCurrentProject();if(!p)return;
  const src=p.widgets.find(w=>w.id===wid);if(!src)return;
  const copy=JSON.parse(JSON.stringify(src));
  copy.id='w'+Date.now();copy.x=src.x+24;copy.y=src.y+24;
  if(src.render)copy.render=src.render;
  p.widgets.push(copy);renderBAD();
}

  </div>
  <scr`+'ipt>window.onload=()=>setTimeout(()=>window.print(),400);</scr'+'ipt></body></html>';
  const win=window.open('','_blank');win.document.write(printHTML);win.document.close();
}

const CUSTOM_STORAGE_KEY = '1p_epm_hub_custom_v1';

function customLoad() {
  try {
    const raw = localStorage.getItem(CUSTOM_STORAGE_KEY);
    if (!raw) return { industries: [], departments: [] };
    return JSON.parse(raw);
  } catch(e) { return { industries: [], departments: [] }; }
}

function customSave(data) {
  try { localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function customGetAll() { return customLoad(); }

// Add a custom industry and register it into INDUSTRIES
function customAddIndustry(item) {
  // item: { id, emoji, name, hook, why, color }
  const data = customLoad();
  data.industries = data.industries.filter(x => x.id !== item.id);
  data.industries.push(item);
  customSave(data);
  // Register into live INDUSTRIES object
  customRegisterIndustry(item);
}

function customRegisterIndustry(item) {
  if (!INDUSTRIES[item.id]) {
    INDUSTRIES[item.id] = {
      color: item.color || '#A78BFA',
      emoji: item.emoji || '🏢',
      name: item.name,
      hook: item.hook || item.why || '',
      why: item.why || item.hook || '',
      pains: item.pains || [],
      solutions: [],
      compliance: item.compliance ? (Array.isArray(item.compliance) ? item.compliance : item.compliance.split(',').map(s=>s.trim())) : [],
      breach: { name: 'No documented breach', date: '', body: 'Custom industry entry.', sources: '', prevention: '', features: [] },
      personas: [],
      stats: [],
      _custom: true
    };
    INAMES[item.id] = item.name;
    IEMOJI[item.id] = item.emoji || '🏢';
    ICOLORS[item.id] = item.color || '#A78BFA';
  }
}

// Add a custom department and register into DEPARTMENTS
function customAddDepartment(item) {
  const data = customLoad();
  data.departments = data.departments.filter(x => x.id !== item.id);
  data.departments.push(item);
  customSave(data);
  customRegisterDepartment(item);
}

function customRegisterDepartment(item) {
  if (!DEPARTMENTS[item.id]) {
    DEPARTMENTS[item.id] = {
      emoji: item.emoji || '🏢',
      name: item.name,
      color: item.color || '#A78BFA',
      hook: item.hook || '',
      credential_inv: item.credential_inv || '',
      pains: item.pains || [],
      features: [],
      personas: [],
      vault_structure: item.vault_structure || '',
      csm_insight: item.csm_insight || '',
      stat1: '', stat1l: '',
      stat2: '', stat2l: '',
      stat3: '', stat3l: '',
      _custom: true
    };
  }
}

function customDeleteIndustry(id) {
  const data = customLoad();
  data.industries = data.industries.filter(x => x.id !== id);
  customSave(data);
  delete INDUSTRIES[id];
  delete INAMES[id];
  delete IEMOJI[id];
  delete ICOLORS[id];
}

function customDeleteDepartment(id) {
  const data = customLoad();
  data.departments = data.departments.filter(x => x.id !== id);
  customSave(data);
  delete DEPARTMENTS[id];
  cbDepts.delete(id);
}

// Load all saved custom items on page load
function customInit() {
  const data = customLoad();
  (data.industries || []).forEach(item => customRegisterIndustry(item));
  (data.departments || []).forEach(item => customRegisterDepartment(item));
}

const EMOJI_OPTIONS = ['🏢','🏭','🏥','🏦','⚖️','💻','🎓','🤝','🏛️','⚡','🔬','🏨','🎬','📊','💎','🏠','🧬','🖥️','🚀','🌿','🎯','🛒','🍔','✈️','🎮','📱','🔐','💼','🏋️','🎪','🌐','🔧','📡','🏗️','🎨','🎵','⚕️','🌊','🛡️','🚗'];

function openEmojiPicker(inputId) {
  const existing = document.getElementById('emoji-picker-pop');
  if (existing) { existing.remove(); return; }
  const target = document.getElementById(inputId);
  const grid = EMOJI_OPTIONS.map(e =>
    `<span style="font-size:20px;cursor:pointer;padding:4px;border-radius:4px;display:inline-block" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''" onclick="document.getElementById('${inputId}').textContent=this.textContent;document.getElementById('emoji-picker-pop').remove()">${e}</span>`
  ).join('');
  const pop = document.createElement('div');
  pop.id = 'emoji-picker-pop';
  pop.style.cssText = 'position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:10px;display:grid;grid-template-columns:repeat(8,1fr);gap:2px;z-index:3000;box-shadow:0 8px 32px #00000080;max-width:280px';
  pop.innerHTML = grid;
  // Position near the target
  const rect = target.getBoundingClientRect();
  pop.style.top = (rect.bottom + 6) + 'px';
  pop.style.left = rect.left + 'px';
  document.body.appendChild(pop);
  setTimeout(() => document.addEventListener('click', function h(e){ if(!pop.contains(e.target)&&e.target!==target){pop.remove();document.removeEventListener('click',h);}}, {once:false}), 100);
}

const CB_PROFILES_KEY = '1p_epm_cb_profiles_v1';
let cbSelectedIndustries = []; // array of iids (multi-select)

// ── PROFILE PERSISTENCE ──────────────────────────────────────
function cbSaveProfile() {
  const company = document.getElementById('cb-company')?.value.trim();
  if (!company) { alert('Add a company name first.'); return; }

  const profile = {
    id: 'prof_' + Date.now(),
    saved_at: new Date().toISOString(),
    company,
    industries: cbSelectedIndustries.slice(),
    size: cbGetActiveChips('chips-size')[0] || '',
    current: document.getElementById('cb-current-custom')?.value.trim() || cbGetActiveChips('chips-current')[0] || '',
    contact: document.getElementById('cb-contact')?.value.trim() || '',
    pains: cbGetTags('pain-tags'),
    stack: cbGetTags('stack-tags'),
    compliance: cbGetActiveChips('chips-compliance'),
    objections: cbGetActiveChips('chips-objections'),
    stage: cbGetActiveChips('chips-stage')[0] || '',
    depts: [...cbDepts],
    notes: document.getElementById('cb-notes')?.value.trim() || '',
    last_result: cbLastResult || null
  };

  try {
    const all = JSON.parse(localStorage.getItem(CB_PROFILES_KEY) || '[]');
    // update if same company exists, else prepend
    const idx = all.findIndex(p => p.company.toLowerCase() === company.toLowerCase());
    if (idx >= 0) all[idx] = profile; else all.unshift(profile);
    localStorage.setItem(CB_PROFILES_KEY, JSON.stringify(all.slice(0, 20))); // keep latest 20
    cbRefreshProfileBar();
    showCustomSuccessToast(`Profile saved — "${company}"`);
  } catch(e) { alert('Could not save: ' + e.message); }
}

function cbLoadProfiles() {
  try { return JSON.parse(localStorage.getItem(CB_PROFILES_KEY) || '[]'); }
  catch(e) { return []; }
}

function cbDeleteProfile(id) {
  try {
    const all = cbLoadProfiles().filter(p => p.id !== id);
    localStorage.setItem(CB_PROFILES_KEY, JSON.stringify(all));
    cbRefreshProfileBar();
    showCustomSuccessToast('Profile deleted.');
  } catch(e) {}
}

function cbLoadProfile(id) {
  const p = cbLoadProfiles().find(x => x.id === id);
  if (!p) return;

  // Restore all fields
  const setVal = (id, val) => { const el = document.getElementById(id); if(el) el.value = val||''; };
  setVal('cb-company', p.company);
  setVal('cb-contact', p.contact);
  setVal('cb-current-custom', p.current);
  setVal('cb-notes', p.notes);

  // Industries
  cbSelectedIndustries = p.industries || [];
  cbRenderIndustryTags();

  // Chips
  const restoreChips = (groupId, vals, multi) => {
    document.querySelectorAll(`#${groupId} .cb-chip`).forEach(b => {
      const active = multi ? vals.includes(b.textContent.trim()) : b.textContent.trim() === vals;
      b.classList.toggle('active', active);
    });
  };
  restoreChips('chips-size', p.size, false);
  restoreChips('chips-current', p.current, false);
  restoreChips('chips-compliance', p.compliance || [], true);
  restoreChips('chips-objections', p.objections || [], true);
  restoreChips('chips-stage', p.stage, false);

  // Tags
  const restoreTags = (tagsId, vals) => {
    const wrap = document.getElementById(tagsId); if(!wrap) return;
    wrap.innerHTML = '';
    (vals||[]).forEach(v => cbAddTag(tagsId, v));
  };
  restoreTags('pain-tags', p.pains);
  restoreTags('stack-tags', p.stack);

  // Depts
  cbDepts.clear();
  (p.depts||[]).forEach(did => {
    cbDepts.add(did);
    const el = document.getElementById('cbck-' + did);
    if(el) el.classList.add('checked');
  });
  // Uncheck others
  document.querySelectorAll('.cb-check.checked').forEach(el => {
    const did = el.id.replace('cbck-','');
    if(!cbDepts.has(did)) el.classList.remove('checked');
  });

  // If last result exists, show it
  if (p.last_result) {
    cbLastResult = p.last_result;
    renderStrategy(p.last_result.result, p.company, cbSelectedIndustries.length ? INDUSTRIES[cbSelectedIndustries[0]] : null);
  }

  // Trigger governance panel update
  cbUpdateGovernancePanels();
  showCustomSuccessToast(`Loaded — "${p.company}"`);
}

function cbRenderIndustryTags() {
  const wrap = document.getElementById('cb-ind-tags');
  if (!wrap) return;
  wrap.innerHTML = '';
  cbSelectedIndustries.forEach(iid => {
    const I = INDUSTRIES[iid]; if(!I) return;
    const pill = document.createElement('span');
    pill.className = 'cb-ind-pill';
    pill.style.background = I.color + '18';
    pill.style.color = I.color;
    pill.style.border = '1px solid ' + I.color + '44';
    pill.innerHTML = `${I.emoji} ${I.name}<button onclick="cbRemoveIndustry('${iid}')">×</button>`;
    wrap.appendChild(pill);
  });
  cbUpdateGovernancePanels();
}

function cbAddIndustry(iid) {
  if (!iid || cbSelectedIndustries.includes(iid)) return;
  cbSelectedIndustries.push(iid);
  cbRenderIndustryTags();
  cbIndustryChange(iid); // trigger tech stack hints
  const input = document.getElementById('cb-ind-input');
  if(input){ input.value=''; input.focus(); }
  const dropdown = document.getElementById('cb-ind-dd');
  if(dropdown) dropdown.remove();
}

function cbRemoveIndustry(iid) {
  cbSelectedIndustries = cbSelectedIndustries.filter(x => x !== iid);
  cbRenderIndustryTags();
}

function cbShowIndustryDropdown(val) {
  const existing = document.getElementById('cb-ind-dd');
  if(existing) existing.remove();
  const wrap = document.getElementById('cb-ind-wrap');
  if(!wrap) return;
  const filtered = Object.entries(INDUSTRIES).filter(([iid,I]) =>
    (!val || I.name.toLowerCase().includes(val.toLowerCase())) &&
    !cbSelectedIndustries.includes(iid)
  ).slice(0, 12);
  if(!filtered.length) return;
  const dd = document.createElement('div');
  dd.className = 'cb-ind-dropdown'; dd.id = 'cb-ind-dd';
  dd.innerHTML = filtered.map(([iid,I]) =>
    `<div class="cb-ind-opt" onclick="cbAddIndustry('${iid}')">${I.emoji} ${I.name}</div>`
  ).join('');
  wrap.appendChild(dd);
}

    'Law Firm': ['legal','professionalservices'],
    'Hospital + Pharma': ['healthcare','lifesciences','government'],
    'SaaS Startup': ['technology','fintech'],

    'University': ['education','lifesciences'],

}

async function generatePlatPlaybook(motion){

  const ck=industry+'|'+Object.entries(_platProducts).filter(([k,v])=>v).map(([k])=>k).join(',')+'>'+motion;
  if(_platCache[ck]){out.innerHTML=_platCache[ck];return;}
  const sysP=`You are a senior 1Password CSM strategist. Generate a detailed, actionable playbook. Products: EPM (credentials, SCIM, SSO, secrets, CLI, Travel Mode, Watchtower, passkeys), SaaS Manager (5-source discovery, shadow IT/AI, onboarding/offboarding, access reviews, savings), Device Trust (125+ checks, BYOD, SSF integrations, self-remediation). Format as HTML with inline styles. CRITICAL: Return ONLY pure HTML with inline styles — NEVER use markdown syntax (no ##, no **, no -, no ---). Use HTML tags: <h2>, <strong>, <div>, <ul><li>. All output renders on a DARK background (#0A1929). Use ONLY these colors for text: #F0F6FF for headings, #C8DFFA for body text, #10B981 for EPM/positive, #3A9EFF for SaaS Manager/links, #F59E0B for Device Trust/warnings, #A78BFA for platform, #EF4444 for risks. NEVER use dark text colors, black, gray, or any color below #888. Use transparent or #0A192910 for card backgrounds with #1A3050 borders.`;

  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,system:sysP,messages:[{role:'user',content:userP}]})});

function roadmapLoad(){try{return JSON.parse(localStorage.getItem(ROADMAP_KEY))||DEFAULT_ROADMAP;}catch(e){return DEFAULT_ROADMAP;}}

function roadmapSave(data){try{localStorage.setItem(ROADMAP_KEY,JSON.stringify(data));}catch(e){}}

function roadmapAddItem(){
  const data=roadmapLoad();
  const name=prompt('Feature name:');if(!name)return;
  const product=prompt('Product (epm/trelica/dt):')||'epm';
  const status=prompt('Status (shipping/inprogress/planned):')||'planned';
  const quarter=prompt('Quarter (e.g. Q3 2026):')||'Q3 2026';
  const internal=prompt('Internal guidance:')||'';
  const external=prompt('Customer-safe message:')||'';
  const beta=confirm('Beta program?');
  const betaDetails=beta?(prompt('Beta details:')||''):'';
  data.items.push({id:'rm'+Date.now(),product,name,status,quarter,internal,external,beta,betaDetails});
  roadmapSave(data);showRoadmap();showCustomSuccessToast('Item added');
}

function roadmapEditItem(id){
  const data=roadmapLoad();const item=data.items.find(i=>i.id===id);if(!item)return;
  const name=prompt('Feature name:',item.name);if(!name)return;
  item.name=name;
  item.internal=prompt('Internal guidance:',item.internal)||item.internal;
  item.external=prompt('Customer-safe message:',item.external)||item.external;
  item.status=prompt('Status:',item.status)||item.status;
  roadmapSave(data);showRoadmap();showCustomSuccessToast('Updated');
}

function roadmapDeleteItem(id){
  if(!confirm('Delete this item?'))return;
  const data=roadmapLoad();data.items=data.items.filter(i=>i.id!==id);
  roadmapSave(data);showRoadmap();showCustomSuccessToast('Deleted');
}

function productInit() {
  try {
    const saved = JSON.parse(localStorage.getItem(PRODUCT_KEY) || '{}');
    activeProducts = { epm: true, trelica: false, dt: false, ...saved };
    activeProducts.epm = true; // EPM always on
  } catch(e) {}
  productSyncUI();
}

function activateProduct(pid) {
  toggleProduct(pid);
  showPlatformView(); // re-render so the card updates immediately
  showCustomSuccessToast(pid === 'trelica' ? '🔷 Trelica · SaaS Manager activated' : '🛡️ Device Trust activated');
}

function toggleProduct(pid) {
  if (pid === 'epm') return;
  activeProducts[pid] = !activeProducts[pid];
  try { localStorage.setItem(PRODUCT_KEY, JSON.stringify(activeProducts)); } catch(e) {}
  productSyncUI();
  // Refresh current tab so product-gated content shows/hides
  const tab = curTab;
  if (tab === 'industry' && curIid) renderIndustry(curIid);
  else if (tab === 'departments' && window.curDid) renderDept(window.curDid);
  else if (tab === 'trelica') showTrelicaHub();
  else if (tab === 'dt') showDeviceTrustHub();
  // Give visual feedback
  const name = pid === 'trelica' ? 'SaaS Manager' : 'Device Trust';
  showCustomSuccessToast(activeProducts[pid] ? `✓ ${name} activated` : `${name} deactivated`);
}

function productSyncUI() {
  ['epm','trelica','dt'].forEach(pid => {
    const btn = document.getElementById('ptog-' + pid);
    if (!btn) return;
    btn.className = 'product-toggle';
    if (activeProducts[pid]) btn.classList.add('active-' + pid);
  });
}

function hasProduct(pid) { return !!activeProducts[pid]; }

function mdToHtml(t){
  if(!t)return'';
  if(t.trim().startsWith('<'))return t;
  return t
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid #1A3050;margin:16px 0">')
    .replace(/^### (.*$)/gm,'<h3 style="color:#F0F6FF;font-size:14px;font-weight:700;margin:16px 0 8px">$1</h3>')
    .replace(/^## (.*$)/gm,'<h2 style="color:#F0F6FF;font-size:16px;font-weight:800;margin:18px 0 10px">$1</h2>')
    .replace(/^# (.*$)/gm,'<h1 style="color:#F0F6FF;font-size:18px;font-weight:800;margin:20px 0 10px">$1</h1>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong style="color:#F0F6FF">$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/^- (.*$)/gm,'<div style="display:flex;gap:6px;margin:4px 0;line-height:1.6"><span style="color:#3A9EFF;flex-shrink:0">•</span><span>$1</span></div>')
    .replace(/^(\d+)\. (.*$)/gm,'<div style="display:flex;gap:6px;margin:4px 0;line-height:1.6"><span style="color:#3A9EFF;font-weight:700;flex-shrink:0">$1.</span><span>$2</span></div>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

// ═══ SO WHAT? INDUSTRY NARRATIVES ═══
const SO_WHAT={
  financial:`Financial services buyers care about one thing: audit evidence. Every conversation should start with "when was your last audit?" and end with "here's what 1Password produces for your auditor automatically." Don't lead with features — lead with the fact that their current tool can't produce a SOC 2 evidence package.|CALL OPENER: "When your auditor asks for evidence of credential governance across your trading platforms, what do you hand them today?"`,
  healthcare:`Healthcare buyers are driven by HIPAA fear and clinician workflow. The conversation is never about passwords — it's about PHI access on shared workstations and contractor devices. Lead with "how do you manage credentials on shared nursing stations?" and watch the room change.|CALL OPENER: "Walk me through what happens when a traveling nurse needs access to your EHR system on day one — how do they get credentials?"`,
  'tech-saas':`SaaS companies think they've solved identity because they have Okta. The gap is everything Okta doesn't cover: shared credentials, API keys in .env files, developer secrets in CI/CD. Lead with developer workflow, not admin features.|CALL OPENER: "How do your developers currently share API keys and service account credentials across teams — is that in your IdP or somewhere else?"`,
  legal:`Law firms care about privilege. Attorney-client privilege is breached the moment a credential is shared via email or Slack. Lead with "how do your partners share matter credentials?" — the answer is always insecure.|CALL OPENER: "When a partner crosses an international border with full access to client matter credentials, what controls exist to protect privilege?"`,
  retail:`Retail is about PCI-DSS and seasonal workforce. Every holiday season, thousands of temporary employees get credentials that are never properly revoked. Lead with "what happened to your seasonal workers' access after last January?"|CALL OPENER: "When your seasonal workforce wrapped up last January, how did you confirm their credential access was fully revoked?"`,
  manufacturing:`Manufacturing cares about OT/IT convergence and vendor access. Third-party HVAC and equipment vendors routinely get credentials that live forever. Lead with the Target breach — it was an HVAC vendor credential.|CALL OPENER: "How many third-party vendors currently have credentials to access your plant floor systems — and when were those last audited?"`,
  education:`Education is about FERPA compliance and a workforce that resists security friction. Faculty won't use complex tools. Lead with "how do your professors share course system credentials?" — the answer is always sticky notes or email.|CALL OPENER: "When a professor retires or goes on sabbatical, how quickly can you confirm all their system access has been transferred and revoked?"`,
  nonprofit:`Nonprofits have tight budgets and high staff turnover. The conversation is about doing more with less. Lead with "what happens to donor database access when a program coordinator leaves?" — the answer reveals the gap.|CALL OPENER: "With your staff turnover rate, how confident are you that departed employees no longer have access to your donor management system?"`,
  government:`Government buyers need FedRAMP, NIST 800-171, and CMMC compliance. The conversation starts and ends with compliance frameworks. If you can't map features to NIST controls, you won't get past procurement.|CALL OPENER: "Which NIST 800-171 controls does your current credential management approach satisfy — and which ones are you documenting exceptions for?"`,
  insurance:`Insurance is financial services with healthcare data complexity. They handle PII, PHI, and financial records simultaneously. Lead with "how do your adjusters access claims systems in the field?" — mobile credential management is usually the gap.|CALL OPENER: "When a field adjuster accesses your claims system from a personal device, what credential and device controls are enforced?"`,
  'media-entertainment':`Media companies have freelancers, agencies, and shared social accounts. Lead with "who has access to your brand's social media credentials right now?" — the answer is always terrifying.|CALL OPENER: "If a freelancer who managed your social channels last quarter still has the login credentials, would you know?"`,
  'energy-utilities':`Energy and utilities face NERC CIP compliance for critical infrastructure. Shared credentials on SCADA systems are the nightmare scenario. Lead with operational technology access.|CALL OPENER: "How are credentials managed for your SCADA and operational technology systems — are those in the same system as your corporate passwords?"`,
  'life-sciences':`Life sciences faces FDA 21 CFR Part 11 requirements for electronic records. Every credential event needs an audit trail. Lead with "can you prove who accessed what system during your last FDA audit?"|CALL OPENER: "When FDA auditors ask for electronic access records during an inspection, how quickly can you produce credential audit evidence?"`,
  'hospitality-travel':`Hospitality has massive seasonal staffing, shared workstations, and franchise complexity. Lead with "how do your front desk staff share reservation system credentials across shifts?"|CALL OPENER: "Across your properties, how many shared credentials exist for front desk, POS, and reservation systems — and who tracks rotation?"`,
  'professional-services':`Professional services firms have partner-level access, client confidentiality, and contractor churn. Lead with "how do you manage client system credentials when an engagement ends?"|CALL OPENER: "When an engagement team rolls off a client, how do you ensure all client system credentials are revoked — not just deactivated in your IdP?"`,
  'fintech-crypto':`Fintech handles financial data with startup-speed engineering. Lead with "how do your developers manage production database credentials and API keys?" — the answer reveals secrets sprawl.|CALL OPENER: "How many production API keys and database credentials are currently in environment variables or config files instead of a secrets manager?"`,
  'real-estate':`Real estate has agents, brokers, and property management staff accessing multiple MLS systems and client portals. Lead with "how do your agents manage credentials for the 12+ systems they access daily?"|CALL OPENER: "When an agent leaves your brokerage, how many different system credentials need to be revoked — and who tracks that list?"`,
  'biotech-labs':`Biotech labs have strict IP protection requirements and regulatory audit needs. Lead with "how do you control access to your research data systems and electronic lab notebooks?"|CALL OPENER: "If a researcher left for a competitor, how quickly could you confirm they no longer have access to your proprietary research systems?"`,
  'msp':`MSPs manage credentials for dozens or hundreds of client environments. Lead with "how do your technicians manage credentials across all your client environments — and what happens when a tech leaves?"|CALL OPENER: "When one of your technicians leaves, how many client environments need credential rotation — and how long does that take?"`,
  retail_custom:'',
};

window.askHubSend = async function(q){
  if(!q||!q.trim())return;
  const msgs=document.getElementById('ask-hub-msgs');
  const input=document.getElementById('ask-hub-input');
  if(input)input.value='';
  msgs.innerHTML+=`<div style="margin-bottom:8px;text-align:right"><span style="display:inline-block;padding:6px 12px;border-radius:10px 10px 2px 10px;background:#1769FF22;color:var(--t1);font-size:12px;max-width:280px;text-align:left">${q}</span></div>`;
  msgs.innerHTML+=`<div id="ask-hub-loading" style="margin-bottom:8px"><span style="display:inline-block;padding:6px 12px;border-radius:10px 10px 10px 2px;background:var(--surface);color:var(--t3);font-size:11px">Thinking...</span></div>`;
  msgs.scrollTop=msgs.scrollHeight;
  const sysP=`You are a 1Password CSM expert assistant embedded in the EPM Hub. Answer questions using your knowledge of: 1Password EPM features (34), SaaS Manager features (14), Device Trust features (12), 16 competitors (LastPass, Bitwarden, Keeper, Dashlane, CyberArk, HashiCorp, Nudge Security, BetterCloud, Torii, Zylo, Productiv, Jamf, Kandji, CrowdStrike, Kolide, Tanium), 18 industries, and 14 departments. Be specific, actionable, and cite specific features/data. Keep answers under 300 words. Format with bold and bullet points for readability.`;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:sysP,messages:[{role:'user',content:q}]})});
    const d=await r.json();
    const text=(d.content||[]).map(b=>b.text||'').join('').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n- /g,'\n• ').replace(/\n/g,'<br>');
    const el=document.getElementById('ask-hub-loading');
    if(el)el.outerHTML=`<div style="margin-bottom:8px"><span style="display:inline-block;padding:8px 12px;border-radius:10px 10px 10px 2px;background:var(--surface);border:1px solid var(--border);color:var(--t1);font-size:12px;line-height:1.6;max-width:320px">${text}</span></div>`;
    msgs.scrollTop=msgs.scrollHeight;
  }catch(e){
    const el=document.getElementById('ask-hub-loading');
    if(el)el.outerHTML=`<div style="margin-bottom:8px"><span style="display:inline-block;padding:6px 12px;border-radius:10px;background:#EF444410;border:1px solid #EF444430;color:#EF4444;font-size:11px">Error: ${e.message}</span></div>`;
  }
};

window.generatePrepSheet = async function(){
  const company=document.getElementById('prep-company')?.value||'Unknown';
  const industry=document.getElementById('prep-industry')?.value||'';
  const brief=document.getElementById('prep-brief')?.value||'';
  const prods=[];
  if(document.getElementById('prep-epm')?.checked)prods.push('EPM');
  if(document.getElementById('prep-saas')?.checked)prods.push('SaaS Manager');
  if(document.getElementById('prep-dt')?.checked)prods.push('Device Trust');
  const competitor=document.getElementById('prep-competitor')?.value||'';
  const renewal=document.getElementById('prep-renewal')?.value||'';
  const out=document.getElementById('prep-output');if(!out)return;
  out.innerHTML=`<div style="text-align:center;padding:20px"><div class="spinner" style="width:24px;height:24px;border:3px solid var(--border);border-top-color:#10B981;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px"></div><div style="font-size:12px;color:#10B981">Generating feature-focused call prep for ${company}...</div></div>`;
  const indName=INDUSTRIES[industry]?.name||industry;
  const compName=(COMPETITORS[competitor]||SAAS_MANAGER_COMPETITORS[competitor]||DEVICE_TRUST_COMPETITORS[competitor])?.name||competitor;
  const sysP=`You are a senior 1Password CSM preparing a feature-focused call prep. Your goal is to help the CSM showcase deep product expertise, map specific 1Password features to the customer's pain points, and uncover new use cases for our database.

PRODUCT KNOWLEDGE:
- EPM features: Vault management, SCIM Bridge, Hosted SCIM, Events API, Watchtower, Travel Mode, Guest Accounts, Item Expiry, 1Password CLI, Secrets Automation, Secret References, Passkeys, QR Sign-In, Families for Business
- SaaS Manager features: Multi-source Discovery (5 signals incl EPM vault), Shadow IT + Shadow AI Detection, Automated Onboarding/Offboarding, Access Reviews, Savings Tracker, CFO Reporting, Workflow Builder
- Device Trust features: 125+ real-time health checks, BYOD without MDM, SSF integrations (Zscaler/Duo/Netskope/Okta), Guided Self-Remediation, Compliance Reporting, Linux + Non-Standard Device Support

FORMAT: You MUST return pure HTML with inline styles — NEVER markdown. No ## headers, no ** bold, no - bullets, no --- dividers. Use <h2>, <strong>, <div>, <ul><li> HTML tags instead. CRITICAL: This renders on a DARK background (#0A1929). Use ONLY: #F0F6FF for headings, #C8DFFA for body text, #10B981 for features/positive, #3A9EFF for questions/links, #EF4444 for landmines, #F59E0B for upsell, #A78BFA for discovery. NEVER use dark text, black, gray, or colors below #888. Backgrounds should be transparent or very dark (#0A192910) with #1A3050 borders.`;

  const userP=`Company: ${company}
Industry: ${indName}
Products owned: ${prods.join(', ')||'Unknown'}
Competitor threat: ${compName||'None identified'}
Renewal date: ${renewal||'Not specified'}
${brief ? `\nACCOUNT BRIEF (context from CRM/prior calls/AI summary):\n${brief}\n` : ''}
Generate a FEATURE-FOCUSED CALL PREP with these sections:

1. 🎯 FEATURE SPOTLIGHT — Top 3 specific 1Password features to demo or discuss on this call. For each: the feature name, why it matters for THIS customer's situation${brief?' (use the account brief context)':''}, and the exact pain point it solves. Be specific — name the feature, not a category.

2. 🚫 LANDMINES — Top 3 things to NOT bring up or avoid on this call. Be specific to this customer's situation${brief?' based on the account brief':''}. Include why each is a landmine.

3. 📈 UPSELL OPPORTUNITY — Which product to pitch next (EPM → SaaS Manager → Device Trust expansion path) and WHY for this specific customer. Include the specific feature within that product that would resonate most and the business case for it.

4. ${compName?`⚔️ COMPETITIVE POSITIONING — How to position against ${compName} without trash-talking. Include one specific feature advantage and one trap question.`:'⚔️ COMPETITIVE POSITIONING — Key differentiators to emphasize if a competitor comes up.'}

5. 💬 CALL OPENER — One specific opening question that demonstrates expertise in their industry and gets them talking about pain points.

6. 🔍 USE CASE DISCOVERY QUESTIONS — 4 questions designed to uncover NEW use cases we haven't documented yet. These should probe for: (a) workflows we haven't mapped, (b) departments/teams we haven't reached, (c) compliance requirements we haven't addressed, (d) integration scenarios we haven't built for. Frame each question to surface actionable intelligence for our use case database.`;

  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,system:sysP,messages:[{role:'user',content:userP}]})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error?.message||'API error '+r.status);
    const raw=(d.content||[]).map(b=>b.text||'').join('');const html=mdToHtml(raw);
    out.innerHTML=`<div class="claude-output" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px 20px;line-height:1.7;font-size:12px">${html}</div>`;
  }catch(e){out.innerHTML=`<div style="padding:14px;background:#EF444410;border:1px solid #EF444430;border-radius:7px;color:#EF4444;font-size:12px">Error: ${e.message}</div>`;}
};
