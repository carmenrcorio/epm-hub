technology:{color:'#A78BFA',emoji:'💻',name:'Technology & SaaS',hook:'Tech companies ship fast. Security cannot be the slowdown. The most costly breaches in software history started with a single unmanaged credential.',why:'Technology companies come to 1Password when a developer accidentally pushes a credential to a public repo, when a SOC 2 audit requires secrets management evidence, or when a security-conscious CISO joins and finds secrets scattered across .env files and Slack messages.',pains:['Secrets hardcoded in repositories — the leading cause of production credential breaches in software companies','No centralized secrets management across CI/CD pipelines — GitHub Secrets, CircleCI env vars, K8s secrets all siloed','SSH keys on developer laptops unencrypted, without passphrases, and never rotated','Contractor and agency access to staging and production environments with no expiry','SOC 2 Type II audit requirement for credential access evidence that developers can\'t produce','Offboarded engineers retaining repo access and production credentials for weeks after departure'],solutions:[{tag:'SECRETS',tc:'#A78BFA',bc:'#7C3AED18',name:'CLI + Secret References',fid:'cli',desc:'Zero hardcoded credentials. Secrets injected at runtime — architecturally impossible to hardcode a value.'},{tag:'PIPELINE',tc:'#4D8EFF',bc:'#1769FF18',name:'Secrets Automation',fid:'secrets-automation',desc:'GitHub Actions, CircleCI, GitLab CI, Jenkins, Terraform — all native. Rotate once, all consumers update.'},{tag:'SSH',tc:'#10B981',bc:'#10B98118',name:'SSH Key Management',fid:'ssh',desc:'SSH keys in 1Password, used via SSH agent. Watchtower flags unencrypted keys. Every use logged.'},{tag:'AUDIT',tc:'#00C4BE',bc:'#00C4BE18',name:'Events API → SIEM',fid:'events-api',desc:'SOC 2 continuous audit trail. Every vault access, 365-day retention.'},{tag:'LIFECYCLE',tc:'#F59E0B',bc:'#F59E0B18',name:'SCIM Bridge',fid:'scim',desc:'Developers provisioned day one and deprovisioned within minutes of offboarding.'},{tag:'MACHINE',tc:'#EF4444',bc:'#EF444418',name:'Service Accounts',fid:'service-accounts',desc:'Named machine identities for CI/CD pipelines — every automated workflow auditable.'}],compliance:['SOC 2 Type II','ISO 27001','GDPR','CCPA','FedRAMP'],breach:{name:'SolarWinds Supply Chain Attack',date:'October 2019 – December 2020',body:'The password "solarwinds123" — accidentally posted to a public GitHub repo by an intern — gave Russian intelligence operatives access to SolarWinds\' software build pipeline. They injected malicious code into the Orion platform update distributed to 18,000+ organizations, including nine US federal agencies. The breach went undetected for 14 months.',sources:'CISA Emergency Directive 21-01 · US Senate Intel Committee Hearing, Feb 2021 · SolarWinds SEC 8-K Filing, 2021',prevention:'With 1Password CLI and Secrets Automation, no credential ever touches source code or version control — secrets injected at runtime via Secret References, leaving nothing for an attacker to find in any repo. Watchtower would have flagged the exposed credential within hours. Events API would have surfaced the unauthorized build system access — weeks into the attack, not 14 months later.',features:['cli','secret-refs','secrets-automation','watchtower','events-api','firewall']},personas:[{role:'Engineering Lead / VP Eng',q:'"If I searched your entire codebase and CI/CD pipeline configs right now, how many plaintext credentials would I find?"'},{role:'CISO',q:'"When your next SOC 2 auditor asks for credential access evidence from production systems, what are you going to show them?"'},{role:'Security Engineer',q:'"How long to rotate every production secret if one of your developers\' laptops was compromised today?"'},{role:'DevOps Lead',q:'"Are any CI/CD pipelines running under human credentials — and what happens to that access when that person leaves?"'}],stats:[{n:'$850K',l:'Average annual savings for 1,000-person org (Forrester TEI, 2022)'},{n:'Zero',l:'Secrets in codebases with CLI + Secret References'},{n:'80%+',l:'Of breaches involve a credential element'}]},
legal:{color:'#F59E0B',emoji:'⚖️',name:'Legal & Professional Services',hook:'Legal teams work with the most sensitive information in any organization. A credential breach can breach attorney-client privilege, violate bar ethics rules, and destroy client relationships that took decades to build.',why:'Law firms arrive at 1Password through cyber insurance renewal requirements, a client data protection clause, or an Am Law / Big Four security assessment. The driver is almost always external — a client asking "how do you protect our matter data?" and the firm not having a good answer.',pains:['Matter-specific credentials shared across associates with no access controls','Attorney-client privilege at risk when matter credentials travel through unencrypted channels','International travel exposing full vault access to border searches in jurisdictions with disclosure requirements','Contractor and paralegal access to matter systems persisting beyond engagement end','No audit trail for who accessed which client matter system — bar ethics and malpractice liability','Secure document sharing with clients and opposing counsel that doesn\'t involve emailing passwords'],solutions:[{tag:'TRAVEL',tc:'#F59E0B',bc:'#F59E0B18',name:'Travel Mode',fid:'travel-mode',desc:'Partners crossing international borders — vaults disappear at customs. Client matter credentials invisible. No competitor has this.'},{tag:'MATTER',tc:'#4D8EFF',bc:'#1769FF18',name:'Least-Privilege Vaults',fid:'app-policies',desc:'Matter-specific vaults scoped to only attorneys and staff on that matter — no cross-matter credential bleed.'},{tag:'SHARE',tc:'#00C4BE',bc:'#00C4BE18',name:'Secure Item Sharing',fid:'secure-sharing',desc:'Share client portal access with external counsel via encrypted links — time-limited, no 1Password account required.'},{tag:'VENDOR',tc:'#10B981',bc:'#10B98118',name:'Guest Accounts + Item Expiry',fid:'guest-accounts',desc:'Paralegal and contractor access with automatic expiry at engagement end.'},{tag:'AUDIT',tc:'#A78BFA',bc:'#7C3AED18',name:'Events API',fid:'events-api',desc:'Full audit trail — bar ethics evidence, malpractice defense documentation, client audit log requests.'},{tag:'DOCS',tc:'#EF4444',bc:'#EF444418',name:'Credential Management',fid:'cred-mgmt',desc:'Executed contracts, NDA templates, matter credentials in encrypted vaults with granular access controls.'}],compliance:['ABA Model Rules','GDPR','CCPA','State bar security rules','Client contractual requirements','Cyber insurance requirements'],breach:{name:'DLA Piper Ransomware Attack (NotPetya)',date:'June 2017',body:'DLA Piper — one of the world\'s largest law firms — was hit by NotPetya ransomware, which propagated through their global network using stolen credentials and lateral movement through systems with no access segmentation. The firm\'s email, document management systems, and phone systems were taken offline globally for days. Attorneys could not access client matter files.',sources:'Reuters, June 2017 · American Lawyer coverage, 2017 · Wired — "NotPetya: The Cyberattack That Shook the World"',prevention:'Least-privilege vault segmentation by matter and practice group would have limited lateral movement. Events API would have surfaced the anomalous lateral credential use in real time. SCIM-enforced lifecycle management ensures stale credentials that ransomware exploits are cleaned up the moment staff depart.',features:['app-policies','events-api','scim','firewall','auth-policies','travel-mode']},personas:[{role:'Managing Partner / COO',q:'"When a partner crosses an international border, what controls prevent border agents from accessing client matter credentials?"'},{role:'IT Director / CISO',q:'"When a matter closes, do former paralegals and co-counsel still have credentials to those client portals?"'},{role:'General Counsel',q:'"If a client asked for an audit log of who accessed their matter portal over the last 12 months, how long would that take?"'},{role:'Practice Group Leader',q:'"When an associate leaves mid-matter, how do you ensure they no longer have access to client systems?"'}],stats:[{n:'$6.9M',l:'Average professional services breach cost (IBM, 2023)'},{n:'25%',l:'Of law firm breaches involve insider access or credential misuse'},{n:'100%',l:'Of Am Law 100 firms experienced a breach or cyber incident (ABA, 2022)'}]},
retail:{color:'#EF4444',emoji:'🛍️',name:'Retail & E-Commerce',hook:'Retail operates on two credential time bombs: seasonal workforce sprawl that creates hundreds of ghost accounts every January, and social media credentials flying through Slack DMs to agencies.',why:'Retail organizations arrive at 1Password through PCI-DSS compliance audit findings or a brand crisis triggered by unauthorized social media access. The seasonal workforce problem surfaces every Q1 when IT gets asked to audit access after the holiday season and discovers they can\'t.',pains:['200 seasonal workers in November, 40 in January — no systematic offboarding of the other 160\'s access','Social media credentials (Instagram, TikTok, Meta Ads) shared via Slack DMs with agencies','PCI-DSS credential controls around payment systems built on shared passwords','Multiple platform integrations (Shopify, Meta Ads, Salesforce) with no central credential governance','Brand safety risk from a single compromised agency social login','High staff turnover across stores and fulfillment creating constant offboarding gaps'],solutions:[{tag:'SEASONAL',tc:'#EF4444',bc:'#EF444418',name:'SCIM + Item Expiry',fid:'scim',desc:'Seasonal workforce solved. Auto-provision in October, credentials self-expire in January. No IT tickets. No ghost access.'},{tag:'SOCIAL',tc:'#F59E0B',bc:'#F59E0B18',name:'Guest Accounts + Secure Sharing',fid:'guest-accounts',desc:'Agency gets encrypted access to social credential — never sees the raw password. One revoke and they\'re out.'},{tag:'PCI',tc:'#10B981',bc:'#10B98118',name:'Events API + Watchtower',fid:'events-api',desc:'PCI credential health across all payment-adjacent systems. Continuous compliance evidence.'},{tag:'GOVERN',tc:'#4D8EFF',bc:'#1769FF18',name:'Least-Privilege Vaults',fid:'app-policies',desc:'Store, ops, ecommerce, finance — separate vault structures. Seasonal workers can\'t access payment credentials.'},{tag:'SHARE',tc:'#00C4BE',bc:'#00C4BE18',name:'Secure Item Sharing',fid:'secure-sharing',desc:'Share Shopify, Google Ads, Meta credentials with agencies via time-limited encrypted links.'},{tag:'AUDIT',tc:'#A78BFA',bc:'#7C3AED18',name:'Usage Reports',fid:'usage-reports',desc:'See exactly which agency accessed which platform credential at what time.'}],compliance:['PCI-DSS','GDPR','CCPA','State consumer privacy laws'],breach:{name:'Target Data Breach',date:'November–December 2013',body:'Attackers gained access to Target\'s network via stolen credentials from a third-party HVAC vendor. The vendor had network access for remote monitoring — but that access was never segmented from Target\'s payment card systems. Attackers installed malware on POS systems and exfiltrated 40 million credit and debit card records and 70 million customer records. Target paid $292M in settlements. The CEO and CIO resigned. The breach lasted 19 days before detection.',sources:'Senate Commerce Committee Report, 2014 · Target SEC 8-K Filings, 2013–2014 · Krebs on Security investigative reporting',prevention:'Third-party vendor access governed by Guest Accounts with explicit vault scoping would have prevented the HVAC vendor\'s credentials from reaching payment system networks. Item Expiry on vendor credentials would have auto-revoked access at contract end. Events API would have surfaced the anomalous lateral movement within hours, not 19 days.',features:['guest-accounts','item-expiry','events-api','app-policies','scim','firewall']},personas:[{role:'IT Admin / IT Director',q:'"When your seasonal workforce wraps up, how long to fully revoke their credential access — including shared credentials they were added to?"'},{role:'VP Marketing / Brand',q:'"How many agencies and freelancers currently have access to your social media accounts?"'},{role:'CFO / Finance',q:'"What evidence can you produce if a PCI auditor asks for access logs to payment system credentials last quarter?"'},{role:'CISO',q:'"If a vendor\'s credentials were compromised today, how long to identify which of your systems they could access?"'}],stats:[{n:'$292M',l:'Target breach settlement — one vendor credential'},{n:'40M',l:'Card records stolen in Target breach'},{n:'19 days',l:'Breach duration before detection — Events API changes this'}]},
manufacturing:{color:'#60A5FA',emoji:'🏭',name:'Manufacturing & Industrial',hook:'In manufacturing, a compromised OT credential is not just an IT incident — it is a production stoppage, a safety risk, and a supply chain crisis all at once.',why:'Manufacturing organizations arrive at 1Password through an ICS/OT security assessment that surfaces credential chaos, a cyber insurance requirement, or CMMC compliance pressure for defense manufacturing participants. The trigger is a third-party assessment asking "show us your OT credential governance" and the answer is a spreadsheet.',pains:['OT system credentials (SCADA, PLCs, HMI) stored in spreadsheets or taped to equipment','Vendor and contractor remote access credentials never formally revoked — active VPN creds from contractors years after engagement end','ERP admin credentials shared across engineering teams with no individual attribution','No audit trail for remote access to production systems — critical for IEC 62443 and NIST CSF compliance','IT/OT convergence creating credential sprawl across previously siloed environments','High workforce turnover in facilities creating persistent offboarding credential gaps'],solutions:[{tag:'OT/IT',tc:'#60A5FA',bc:'#1769FF18',name:'Credential Management Vaults',fid:'cred-mgmt',desc:'Centralize OT, ERP, SCADA, and HMI credentials in auditable vaults — replacing spreadsheets and notebooks.'},{tag:'VENDOR',tc:'#F59E0B',bc:'#F59E0B18',name:'Guest Accounts + Item Expiry',fid:'guest-accounts',desc:'Vendor remote access with automatic expiry. Engagement ends, access self-destructs.'},{tag:'AUDIT',tc:'#10B981',bc:'#10B98118',name:'Events API',fid:'events-api',desc:'Audit logs for ISO 27001, NIST CSF, IEC 62443, and CMMC. Every OT system credential access attributable.'},{tag:'LIFECYCLE',tc:'#4D8EFF',bc:'#1769FF18',name:'SCIM Bridge',fid:'scim',desc:'Plant and facility staff provisioning automated — access follows org chart changes in real time.'},{tag:'MONITOR',tc:'#A78BFA',bc:'#7C3AED18',name:'Business Watchtower',fid:'watchtower',desc:'Continuous credential health monitoring. Flag stale or compromised OT-adjacent credentials before auditors find them.'},{tag:'SHARE',tc:'#00C4BE',bc:'#00C4BE18',name:'Secure Item Sharing',fid:'secure-sharing',desc:'Share maintenance credentials with field technicians via time-limited encrypted links.'}],compliance:['IEC 62443','NIST CSF','ISO 27001','CMMC (defense)','NERC CIP'],breach:{name:'Oldsmar Water Treatment Facility Attack',date:'February 2021',body:'An attacker gained remote access to the Oldsmar, Florida water treatment facility\'s industrial control systems using TeamViewer — software using shared credentials with no MFA. The attacker increased sodium hydroxide levels to 111 times normal. An operator noticed and reversed the change minutes later. The shared credentials for the remote access tool had never been individually attributed, audited, or rotated.',sources:'Pinellas County Sheriff Statement, Feb 2021 · CISA Advisory AA21-042A · FBI Flash MC-000140-MW',prevention:'Individual-attributed credentials with MFA enforcement for all remote access tools — the shared TeamViewer credential that gave entry would not have existed. Guest Accounts with time-limited access means no persistent remote credential is left open between maintenance windows. Events API would have flagged the anomalous access as a credential-correlated event in the SIEM.',features:['auth-policies','guest-accounts','item-expiry','events-api','firewall','app-policies']},personas:[{role:'OT Security Manager / Plant IT',q:'"If I asked you to list every active remote access credential to your production systems right now — including vendor access — how long would that take?"'},{role:'CISO / VP IT',q:'"When a maintenance contractor finishes a job, what\'s the process to revoke their access credentials?"'},{role:'Operations Director',q:'"If your ERP admin credentials were compromised today, how long to know — and how long would production be down?"'},{role:'Compliance / Risk',q:'"What evidence do you have showing individual attribution for every OT system access event for your IEC 62443 assessment?"'}],stats:[{n:'$4.45M',l:'Average manufacturing breach cost (IBM, 2023)'},{n:'62%',l:'Of ICS/OT attacks involve credential-based initial access (Dragos, 2023)'},{n:'2019',l:'Year of oldest active vendor VPN credential found in typical OT audit'}]},
education:{color:'#10B981',emoji:'🎓',name:'Education',hook:'Education institutions are among the most heavily targeted organizations in the world — they hold student PII, financial aid data, and research IP, with security budgets a fraction of financial services firms.',why:'Universities and K-12 districts arrive at 1Password through a ransomware recovery process, a FERPA or HIPAA audit finding, or a state-level data security mandate. Research universities have an additional driver: federally funded research with export control requirements that demand credential governance for lab system access.',pains:['Shared faculty and staff credentials for administrative systems (SIS, LMS, financial aid portals) with no individual attribution','Student data exposure risk from researchers sharing system access with graduate students and postdocs','IT resources too thin to manage manual provisioning across high-turnover populations','Legacy systems with hardcoded admin credentials that haven\'t changed since installation','FERPA breach risk from credential sharing with unauthorized parties','Research IP — lab system credentials shared in group chats or posted in shared drives'],solutions:[{tag:'FERPA',tc:'#10B981',bc:'#10B98118',name:'Events API → SIEM',fid:'events-api',desc:'FERPA-compliant audit trail showing who accessed student record systems when. Individual attribution on every access event.'},{tag:'LIFECYCLE',tc:'#4D8EFF',bc:'#1769FF18',name:'SCIM Bridge',fid:'scim',desc:'Automate provisioning across the constant churn of students, adjuncts, and research staff.'},{tag:'RESEARCH',tc:'#A78BFA',bc:'#7C3AED18',name:'Least-Privilege Vaults',fid:'app-policies',desc:'Research lab credentials segmented by PI, project, and funding source. ITAR compliance enforced.'},{tag:'SHARING',tc:'#F59E0B',bc:'#F59E0B18',name:'Guest Accounts + Item Expiry',fid:'guest-accounts',desc:'Graduate student access to lab systems with automatic expiry at graduation or end of appointment.'},{tag:'POLICY',tc:'#EF4444',bc:'#EF444418',name:'Auth Policies (MFA)',fid:'auth-policies',desc:'Enforce MFA across all administrative system access — the highest-impact control for dispersed user populations.'},{tag:'BENEFIT',tc:'#00C4BE',bc:'#00C4BE18',name:'Free 1Password Families',fid:'free-families',desc:'Faculty and staff personal credential hygiene drives adoption in resource-constrained environments.'}],compliance:['FERPA','HIPAA (campus health)','GLBA (financial aid)','ITAR/EAR (research)','State data security laws','NIST CSF'],breach:{name:'Los Angeles Unified School District Ransomware',date:'September 2022',body:'LAUSD — the second largest school district in the US — suffered a ransomware attack by Vice Society that exfiltrated 500GB of sensitive student and staff data including psychological assessments, medical records, and Social Security numbers. The initial access vector was compromised credentials. The district had no centralized credential governance. Recovery took months and cost tens of millions.',sources:'LAUSD official statement, Sep 2022 · CISA/FBI advisory AA22-249A · LA Times coverage',prevention:'Centralized credential governance with MFA enforcement eliminates the compromised credential initial access vector. SCIM-automated deprovisioning closes the stale account gap ransomware operators exploit. Events API would have surfaced the anomalous access patterns in real time — before exfiltration completed.',features:['auth-policies','events-api','scim','domain-breach','watchtower','app-policies']},personas:[{role:'CTO / CISO',q:'"How many former employees, adjuncts, and graduated students still have active access credentials to your administrative systems?"'},{role:'IT Director',q:'"If a graduate student who finished six months ago still has access to lab research system credentials, how would you know?"'},{role:'Research Compliance',q:'"For ITAR-controlled research systems, can you produce an access log with individual attribution for every credential use in the last 12 months?"'},{role:'CFO / Provost',q:'"What does a ransomware attack that takes your SIS and financial aid systems offline for two weeks cost this institution?"'}],stats:[{n:'$3.65M',l:'Average education sector breach cost (IBM, 2023)'},{n:'#3',l:'Education is the third most targeted sector for ransomware'},{n:'500GB',l:'Student data exfiltrated from LAUSD in 2022 ransomware attack'}]},
nonprofit:{color:'#F59E0B',emoji:'🤝',name:'Nonprofit & NGO',hook:'Nonprofits are high-value targets — they hold donor financial data, beneficiary PII, and often operate in geopolitically sensitive environments where staff travel internationally with sensitive information.',why:'Nonprofits and NGOs arrive at 1Password through a cyber insurance requirement, a major donor security audit requirement, or an incident. International humanitarian organizations have a specific travel driver — field staff in high-risk jurisdictions with device seizure risk and no credential governance.',pains:['High volunteer and contractor turnover with no credential offboarding — active accounts from volunteers years ago','Social media and fundraising platform credentials shared across remote staff with no individual attribution','International field staff traveling with device and credential exposure risk in authoritarian or conflict-adjacent jurisdictions','Donor PII and financial data in systems with shared admin credentials and no audit trail','Board and leadership document systems accessible via shared credentials with no access governance','Limited IT resources to manage credential governance across a distributed global workforce'],solutions:[{tag:'TRAVEL',tc:'#F59E0B',bc:'#F59E0B18',name:'Travel Mode',fid:'travel-mode',desc:'Field staff in high-risk jurisdictions — sensitive program credentials invisible at border. Device seizure reveals nothing.'},{tag:'SHARE',tc:'#4D8EFF',bc:'#1769FF18',name:'Guest Accounts + Secure Sharing',fid:'guest-accounts',desc:'Volunteer and contractor access with automatic expiry. Social credentials shared via encrypted links — revocable at any time.'},{tag:'LIFECYCLE',tc:'#10B981',bc:'#10B98118',name:'SCIM Bridge',fid:'scim',desc:'Volunteer and staff provisioning and deprovisioning automated — closes the stale volunteer access gap.'},{tag:'AUDIT',tc:'#00C4BE',bc:'#00C4BE18',name:'Events API',fid:'events-api',desc:'Donor data protection audit trail. Cyber insurance and major donor security requirements met.'},{tag:'MONITOR',tc:'#A78BFA',bc:'#7C3AED18',name:'Watchtower + Domain Breach Report',fid:'domain-breach',desc:'Instant alerts when staff emails appear in breaches — critical when staff may be targeted by state actors.'},{tag:'BENEFIT',tc:'#EF4444',bc:'#EF444418',name:'Free 1Password Families',fid:'free-families',desc:'Every staff member gets personal credential protection — drives adoption in resource-constrained environments.'}],compliance:['GDPR (EU operations)','CCPA','PCI-DSS (fundraising)','State charity registrations','Donor contractual requirements','Cyber insurance requirements'],breach:{name:'ICRC (Red Cross) Data Breach',date:'January 2022',body:'The International Committee of the Red Cross suffered a breach of data on 515,000+ highly vulnerable people — including those separated from family members during conflict and disaster. Attackers used credential harvesting techniques to move through systems. The data was used by the ICRC\'s Restoring Family Links program — its compromise directly threatened beneficiary safety in conflict zones.',sources:'ICRC public statement, Jan 2022 · Reuters, Jan 2022 · ICRC supplemental technical statement',prevention:'MFA enforcement across all systems hosting beneficiary data closes the credential harvesting attack vector. Events API would have surfaced the anomalous credential access patterns in real time. Least-privilege vault segmentation means a compromised credential in one program area cannot reach beneficiary data in another. Travel Mode protects field staff credentials in the same conflict-adjacent environments.',features:['auth-policies','events-api','app-policies','travel-mode','domain-breach','scim']},personas:[{role:'Executive Director / COO',q:'"How many former volunteers and contractors still have active access to your donor database and beneficiary systems?"'},{role:'IT Manager / Operations',q:'"When a field staff member travels to a high-risk country, what controls prevent device seizure from exposing your program system credentials?"'},{role:'Development / Fundraising Director',q:'"If a donor asked how you protect their personal and financial information, what specific controls could you describe?"'},{role:'Board / Audit Committee',q:'"What does our cyber insurance actually require for credential governance, and are we currently compliant?"'}],stats:[{n:'$3.86M',l:'Average nonprofit sector breach cost (IBM, 2023)'},{n:'515K',l:'Vulnerable individuals\' data exposed in ICRC breach'},{n:'30%',l:'Of nonprofits experienced a breach in the past 2 years (TechImpact, 2023)'}]},
};


Object.assign(INDUSTRIES,{
government:{color:'#3B82F6',emoji:'🏛️',name:'Government & Public Sector',
hook:'Government agencies are the highest-value credential targets on earth. Nation-state actors, ransomware groups, and hacktivists all treat public sector credentials as a strategic resource — and most agencies are running on legacy identity infrastructure that hasn\'t been meaningfully updated in a decade.',
why:'Government entities arrive at 1Password through three paths: a Zero Trust Architecture mandate (Executive Order 14028), a FISMA or FedRAMP audit finding that surfaces credential governance gaps, or a ransomware incident that shuts down citizen services. The OMB M-22-09 memo\'s explicit requirement for phishing-resistant MFA across federal agencies created a compliance mandate that many agencies are still working to fulfill.',
pains:['Legacy shared credentials across agency systems that predate modern identity governance — password123 is not a joke in federal IT','No individual attribution on access to systems containing citizen PII, law enforcement data, or classified-adjacent information','Contractor and vendor access to government networks that persists indefinitely — the average federal contractor retains access 3x longer than commercial equivalents','FISMA continuous monitoring requirements with no mechanism to produce the required audit evidence on credential access','Phishing-resistant MFA mandate (OMB M-22-09) with no practical path to passkey or hardware key deployment at scale','Shared workstations across agency offices where multiple staff authenticate to the same endpoint with shared credentials'],
solutions:[{tag:'MFA',tc:'#3B82F6',bc:'#3B82F618',name:'Passkeys + Auth Policies',fid:'passkeys',desc:'Phishing-resistant authentication that satisfies OMB M-22-09 without hardware token procurement. FIDO2-compliant passkeys plus org-wide MFA enforcement in one policy toggle.'},{tag:'AUDIT',tc:'#10B981',bc:'#10B98118',name:'Events API → SIEM',fid:'events-api',desc:'FISMA continuous monitoring satisfied. Every credential access event timestamped and streaming to your SIEM. FedRAMP audit evidence on demand.'},{tag:'LIFECYCLE',tc:'#F59E0B',bc:'#F59E0B18',name:'SCIM Bridge',fid:'scim',desc:'Contractor access provisioned on day one and revoked the moment their contract ends — closes the chronic over-retention gap that drives federal audit findings.'},{tag:'ZERO TRUST',tc:'#A78BFA',bc:'#7C3AED18',name:'Least-Privilege Vaults',fid:'app-policies',desc:'Role-based vault segmentation enforces least-privilege at the credential layer — a core Zero Trust Architecture requirement.'},{tag:'GEO',tc:'#00C4BE',bc:'#00C4BE18',name:'Firewall Rules',fid:'firewall',desc:'Geographic access restrictions block foreign IP ranges from accessing agency credential stores. State-sponsored attack mitigation at the access layer.'},{tag:'VENDOR',tc:'#EF4444',bc:'#EF444418',name:'Guest Accounts + Item Expiry',fid:'guest-accounts',desc:'Contractor access scoped and time-limited. No more indefinite system access outlasting the contract by months or years.'}],
compliance:['FISMA','FedRAMP','NIST SP 800-53','OMB M-22-09 (phishing-resistant MFA)','CISA Zero Trust Maturity Model','CMMC (defense contractors)'],
breach:{name:'OPM Data Breach',date:'2014–2015 (discovered June 2015)',body:'The US Office of Personnel Management breach — attributed to Chinese intelligence — exposed security clearance investigation records for 21.5 million current and former federal employees, contractors, and their families. The attackers initially compromised credentials belonging to a third-party contractor with access to OPM\'s IT network. They then moved laterally using those credentials to reach the most sensitive databases the US government maintains: background investigation files for intelligence community personnel, including fingerprints for 5.6 million individuals. The breach went undetected for nearly a year.',sources:'OPM Congressional Testimony, June 2015 · FBI Director Comey Senate testimony · GAO Report GAO-15-725 · Washington Post investigative reporting',prevention:'Third-party contractor access governed by Guest Accounts with explicit vault scoping would have contained the initial compromise. SCIM-automated deprovisioning would have closed stale contractor access windows. Events API streaming to the SIEM would have surfaced the anomalous lateral movement across OPM systems. Geographic firewall rules would have flagged the China-originating access patterns within hours rather than months.',features:['guest-accounts','events-api','scim','firewall','auth-policies','app-policies']},
personas:[{role:'CISO / Deputy CISO',q:'"What\'s your current path to satisfying the OMB M-22-09 phishing-resistant MFA requirement — and does it extend to contractor accounts on legacy VPN infrastructure?"'},{role:'IT Director / CIO',q:'"For your FISMA continuous monitoring requirement — how are you producing credential access evidence today, and how much manual effort does that take per quarter?"'},{role:'Program Manager / Contracting Officer',q:'"When a contractor\'s engagement ends, what\'s the documented process to fully revoke their system access — and when was that process last audited?"'},{role:'Inspector General / Audit',q:'"If an auditor asked for a complete log of who accessed sensitive citizen data systems over the past 12 months, how long would it take to produce that?"'}],
stats:[{n:'21.5M',l:'Records stolen in OPM breach — one contractor credential'},{n:'OMB M-22-09',l:'Federal mandate for phishing-resistant MFA now in effect'},{n:'3x',l:'Longer average contractor access retention in government vs. commercial'}]},

energy:{color:'#F59E0B',emoji:'⚡',name:'Energy & Utilities',
hook:'Energy infrastructure is the most consequential credential attack surface in the world. A compromised OT credential doesn\'t lock up data — it can shut down pipelines, trip power grids, or manipulate water treatment. NERC CIP compliance demands credential governance most utilities can\'t currently demonstrate.',
why:'Energy and utilities organizations arrive at 1Password through NERC CIP audit findings, a cyber insurance incident, or — increasingly — a peer incident that hits too close to home. The Colonial Pipeline attack is the universal reference point. Every CISO in energy has been asked "could that happen to us?" The honest answer, for most, is yes — because the same attack vector (compromised VPN credential, no MFA) still exists in most utility environments.',
pains:['OT and ICS system credentials stored in spreadsheets, control room binders, or in the heads of operators approaching retirement','NERC CIP compliance requires documented access control evidence that most utilities cannot produce without weeks of manual assembly','VPN and remote access credentials for field technicians and contractors with no defined lifecycle — active credentials from departed employees discovered routinely in NERC audits','No individual attribution on SCADA and DCS system access — a shared control room login covers shifts across three crews with no way to distinguish who made a system change','Third-party vendor and OEM access to OT networks — the most dangerous and least governed access category in the sector','IT/OT convergence exposing previously air-gapped systems to credential-based attacks that originated in the IT network'],
solutions:[{tag:'NERC CIP',tc:'#F59E0B',bc:'#F59E0B18',name:'Events API → SIEM',fid:'events-api',desc:'NERC CIP-004, CIP-005, and CIP-007 evidence generated continuously. Every privileged credential access timestamped and attributable for NERC auditors.'},{tag:'OT VENDOR',tc:'#EF4444',bc:'#EF444418',name:'Guest Accounts + Item Expiry',fid:'guest-accounts',desc:'OEM and contractor remote access with defined expiry — the access window that enabled Colonial Pipeline closes here. Engagement ends, access self-destructs.'},{tag:'MFA',tc:'#4D8EFF',bc:'#1769FF18',name:'Auth Policies',fid:'auth-policies',desc:'MFA enforced on all remote access to OT-adjacent systems. The single control that would have stopped Colonial Pipeline. 30 seconds to enable.'},{tag:'LIFECYCLE',tc:'#10B981',bc:'#10B98118',name:'SCIM Bridge',fid:'scim',desc:'Operator onboarding and offboarding automated — closes the stale account gap that NERC auditors find in every review.'},{tag:'VAULT',tc:'#A78BFA',bc:'#7C3AED18',name:'Credential Management',fid:'cred-mgmt',desc:'SCADA, DCS, historian, and EMS credentials organized in auditable vaults by system type and access tier — replacing control room binders.'},{tag:'MONITOR',tc:'#00C4BE',bc:'#00C4BE18',name:'Business Watchtower',fid:'watchtower',desc:'Continuous credential health monitoring across IT and OT-adjacent credential stores. Proactive alerts before auditors or attackers find the exposure.'}],
compliance:['NERC CIP-004/005/006/007','NIST SP 800-82 (ICS Security)','IEC 62443','TSA Pipeline Security Directives','CISA Critical Infrastructure Guidelines'],
breach:{name:'Colonial Pipeline Ransomware Attack',date:'May 2021',body:'DarkSide ransomware operators gained initial access to Colonial Pipeline\'s network using a single compromised password — a VPN account that was no longer actively used but had never been deprovisioned. The account had no multi-factor authentication. Attackers used it to reach the IT network, then deployed ransomware that forced Colonial to proactively shut down 5,500 miles of pipeline carrying 45% of the East Coast\'s fuel supply. Eleven states declared states of emergency. Colonial paid a $4.4 million ransom. The FBI later recovered $2.3 million of that payment.',sources:'Colonial Pipeline congressional testimony, June 2021 · FBI press release · CISA Alert AA21-131A · Bloombergreporting on the recovered ransom',prevention:'The attack vector was a single deprovisioned VPN account with no MFA. SCIM-automated deprovisioning would have eliminated this account the day the employee left. Auth Policies requiring MFA on all remote access would have made the credential useless even if stolen. Events API would have surfaced the anomalous VPN authentication pattern — a credential that hadn\'t been used in months suddenly activating — within minutes.',features:['auth-policies','scim','events-api','guest-accounts','item-expiry','firewall']},
personas:[{role:'CISO / VP IT',q:'"If I asked you right now to produce a list of every active VPN credential for your OT-adjacent network — including vendor and contractor accounts — how long would that take, and are you confident there are no ghost credentials?"'},{role:'IT/OT Security Manager',q:'"Your third-party OEM and vendor remote access — when their maintenance window closes, what\'s the automated process that ensures those credentials are revoked?"'},{role:'Compliance / NERC CIP Manager',q:'"For your next NERC CIP audit, what evidence are you providing for CIP-007 access control requirements — and how is that evidence being assembled?"'},{role:'COO / VP Operations',q:'"Colonial Pipeline\'s initial access vector was an unused VPN account with no MFA. Can you tell me with confidence that you don\'t have the same vulnerability right now?"'}],
stats:[{n:'$4.4M',l:'Colonial Pipeline ransom — one unused VPN credential, no MFA'},{n:'NERC CIP',l:'Audit findings on credential governance appear in 70%+ of utility reviews'},{n:'45%',l:'Of US East Coast fuel supply shut down by a single unmanaged credential'}]},

lifesciences:{color:'#EC4899',emoji:'🔬',name:'Life Sciences & Pharma',
hook:'Life sciences organizations are sitting on the most commercially and strategically valuable IP on earth — clinical trial data, proprietary compound research, regulatory submissions. Nation-state actors, competitors, and ransomware groups all specifically target pharmaceutical credential infrastructure. And the shared lab workstation problem creates credential chaos at the bench level that most IT teams have never tried to govern.',
why:'Life sciences and pharma organizations arrive at 1Password through three paths: an FDA 21 CFR Part 11 audit finding on electronic access controls, a ransomware incident that hits a peer organization (Merck NotPetya is the universal reference), or a CISO who joins from another sector and immediately flags the gap between what the lab thinks is secured and what IT governance actually covers. The shared lab computer problem — multiple researchers authenticating to the same instrument workstation — is the discovery that opens every conversation.',
pains:['Shared lab workstation credentials across research teams — multiple scientists accessing instruments, LIMS, and ELN systems through a single shared login with no individual attribution','21 CFR Part 11 requires audit trail for all electronic access to regulated data — current shared credential arrangements make that audit trail impossible to produce','Research IP at extreme risk — competitor espionage, nation-state theft, and insider threat all center on the same unmanaged credential access gaps','CRO and external collaborator access to clinical systems and trial data with no defined access lifecycle — persists through trial close-out with no revocation process','Regulatory submission portal credentials (FDA, EMA, PMDA) shared across regulatory affairs teams — high-value targets with no individual attribution','High turnover in research staff creates a chronic credential orphaning problem that can take months to surface in manual offboarding reviews'],
solutions:[{tag:'21 CFR PART 11',tc:'#EC4899',bc:'#EC489918',name:'Events API → SIEM',fid:'events-api',desc:'Individual attribution on every access to regulated data systems. 21 CFR Part 11 electronic audit trail generated continuously — not assembled manually at inspection time.'},{tag:'SHARED WORKSTATION',tc:'#4D8EFF',bc:'#1769FF18',name:'Individual Accounts + QR Sign-In',fid:'onboarding',desc:'Each researcher gets their own 1Password account. QR Code Sign-In makes switching between users on a shared lab computer fast — individual credentials, shared access to common lab system logins via shared vaults.'},{tag:'CRO ACCESS',tc:'#F59E0B',bc:'#F59E0B18',name:'Guest Accounts + Item Expiry',fid:'guest-accounts',desc:'CRO and external collaborator access scoped to specific trial vaults with automatic expiry at trial close-out. The most common FDA audit finding — unrevoked external access — solved architecturally.'},{tag:'IP PROTECTION',tc:'#10B981',bc:'#10B98118',name:'Least-Privilege Vaults',fid:'app-policies',desc:'Compound research, clinical data, regulatory submissions — each in separate vaults accessible only to the team with a need-to-know. Insider threat and lateral movement both contained.'},{tag:'LIFECYCLE',tc:'#A78BFA',bc:'#7C3AED18',name:'SCIM Bridge',fid:'scim',desc:'Researcher onboarding and offboarding automated — closes the stale credential gap that makes insider threat so common in the sector.'},{tag:'RESEARCH SECRETS',tc:'#00C4BE',bc:'#00C4BE18',name:'Secure Notes + Documents',fid:'cred-mgmt',desc:'Protocol credentials, instrument access codes, compound registry logins, and sensitive documents in encrypted, access-controlled vaults — not shared drives.'}],
compliance:['FDA 21 CFR Part 11','GxP (GLP/GCP/GMP)','ICH E6 (GCP)','EMA Clinical Trial Regulation','HIPAA (clinical sites)','SOC 2'],
breach:{name:'COVID-19 Vaccine Research Targeting by Nation-State Actors',date:'2020 (NCSC/CISA Joint Advisory, July 2020)',body:'The UK\'s National Cyber Security Centre, the US CISA, and Canada\'s Communications Security Establishment issued a joint advisory confirming that APT29 — the Russian Foreign Intelligence Service — was actively targeting organizations involved in COVID-19 vaccine development, including pharmaceutical companies, contract research organizations, and academic institutions across the US, UK, and Canada. The attack methods included spear-phishing, password spraying against organizational accounts, and exploitation of shared credentials on research computing infrastructure. Multiple organizations confirmed compromise of research systems.',sources:'NCSC/CISA/CSE Joint Advisory AA20-049A, July 2020 · UK NCSC Technical Advisory · Wired and Reuters reporting',prevention:'MFA enforcement via Auth Policies would have neutralized the password spraying attack vector used by APT29 — the most effective single control against this attack class. Domain Breach Report would have flagged researcher email addresses appearing in credential dumps used to seed the spraying campaigns. Least-privilege vault segmentation means a compromised research account in one program cannot access compound data in another.',features:['auth-policies','domain-breach','app-policies','events-api','scim','guest-accounts']},
personas:[{role:'VP IT / CISO',q:'"Your shared lab workstations — how many researchers are accessing regulated data systems through a shared credential right now, and what does your 21 CFR Part 11 audit trail look like for those access events?"'},{role:'Head of Regulatory Affairs',q:'"For your FDA regulatory submission portal — how many people have access to those credentials, and can you produce an individual attribution log for the last inspection window?"'},{role:'Research IT / Lab Informatics',q:'"When a postdoc or contract researcher finishes their engagement, what\'s the current process to revoke their access to the LIMS, ELN, and instrument workstations they were using?"'},{role:'Chief Scientific Officer',q:'"Your compound research and clinical trial data is your most valuable IP. What\'s the current credential governance model protecting access to those systems — and when was it last audited?"'}],
stats:[{n:'$10.7B',l:'Pharmaceutical IP theft estimated annual cost to US companies (FBI)'},{n:'21 CFR',l:'Part 11 audit trail requirement — impossible to satisfy with shared credentials'},{n:'4.8M',l:'Life sciences workers — all need individual credential attribution on regulated systems'}]},

hospitality:{color:'#F97316',emoji:'🏨',name:'Hospitality & Travel',
hook:'Hospitality runs on high turnover, third-party systems, and massive volumes of payment card data — every one of which creates credential risk. The Marriott breach sat undetected for four years inside acquired infrastructure because nobody audited the credential access. Every hotel group that has acquired another brand has the same unresolved problem.',
why:'Hospitality organizations arrive at 1Password through PCI-DSS audit findings on payment system credentials, a cyber insurance renewal that mandates stronger access controls, or an M&A event that forces a reckoning with the acquired brand\'s credential security posture. The acquisition scenario is the most common opening — "we just acquired a portfolio of hotels and we have no idea what credential access looks like across those properties."',
pains:['Front desk staff sharing PMS (Property Management System) credentials across shifts — no individual attribution on room transactions, payment processing, or check-in/check-out events','Extremely high staff turnover (hotel industry averages 73% annually) creating a chronic ghost account problem — departed employees with active PMS and loyalty system access','Third-party integration credentials (OTA connections, booking engines, channel managers) shared across revenue management teams with no audit trail','Franchisee and management company access to corporate systems with no lifecycle governance — access persists across brand transitions and management changes','PCI-DSS Level 1 requirements for card data environment credential controls that shared PMS logins cannot satisfy','Seasonal workforce at resort properties creating the same cyclical ghost access problem as retail — hundreds of seasonal hires with no systematic credential offboarding'],
solutions:[{tag:'PCI-DSS',tc:'#F97316',bc:'#F9731618',name:'Events API → SIEM',fid:'events-api',desc:'Every PMS and payment system credential access individually attributed and logged. PCI-DSS audit evidence on demand — not assembled manually per QSA request.'},{tag:'TURNOVER',tc:'#10B981',bc:'#10B98118',name:'SCIM Bridge',fid:'scim',desc:'73% annual turnover solved at the identity layer. Staff access provisioned on day one, revoked the moment HR marks departure — no ghost accounts surviving into the next season.'},{tag:'FRANCHISE',tc:'#4D8EFF',bc:'#1769FF18',name:'Multi-Tenancy',fid:'multi-tenancy',desc:'Corporate manages credential governance across all franchise properties from one admin interface — each property retains local control, corporate has consolidated visibility and audit access.'},{tag:'SEASONAL',tc:'#F59E0B',bc:'#F59E0B18',name:'Item Expiry + Guest Accounts',fid:'item-expiry',desc:'Seasonal credentials set to auto-expire at season end. Resort seasonal workforce access self-destructs without any IT intervention.'},{tag:'OTA',tc:'#A78BFA',bc:'#7C3AED18',name:'Secure Item Sharing + Guest Accounts',fid:'secure-sharing',desc:'OTA and channel manager integration credentials shared with revenue management partners via encrypted, time-limited links — not email threads with the password in plain text.'},{tag:'ACQUISITION',tc:'#EF4444',bc:'#EF444418',name:'Watchtower + Domain Breach Report',fid:'watchtower',desc:'Post-acquisition credential health audit — immediately identify compromised, weak, and stale credentials across acquired property infrastructure.'}],
compliance:['PCI-DSS','GDPR','CCPA','State privacy laws','Franchise agreement security requirements'],
breach:{name:'Marriott / Starwood Data Breach',date:'2014–2018 (disclosed November 2018)',body:'Marriott\'s 2018 disclosure of a breach affecting up to 500 million guests traced the initial compromise to the Starwood Hotels network — four years before the disclosure. Attackers had maintained persistent access to Starwood\'s guest reservation database from 2014, before Marriott\'s 2016 acquisition, using compromised credentials that were never identified during the acquisition security review. The breach exposed names, addresses, phone numbers, email addresses, passport numbers, dates of birth, and payment card information. Marriott received a £18.4 million GDPR fine and faced hundreds of millions in litigation costs.',sources:'Marriott SEC 8-K Filing, November 2018 · ICO GDPR Enforcement Action, October 2020 · US Senate Commerce Committee hearings',prevention:'Post-acquisition credential governance review using Watchtower and Events API would have surfaced the anomalous long-running access patterns that persisted from the Starwood compromise. SCIM-automated lifecycle management means credentials from the acquired entity are brought under governance — not left running in parallel infrastructure indefinitely. Domain Breach Report would have flagged compromised Starwood employee credentials being used by attackers.',features:['watchtower','events-api','scim','domain-breach','app-policies','multi-tenancy']},
personas:[{role:'CISO / VP Technology',q:'"If you\'ve acquired hotel brands or management contracts in the last three years — can you tell me with confidence that credential access from those acquired properties is governed and auditable today?"'},{role:'IT Director / Regional IT',q:'"Your front desk staff — they\'re sharing PMS credentials across shifts. What\'s your current attribution trail for room transactions and payment events if a PCI auditor asks?"'},{role:'VP Revenue Management',q:'"Your OTA and channel manager connections — the API credentials for those integrations — where do they live, who has access to them, and when was the last time they were rotated?"'},{role:'HR / People Operations',q:'"At 73% annual turnover, your offboarding process for credential access is running constantly. How long does it currently take from an employee\'s last day to full access revocation across all hotel systems?"'}],
stats:[{n:'500M',l:'Guest records exposed in Marriott/Starwood breach — 4 years undetected'},{n:'73%',l:'Average annual hotel industry staff turnover rate'},{n:'4 years',l:'Duration attackers maintained access using compromised credentials before discovery'}]},

media:{color:'#A855F7',emoji:'🎬',name:'Media & Entertainment',
hook:'Media and entertainment companies are credential-chaos by design — constant agency and contractor involvement, social media accounts that are brand assets, content credentials that are commercially sensitive, and a workforce that treats security as a production bottleneck. The Sony Pictures breach destroyed a studio\'s operational infrastructure and exposed a decade of confidential communications. The attack started with credentials.',
why:'Media organizations arrive at 1Password through a brand crisis triggered by unauthorized social media access, a content leak investigation that traces back to credential sharing, or a cyber insurance audit following an incident in the sector. Production companies add a specific driver: production security requirements from streaming platforms (Netflix, HBO, Amazon) that mandate credential governance for productions accessing their content delivery infrastructure.',
pains:['Social media credentials for brand accounts, talent handles, and show pages shared with PR agencies, social media agencies, and freelancers — a single disgruntled contractor is a brand crisis','Content credentials (streaming platform portals, DRM systems, content delivery CDN access) with massive commercial value shared loosely across post-production teams','Extremely high contractor and freelancer proportion — most media productions are 70%+ contractors with no formal credential governance','Agency access to ad platforms (Meta, Google, YouTube, programmatic) with billing attached — compromised login equals potential budget depletion','Archive and content library access credentials giving access to decades of commercially sensitive IP shared with no access controls or audit trail','Production wrap = everyone\'s access persists until someone thinks to revoke it — which is often never'],
solutions:[{tag:'SOCIAL',tc:'#A855F7',bc:'#A855F718',name:'Guest Accounts + Secure Sharing',fid:'guest-accounts',desc:'Agency and contractor access to social media credentials via encrypted, scoped, time-limited access. Never the raw password. Revoke in one click. Full audit trail of every post-adjacent access event.'},{tag:'PRODUCTION',tc:'#EF4444',bc:'#EF444418',name:'Item Expiry + Vault Structure',fid:'item-expiry',desc:'Production vault auto-expires at wrap date. Every contractor\'s access to streaming platform portals and DRM credentials self-destructs when production closes.'},{tag:'CONTRACTOR',tc:'#F59E0B',bc:'#F59E0B18',name:'SCIM Bridge + Guest Accounts',fid:'scim',desc:'High contractor volume managed through IdP-linked provisioning for long-term staff and Guest Accounts for production-specific contractors — both with defined lifecycle.'},{tag:'BRAND SAFETY',tc:'#10B981',bc:'#10B98118',name:'Usage Reports',fid:'usage-reports',desc:'Full audit trail of which agency accessed which social credential and when. The evidence layer for brand incident investigations that currently doesn\'t exist.'},{tag:'AD PLATFORM',tc:'#4D8EFF',bc:'#1769FF18',name:'Watchtower',fid:'watchtower',desc:'Monitor credential health across all ad platform accounts — compromised Meta Ads or Google Ads credentials with billing attached is a financial emergency Watchtower catches proactively.'},{tag:'CONTENT',tc:'#00C4BE',bc:'#00C4BE18',name:'Secure Item Sharing',fid:'secure-sharing',desc:'Share DRM system access, content portal credentials, and archive access with post-production partners via time-limited encrypted links — not email.'}],
compliance:['PCI-DSS (payments)','GDPR','CCPA','Production platform security requirements (Netflix etc.)','SAG-AFTRA production security standards'],
breach:{name:'Sony Pictures Entertainment Hack',date:'November 2014',body:'The Lazarus Group (North Korean state-sponsored) infiltrated Sony Pictures\' network through targeted spear-phishing that harvested administrative credentials. Using those credentials, attackers spent months moving laterally through Sony\'s systems before deploying Shamoon disk-wiping malware that destroyed 70% of Sony\'s computers. In addition to the infrastructure destruction, attackers exfiltrated and publicly released five unreleased films, ten years of executive email, employee Social Security numbers, medical records, and salary data. The entire production pipeline was taken offline for weeks. Estimated damages exceeded $100 million.',sources:'FBI Investigation Statement, December 2014 · US DOJ charges against North Korean hackers, 2018 · Congressional testimony · Wired long-form investigation',prevention:'Least-privilege vault segmentation would have contained the lateral movement — compromised credentials in one department cannot reach executive communications, production systems, and HR data simultaneously. MFA enforcement would have made the phished admin credentials non-functional. Events API would have surfaced the months-long reconnaissance activity within the network before the destructive payload deployed.',features:['auth-policies','app-policies','events-api','scim','domain-breach','watchtower']},
personas:[{role:'CISO / Head of Information Security',q:'"Your social media agency relationships — how many agencies currently have direct access to your brand\'s social credentials, and what\'s your process if one of those relationships ends badly?"'},{role:'Head of Production Technology',q:'"When a production wraps, what\'s the process to ensure every contractor who had access to your streaming platform portals and DRM systems no longer has it?"'},{role:'VP Marketing / CMO',q:'"Your ad platform accounts — Meta, Google, YouTube — if one of those credentials was compromised by a disgruntled ex-agency, how would you know, and how fast could you revoke access?"'},{role:'General Counsel',q:'"Do you have an audit trail showing who accessed your content archive and unreleased title credentials? If an unreleased project was leaked, could you prove attribution?"'}],
stats:[{n:'$100M+',l:'Sony Pictures estimated breach damage — credential-based entry'},{n:'70%',l:'Media productions are majority contractors with no credential governance standard'},{n:'5',l:'Unreleased Sony films leaked publicly within hours of credential-enabled archive access'}]},

professionalservices:{color:'#6366F1',emoji:'📊',name:'Professional Services & Consulting',
hook:'Big 4 firms, management consultancies, and accounting practices hold client data more sensitive than the clients themselves often realize — M&A details, financial restatements, strategic plans, regulatory matters. A single credential breach doesn\'t just expose data; it exposes the client relationship, the engagement, and potentially attorney-client adjacent privilege.',
why:'Professional services organizations arrive at 1Password through a client security assessment that asks "how do you protect our data?", a cyber insurance audit requiring documented credential controls, or an incident at a peer firm that lands in the trade press. The Deloitte breach became the reference point for the sector in 2017 — every Big 4 and mid-market firm was internally asked "could this happen to us?" For most, the honest answer remains "yes, if the admin account had been targeted."',
pains:['Client engagement credentials (client portal access, shared collaboration platforms, engagement-specific systems) shared across engagement teams with no access controls tied to staffing changes','No audit trail for who accessed which client system when — a professional ethics and liability gap that clients are increasingly asking about in RFPs','Admin account with no MFA — the exact vulnerability behind the Deloitte 2017 breach — still present in many mid-market consulting and accounting firms','Engagement close-out leaves active client system credentials in the hands of staff who have rolled off — the equivalent of the law firm matter-close credential problem','Travel by engagement teams to client sites internationally with full client credential access — a confidentiality risk at border crossings that no firm has a documented solution for','Partner and managing director credentials carry enormous privilege — access to financial data, M&A details, board communications — with typically the least IT governance of any user tier'],
solutions:[{tag:'ENGAGEMENT',tc:'#6366F1',bc:'#6366F118',name:'Engagement Vaults + App Policies',fid:'app-policies',desc:'Credentials scoped to each engagement team. When a staff member rolls off, their vault access revokes. Client data stays contained within the active engagement team — always.'},{tag:'CLIENT AUDIT',tc:'#10B981',bc:'#10B98118',name:'Events API',fid:'events-api',desc:'Client-producible audit log of who accessed their systems when. The evidence layer that wins RFPs and satisfies client security teams that are now asking the question.'},{tag:'ADMIN MFA',tc:'#EF4444',bc:'#EF444418',name:'Auth Policies',fid:'auth-policies',desc:'MFA enforced on all admin and partner accounts — closes the exact vulnerability behind the Deloitte 2017 breach. 30 seconds to enable. Should have been done in 2015.'},{tag:'PARTNER TRAVEL',tc:'#F59E0B',bc:'#F59E0B18',name:'Travel Mode',fid:'travel-mode',desc:'Partners crossing international borders on client engagements — client credentials disappear at customs, reappear after. No competitor has this feature.'},{tag:'CLIENT SHARE',tc:'#4D8EFF',bc:'#1769FF18',name:'Secure Item Sharing',fid:'secure-sharing',desc:'Share client portal access with engagement team members via encrypted, time-limited links — not email with the password in the message body.'},{tag:'LIFECYCLE',tc:'#A78BFA',bc:'#7C3AED18',name:'SCIM Bridge',fid:'scim',desc:'Staff rotation and promotion automated — vault access follows org chart. Engagement rolloffs reflected immediately without IT tickets.'}],
compliance:['PCAOB (audit firms)','AICPA SOC standards','GDPR','CCPA','Client contractual requirements','Cyber insurance mandates','ISACA professional standards'],
breach:{name:'Deloitte Global Email Server Breach',date:'2017 (disclosed September 2017)',body:'Deloitte\'s global email server was breached through an administrator account that had no multi-factor authentication. The attackers gained access to Deloitte\'s Azure-hosted email platform and were able to read confidential client communications, personnel information, and internal strategic documents. The breach affected Deloitte\'s global email system. The firm took months to contain the incident. Six clients had their confidential information specifically accessed. The attacker had access for an extended period before detection. The entry point: an admin account with no 2FA.',sources:'The Guardian investigative reporting, September 2017 · Bloomberg coverage · Security researcher Brian Krebs analysis',prevention:'Auth Policies requiring MFA on all admin accounts closes the exact entry point used in this breach — an admin account with no second factor. Events API would have surfaced the anomalous admin account access patterns before the attacker reached client communications. Least-privilege vault segmentation means one compromised admin account cannot reach all client communications simultaneously.',features:['auth-policies','events-api','app-policies','scim','domain-breach','watchtower']},
personas:[{role:'CISO / Global IT Security',q:'"Every admin account in your environment — do all of them have MFA enforced? The Deloitte breach entry point was a single admin account without it."'},{role:'Managing Partner / COO',q:'"When a client asks how you protect their confidential information that lives in your engagement systems — what specific technical controls can you describe?"'},{role:'Engagement Leader',q:'"When a manager rolls off an engagement mid-stream — how quickly do their credentials to the client\'s systems actually get revoked, and is that process documented?"'},{role:'Risk & Compliance',q:'"Your cyber insurance renewal is asking for evidence of MFA on privileged accounts and an access audit log. What can you produce today without weeks of manual assembly?"'}],
stats:[{n:'1 account',l:'No MFA — the single Deloitte admin credential that enabled a global breach'},{n:'6 clients',l:'Specifically confirmed to have had confidential data accessed in Deloitte breach'},{n:'$6.9M',l:'Average professional services breach cost — and rising with client data volumes'}]},

fintech:{color:'#8B5CF6',emoji:'💎',name:'Fintech & Crypto',
hook:'Fintech and crypto companies hold the most liquid and transferable assets of any sector — and they\'re protected, in most cases, by credential infrastructure that hasn\'t caught up to the threat model. The Bybit hack proved that even sophisticated Web3 organizations with multisig controls can be compromised through a third-party credential breach. Every API key in your stack is a potential $1.5 billion problem.',
why:'Fintech and crypto organizations arrive at 1Password through a security audit ahead of a Series B or C (investor security diligence is now standard), a SOC 2 Type II requirement from an enterprise client, or a near-miss with a credential compromise that the team caught before it became a breach. Crypto-native companies add a specific driver: the catastrophic consequences of exchange API key exposure mean even a single leaked credential can mean total loss.',
pains:['Exchange API keys with withdrawal permissions scattered across developer laptops, CI/CD configs, and Slack messages — each one a potential total-loss event','Smart contract deployment credentials and wallet signing keys with no access controls, no audit trail, and no rotation policy','Third-party integrations (payment processors, KYC providers, blockchain data providers) with API credentials that are never rotated and never scoped','SOC 2 Type II requirement from enterprise clients with no secrets management infrastructure to point auditors toward','Developer offboarding creates acute credential exposure risk — an engineer who leaves with knowledge of active API keys is an unquantifiable liability','Shadow fintech tooling — team members using personal accounts for Bloomberg, crypto trading terminals, and financial data platforms with company email, creating unmanaged credential sprawl'],
solutions:[{tag:'API KEYS',tc:'#8B5CF6',bc:'#8B5CF618',name:'CLI + Secret References',fid:'cli',desc:'Exchange API keys, wallet credentials, and payment processor keys injected at runtime via op:// references. Never in code, never in .env files, never in CI/CD configs where a breach surfaces them.'},{tag:'MACHINE ID',tc:'#EF4444',bc:'#EF444418',name:'Service Accounts',fid:'service-accounts',desc:'Named machine identities for every automated workflow. Each trading bot, each settlement process, each monitoring daemon has a named service account. Every action attributed and audited.'},{tag:'SOC 2',tc:'#10B981',bc:'#10B98118',name:'Events API → SIEM',fid:'events-api',desc:'SOC 2 Type II continuous audit trail. Every credential access event timestamped — the evidence enterprise clients and auditors now require from every fintech vendor in their stack.'},{tag:'OFFBOARD',tc:'#4D8EFF',bc:'#1769FF18',name:'SCIM Bridge',fid:'scim',desc:'Developer departure → all credential access revoked within minutes. The acute risk window between an engineer\'s last day and full API key rotation collapses to zero.'},{tag:'ROTATE',tc:'#F59E0B',bc:'#F59E0B18',name:'Secrets Automation',fid:'secrets-automation',desc:'API key rotation in 1Password propagates instantly to every consumer — trading systems, risk monitors, compliance integrations. One rotation, zero downtime, full audit trail.'},{tag:'SHADOW',tc:'#00C4BE',bc:'#00C4BE18',name:'Domain Breach Report + Watchtower',fid:'domain-breach',desc:'Instant alert when any team member\'s company email appears in a breach — including the Bloomberg, fintech platform, or crypto exchange account breach that nobody told IT about.'}],
compliance:['SOC 2 Type II','PCI-DSS','FinCEN BSA/AML requirements','SEC cybersecurity rules (2023)','NYDFS 23 NYCRR 500','MiCA (EU crypto regulation)'],
breach:{name:'Bybit Exchange Hack — Largest Crypto Theft in History',date:'February 2025',body:'North Korean Lazarus Group hackers stole $1.5 billion from Bybit — the largest cryptocurrency theft in history. The attack did not breach Bybit directly. Instead, attackers compromised the infrastructure of Safe{Wallet}, a third-party multisig wallet management platform that Bybit used for cold wallet security. By compromising developer credentials at Safe{Wallet}, the attackers modified the wallet\'s front-end code to display legitimate transaction details to Bybit signers while the underlying transaction routed funds to attacker-controlled addresses. Bybit\'s team authorized the transaction believing it was legitimate. The funds — approximately 401,000 ETH — were transferred in seconds.',sources:'Bybit official statement, February 2025 · Chainalysis attribution to Lazarus Group · Safe{Wallet} incident report · Elliptic blockchain analysis',prevention:'Third-party vendor access governance is the core prevention story here. Safe{Wallet} developer credentials needed governance — SCIM-enforced lifecycle management, MFA enforcement, and least-privilege vault access would have limited the blast radius of the initial developer credential compromise. Events API at the Safe{Wallet} layer would have surfaced the anomalous code modification event. For Bybit, the lesson is that every third party in your signing infrastructure needs as much credential governance as your own team.',features:['auth-policies','scim','events-api','app-policies','guest-accounts','service-accounts']},
personas:[{role:'CISO / Head of Security',q:'"Your exchange API keys with withdrawal permissions — where do they live, who has access to them, and what\'s your audit trail if one is used by someone who shouldn\'t have it?"'},{role:'CTO / Head of Engineering',q:'"When one of your engineers leaves, what\'s the process to ensure all API keys they had access to are rotated — and how long does that currently take?"'},{role:'CFO / COO',q:'"Your Series B investors asked about SOC 2. Your enterprise clients are asking. What\'s the current state of your secrets management infrastructure?"'},{role:'Head of Trading / Quant',q:'"Your trading bot service accounts — are they running under named machine identities with scoped permissions, or under human credentials that persist after the engineer who set them up has left?"'}],
stats:[{n:'$1.5B',l:'Bybit theft — largest crypto breach in history, via third-party credential compromise'},{n:'SOC 2',l:'Now required by enterprise clients before any fintech integration goes live'},{n:'Minutes',l:'Time to full API key rotation when a developer leaves, with Secrets Automation'}]},

realestate:{color:'#14B8A6',emoji:'🏠',name:'Real Estate & Property Management',
hook:'Real estate and property management companies operate in a credential environment that\'s a combination of hospitality\'s turnover problem, retail\'s seasonal access problem, and professional services\' client data sensitivity. Every property access code, every tenant portal, every MLS login is a credential that\'s probably being shared in a text message right now.',
why:'Real estate organizations arrive at 1Password through a cyber insurance requirement (real estate is now in the top 5 targeted sectors for wire fraud and BEC attacks — title and escrow companies are the most targeted), a broker departing with access still active, or a property management company that just scaled from 500 to 5,000 units and realized their credential chaos scaled with them.',
pains:['Broker and agent credentials to MLS, CRM, and listing platforms shared across teams or offices — no individual attribution when a listing is modified, deleted, or a client record is accessed','Wire fraud and business email compromise targeting real estate transactions — attackers who compromise email or client portal credentials can redirect transaction funds. $446M in real estate BEC losses in 2023 alone (FBI IC3).','Property management access — maintenance staff, property managers, and vendors all sharing master access to property management systems with no revocation process','Title and escrow company credentials to closing platforms with high-value transaction data shared across teams with no lifecycle governance','Tenant and resident portal admin access shared across property management staff — PII exposure risk with no individual attribution','High agent turnover — top quartile brokerages see 30%+ annual agent turnover — with no systematic credential offboarding for departed agents'],
solutions:[{tag:'WIRE FRAUD',tc:'#14B8A6',bc:'#14B8A618',name:'Auth Policies + Watchtower',fid:'auth-policies',desc:'MFA on all transaction and closing platform access. Compromised credentials without MFA are useless to BEC attackers. Watchtower flags compromised credentials before they\'re exploited in a wire fraud attempt.'},{tag:'AGENT LIFECYCLE',tc:'#10B981',bc:'#10B98118',name:'SCIM Bridge',fid:'scim',desc:'Agent joins → MLS, CRM, and transaction platform access provisioned instantly. Agent departs → all access revoked before they\'ve left the parking lot. No 30-day access gap.'},{tag:'PROPERTY MGMT',tc:'#4D8EFF',bc:'#1769FF18',name:'Guest Accounts + Item Expiry',fid:'guest-accounts',desc:'Maintenance vendor and contractor access to property management systems time-limited to the work order window. Access self-destructs at completion.'},{tag:'MULTI-OFFICE',tc:'#F59E0B',bc:'#F59E0B18',name:'Multi-Tenancy',fid:'multi-tenancy',desc:'Franchise or multi-office operations managed from one admin interface — individual offices retain autonomy, corporate gets consolidated credential visibility and audit access.'},{tag:'MLS ACCESS',tc:'#A78BFA',bc:'#7C3AED18',name:'Least-Privilege Vaults',fid:'app-policies',desc:'MLS and transaction credentials separated by team, office, and role. A departed agent\'s access doesn\'t cascade to the team vault.'},{tag:'CLOSING',tc:'#EF4444',bc:'#EF444418',name:'Secure Item Sharing',fid:'secure-sharing',desc:'Share closing platform access with transaction coordinators, attorneys, and title reps via time-limited encrypted links — not group texts with the password.'}],
compliance:['PCI-DSS (earnest money processing)','RESPA','State real estate licensing regulations','GDPR/CCPA (client PII)','Cyber insurance requirements','NAR data security guidelines'],
breach:{name:'Fidelity National Financial Ransomware Attack',date:'November 2023',body:'Fidelity National Financial — the largest US title insurance company, handling approximately 1 in 3 US real estate transactions — was hit by a ransomware attack by the AlphV/BlackCat group that forced the company to shut down its title insurance and escrow services for nearly a week. Approximately $1 billion in pending real estate transactions were delayed or disrupted. The attack compromised systems containing transaction credentials, closing documents, and client financial data for millions of real estate transactions. The initial access vector involved compromised credentials on FNF\'s network.',sources:'Fidelity National Financial 8-K SEC Filing, November 2023 · CISA monitoring advisory · Reuters and Wall Street Journal reporting',prevention:'MFA enforcement on all transaction system credentials would have made the initial compromised credential non-functional without a second factor. SCIM lifecycle management closes the stale account vectors that ransomware operators routinely exploit for initial access. Events API would have surfaced the anomalous credential access patterns before ransomware deployment.',features:['auth-policies','events-api','scim','watchtower','app-policies','domain-breach']},

// ─── RENDER HELPERS ───────────────────────────────────────────
function rBlock(b){
  if(b.t==='checks') return`<div class="blk b${(b.color||'blue')[0]}"><div class="blk-t ${b.color||'blue'}">${b.title}</div>${b.items.map(i=>`<div class="chk">${i}</div>`).join('')}</div>`;
  if(b.t==='plain') return`<div class="blk b${(b.color||'blue')[0]}"><div class="blk-t ${b.color||'blue'}">${b.title}</div><div class="pt">${b.text}</div></div>`;
  if(b.t==='code') return`<div class="blk"><div class="blk-t muted">${b.title}</div><div class="code">${b.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>')}</div></div>`;
  if(b.t==='providers') return`<div class="blk"><div class="blk-t muted">${b.title}</div><div class="provs">${b.items.map(i=>`<span class="prov">${i}</span>`).join('')}</div></div>`;
  if(b.t==='subfeatures') return`<div class="blk">${b.items.map(sf=>`<div class="sf"><div class="sf-title">${sf.icon} ${sf.title}${sf.tag?`<span class="stag ${sf.tagc||''}">${sf.tag}</span>`:''}</div><div class="sf-desc">${sf.desc}</div></div>`).join('')}</div>`;
  if(b.t==='two') return`<div class="two">${rBlock(b.l)}${rBlock(b.r)}</div>`;
  return'';
}

  const badge=f.badge?`<span class="fb ${f.badge}">${bm[f.badge]||f.badge}</span>`:'';
  const xref=XREF[fid]||{ind:[],dep:[]};
  const deptTags=xref.dep.map(d=>`<span class="prov" style="background:#10B98114;border-color:#10B98133;color:#10B981">${d}</span>`).join('');
  const indCards=xref.ind.map(iid=>{
    const I=INDUSTRIES[iid];if(!I)return'';
    const sol=I.solutions.find(s=>s.fid===fid);
    return`<div class="xc" onclick="switchTab('industry');showIndustry('${iid}')">

  let html=filterBarHTML(curFilter)+`<div class="fp">
    <div class="fp-ref">${secLabel} · ${f.p}</div>

    <p class="fp-intro">${f.intro}</p>
    ${f.blocks.map(rBlock).join('')}
    <div class="impact-bar has-add-bad"><button class="add-bad-btn" title="Add feature to Build a Doc" onclick="ensureBADProject();BAD.addWidget(makeFeatureWidget('${fid}'));showBADAddedToast(BAD.getCurrentProject().name)">📌</button><div class="impact-l">BUSINESS IMPACT</div><div class="impact-t">${f.impact}</div>${f.quote?`<div class="impact-q">${f.quote}</div>`:''}</div>
    <div class="meta3">
      <div class="mb"><div class="mb-l">WHO THIS IS FOR</div><div class="mb-t">${f.who}</div></div>
      <div class="mb"><div class="mb-l">WHAT THIS REPLACES</div><div class="mb-t">${f.replaces}</div></div>
      <div class="mb"><div class="mb-l">ADOPTION LOOKS LIKE</div><div class="mb-t">${f.adoption}</div></div>
    </div>`;
  if(xref.dep.length||xref.ind.length){
    html+=`<div class="xref">
      ${xref.dep.length?`<div class="xref-t" style="margin-bottom:8px">DEPARTMENT OWNERS</div><div class="provs" style="margin-bottom:16px">${deptTags}</div>`:''}

    </div>`;
  }
  html+='</div>';
  document.getElementById('detail').innerHTML=html;

function switchTab(tab){
  const al={'industry':'intel','departments':'intel','customer-builder':'build','bad':'build','trelica':'features','dt':'features'};
  if(al[tab])tab=al[tab];
  if(!['features','intel','compete','roadmap','build','platform'].includes(tab))return;
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('tab-'+tab);if(el)el.classList.add('active');
  const sb=document.getElementById('sidebar');
  if(tab==='features'){sb.style.display='';showFeaturesHub();return;}
  if(tab==='intel'){sb.style.display='';showIntelHub();return;}
  if(tab==='compete'){sb.style.display='';showCompeteUnified();return;}
  if(tab==='roadmap'){sb.style.display='none';showRoadmap();return;}
  if(tab==='build'){sb.style.display='none';showBuild();return;}
  if(tab==='platform'){sb.style.display='none';showPlatformView();return;}
}

function selectFeature(fid){
  curFid=fid;
  // keep filter in sync: if feature is in a specific section, reflect that
  const f=FEATURES.find(x=>x.id===fid);
  if(f&&curFilter!=='all'&&curFilter!==f.s) curFilter=f.s;
  buildFeatureSidebar();renderFeature(fid);
}
function showIndustry(iid){
  curIid=iid;buildIndustrySidebar();renderIndustry(iid);
}
function doSearch(v){
  srch=v.toLowerCase().trim();
  if(curTab==='features'){buildFeatureSidebar();if(!curFid)showTiles(curFilter);}
  if(curTab==='industry')buildIndustrySidebar();
  if(curTab==='departments')buildDeptSidebar();
}
