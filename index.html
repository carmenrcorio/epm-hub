// ─── DEPT SIDEBAR ─────────────────────────────────────────────
let curDid=null;
function buildDeptSidebar(){
  const sb=document.getElementById('sidebar');sb.innerHTML='';
  const h=document.createElement('div');h.className='sec-hdr';h.style.color='#10B981';h.textContent='SELECT DEPARTMENT';sb.appendChild(h);
  Object.entries(DEPARTMENTS).filter(([did,D])=>!srch||D.name.toLowerCase().includes(srch)).forEach(([did,D])=>{
    const el=document.createElement('div');el.className=`ni${curDid===did?' active':''}`;
    if(curDid===did)el.style.borderLeftColor=D.color;
    el.innerHTML=`<span style="font-size:16px">${D.emoji}</span><span class="nn">${D.name}${D._custom?'<span class="custom-badge">CUSTOM</span>':''}</span>`;
    el.onclick=()=>showDept(did);sb.appendChild(el);
  });
}

// ─── DEPT RENDER ──────────────────────────────────────────────
function renderDept(did){
  const D=DEPARTMENTS[did];if(!D)return;
  const pains=D.pains.map(p=>`<div class="pain-row"><span class="px">✗</span><span class="pt2">${p}</span></div>`).join('');
  const feats=D.features.map(f=>{const feat=FEATURES.find(x=>x.id===f.fid);return`<div class="sc has-add-bad" onclick="switchTab('features');selectFeature('${f.fid}')"><button class="add-bad-btn" title="Add to Build a Doc" onclick="event.stopPropagation();ensureBADProject();BAD.addWidget(makeDeptWidget('${did}','usecase'));showBADAddedToast(BAD.getCurrentProject().name)">📌</button>
    <span class="sol-tag" style="background:${f.bc};color:${f.tc};border:1px solid ${f.tc}44">${f.tag}</span>
    <div class="sol-name">${feat?feat.n:f.fid}</div>
    <div class="sol-desc">${f.why}</div>
    <div class="sol-link">View feature page →</div></div>`;}).join('');
  const personas=D.personas.map(p=>`<div class="pc"><div class="pc-r">${p.role}</div><div class="pc-q">${p.q}</div></div>`).join('');
  document.getElementById('detail').innerHTML=`
    <div class="ind-hero">
      <div class="ind-eye" style="color:${D.color}">${D.emoji} ${D.name.toUpperCase()} · DEPARTMENT INTEL</div>
      <div class="ind-title">${D.name}</div>
      <div class="ind-hook">${D.hook}</div>
    </div>
    <div class="ind-body">
      <div style="display:flex;flex-direction:column;gap:13px">
        <div class="blk" style="border-left:3px solid ${D.color}">
          <div class="blk-t" style="color:${D.color}">WHAT THIS DEPARTMENT MANAGES (CREDENTIAL INVENTORY)</div>
          <div class="pt" style="white-space:normal;font-size:12px;color:#7A9AB8;line-height:1.7">${D.credential_inv}</div>
        </div>
        <div class="blk br has-add-bad"><button class="add-bad-btn" title="Add pain points to Build a Doc" onclick="ensureBADProject();BAD.addWidget(makeDeptWidget('${did}','pains'));showBADAddedToast(BAD.getCurrentProject().name)">📌</button><div class="blk-t red">KEY PAIN POINTS</div>${pains}</div>
        <div class="stat-row">
          <div class="sb"><div class="sn" style="color:${D.color}">${D.stat1}</div><div class="sl">${D.stat1l}</div></div>
          <div class="sb"><div class="sn" style="color:${D.color}">${D.stat2}</div><div class="sl">${D.stat2l}</div></div>
          <div class="sb"><div class="sn" style="color:${D.color}">${D.stat3}</div><div class="sl">${D.stat3l}</div></div>
        </div>
        <div class="blk bg"><div class="blk-t green">DISCOVERY QUESTIONS BY PERSONA</div><div class="pgrid">${personas}</div></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:13px">
        <div class="blk bl"><div class="blk-t blue">TOP FEATURES FOR THIS DEPARTMENT — CLICK TO VIEW</div><div class="sol-grid">${feats}</div></div>
        <div class="blk ba">
          <div class="blk-t amber">RECOMMENDED VAULT STRUCTURE</div>
          <div class="pt" style="font-size:12px;white-space:normal;line-height:1.75;color:#7A9AB8">${D.vault_structure}</div>
        </div>
        <div class="blk" style="border-left:3px solid #A78BFA;background:#7C3AED08">
          <div class="blk-t purple">💡 CSM CONVERSATION INSIGHT</div>
          <div class="pt" style="font-size:12px;white-space:normal;line-height:1.75;color:#C8D8E8">${D.csm_insight}</div>
        </div>
      </div>
    </div>`;

  // Add Trelica + DT product sections when active
  if (activeProducts && activeProducts.trelica) {
    const _dEl = document.getElementById('detail');
    const _D = DEPARTMENTS[did];
    if (_dEl && _D) {
      const _tSec = document.createElement('div');
      _tSec.className = 'product-section trelica';
      _tSec.style.cssText = 'margin:0 28px 12px;';
      _tSec.innerHTML = '<div class="product-section-hdr"><span>🔷</span><span>TRELICA · SAAS MANAGER — ' + (_D.name||'').toUpperCase() + '</span></div><div class="product-section-body">' +
        '<div class="product-section-row">Shadow IT discovery surfaces every app ' + _D.name + ' employees use that IT has not approved — OAuth grants, expense-card SaaS, and apps stored in 1Password vaults.</div>' +
        '<div class="product-section-row">Automated offboarding: when a ' + _D.name + ' team member leaves, Trelica revokes access to every connected app within minutes of the HRIS departure trigger — including non-SSO tools.</div>' +

// ── CB CHIP + TAG HELPERS ────────────────────────────────────

// Single-select chips (only one active at a time)
function cbChipSingle(btn, groupId) {
  document.querySelectorAll(`#${groupId} .cb-chip`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Multi-select toggle chips
function cbChipToggle(btn, groupId) {
  btn.classList.toggle('active');
}

// Append chip value to a text input
function cbChipAppend(inputId, val) {
  const el = document.getElementById(inputId);
  if (!el) return;
  if (el.value && !el.value.endsWith(' ')) el.value += ', ';
  el.value += val;
  el.focus();
}

// Tag input: press Enter to add a tag
function cbTagKey(e, tagsId, inputId) {
  if (e.key !== 'Enter' && e.key !== ',') return;
  e.preventDefault();
  const input = document.getElementById(inputId);
  const val = input.value.trim().replace(/,$/, '');
  if (val) { cbAddTag(tagsId, val); input.value = ''; }
}

function cbAddTag(tagsId, val) {
  val = val.trim();
  if (!val) return;
  const wrap = document.getElementById(tagsId);
  if (!wrap) return;
  // Avoid duplicates
  const existing = [...wrap.querySelectorAll('.cb-tag-pill')].map(p => p.dataset.val);
  if (existing.includes(val)) return;
  const pill = document.createElement('span');
  pill.className = 'cb-tag-pill';
  pill.dataset.val = val;
  pill.innerHTML = `${val}<button onclick="this.parentElement.remove()" title="Remove">×</button>`;
  wrap.appendChild(pill);
}

function cbGetTags(tagsId) {
  const wrap = document.getElementById(tagsId);
  if (!wrap) return [];
  return [...wrap.querySelectorAll('.cb-tag-pill')].map(p => p.dataset.val);
}

function cbGetActiveChips(groupId) {
  const group = document.getElementById(groupId);
  if (!group) return [];
  return [...group.querySelectorAll('.cb-chip.active')].map(b => b.textContent.trim());
}

// Auto-populate tech stack suggestions when industry changes
function cbIndustryChange(iid) {
  const tools = TECH_STACKS[iid];
  if (!tools || !tools.length) return;
  // Refresh stack suggestions with industry-specific tools
  const sug = document.getElementById('stack-suggestions');
  if (!sug) return;
  const industryTools = tools.map(t => t.tool);
  // Add industry tools to front of suggestions
  const existing = [...sug.querySelectorAll('.cb-sug')].map(s => s.textContent);
  industryTools.forEach(t => {
    if (!existing.includes(t)) {
      const span = document.createElement('span');
      span.className = 'cb-sug cb-sug-ind';
      span.textContent = t;
      span.onclick = () => cbAddTag('stack-tags', t);
      sug.insertBefore(span, sug.firstChild);
    }
  });
  // Auto-highlight (not auto-select) compliance chips based on industry
  const ind = INDUSTRIES[iid];
  if (ind && ind.compliance) {
    const chips = document.querySelectorAll('#chips-compliance .cb-chip');
    chips.forEach(chip => {
      const matchesAny = ind.compliance.some(c =>
        chip.textContent.trim() === c ||
        c.includes(chip.textContent.trim().split(' ')[0]) ||
        chip.textContent.trim().includes(c.split(' ')[0])
      );
      if (matchesAny) chip.style.outline = '1px solid ' + (ind.color || '#3A9EFF') + '88';
    });
  }
}

function cbRestoreState() {
  cbDepts.forEach(did => {
    const el = document.getElementById('cbck-' + did);
    if (el) el.classList.add('checked');
  });
  // Re-render industry tags if any are already selected
  if (cbSelectedIndustries.length) cbRenderIndustryTags();
}

function copyProfile() {
  if (!cbLastResult) return;
  const { result: r, company } = cbLastResult;
  const s = r.snapshot || {};
  const lines = [
    `CUSTOMER STRATEGY — ${company.toUpperCase()}`,
    `Urgency: ${(s.urgency||'').toUpperCase()} | ${s.headline||''}`,
    `Primary Risk: ${s.primary_risk||''}`,
    `Deal Read: ${s.deal_confidence||''}`, '',
  ];
  if (r.feature_analysis?.length) {
    lines.push('FEATURE PRIORITIES:');
    r.feature_analysis.forEach(f => lines.push(`[${f.priority}] ${f.feature_name}: ${f.why_this_account}`));
    lines.push('');
  }
  if (r.adoption_strategy) {
    const ap = r.adoption_strategy;
    lines.push('ADOPTION PATH:');
    if (ap.week_1) lines.push(`Week 1: ${ap.week_1.action}`);
    if (ap.month_1) lines.push(`Month 1: ${ap.month_1.action}`);
    if (ap.quarter_1) lines.push(`90 days: ${ap.quarter_1.action}`);
    lines.push('');
  }
  if (r.stakeholder_strategy?.length) {
    lines.push('STAKEHOLDERS:');
    r.stakeholder_strategy.forEach(s => lines.push(`• ${s.role} [${s.stance}]: ${s.motivation}`));
    lines.push('');
  }
  if (r.objection_playbook?.length) {
    lines.push('OBJECTIONS:');
    r.objection_playbook.forEach(o => lines.push(`• "${o.objection}" → ${o.response}`));
    lines.push('');
  }
  if (r.next_actions?.length) {
    lines.push('NEXT ACTIONS:');
    r.next_actions.forEach(a => lines.push(`• ${a.timeline}: ${a.action}`));
  }
  navigator.clipboard.writeText(lines.join('\n')).then(() => { showCustomSuccessToast('📋 Notes copied to clipboard'); })
    .catch(() => showCustomSuccessToast('⚠ Copy failed'));
}

const BAD = {
  projects: [],
  currentProjectId: null,
  pendingWidget: null,
  newProject(name) {
    const p = { id: 'p' + Date.now(), name: name || 'My Document', widgets: [] };
    this.projects.push(p); this.currentProjectId = p.id; return p;
  },
  getCurrentProject() { return this.projects.find(p => p.id === this.currentProjectId) || null; },
  addWidget(widget) {
    const p = this.getCurrentProject(); if (!p || !widget) return;
    widget.id = 'w' + Date.now();
    // Stack widgets vertically below existing content
    const maxY = p.widgets.reduce((m,w) => Math.max(m, w.y + (w.h||220)), 20);
    widget.x = 40; widget.y = p.widgets.length === 0 ? 20 : maxY + 12;
    widget.w = widget.w || 340; widget.h = widget.h || 220;
    p.widgets.push(widget);
    if (document.getElementById('bad-canvas')) renderBAD();
  },
  removeWidget(id) {
    const p = this.getCurrentProject(); if (!p) return;
    p.widgets = p.widgets.filter(w => w.id !== id); renderBAD();
  },
  updateWidget(id, props) {
    const p = this.getCurrentProject(); if (!p) return;
    const w = p.widgets.find(x => x.id === id); if (w) Object.assign(w, props);
  }
};

function ensureBADProject() {
  if (BAD.projects.length === 0) BAD.newProject('My Document');
  if (!BAD.currentProjectId && BAD.projects.length > 0) BAD.currentProjectId = BAD.projects[0].id;
}

function showBADPicker(widgetData) {
  ensureBADProject(); BAD.pendingWidget = widgetData;
  if (BAD.projects.length === 1) { BAD.addWidget(widgetData); showBADAddedToast(BAD.projects[0].name); return; }
  const opts = BAD.projects.map(p => `<button class="bad-modal-opt" onclick="BADPickerSelect('${p.id}')">${p.name}</button>`).join('');
  document.body.insertAdjacentHTML('beforeend', `<div class="bad-modal-bg" id="bad-modal-bg" onclick="closeBADModal()">
    <div class="bad-modal" onclick="event.stopPropagation()">
      <div class="bad-modal-t">Add to Document</div><div class="bad-modal-s">Which project?</div>
      <div class="bad-modal-options">${opts}<button class="bad-modal-opt new" onclick="BADPickerNew()">+ New document</button></div>
      <div class="bad-modal-actions"><button class="bad-modal-cancel" onclick="closeBADModal()">Cancel</button></div>
    </div></div>`);
}
function BADPickerSelect(pid) {
  BAD.currentProjectId = pid;
  if (BAD.pendingWidget) { BAD.addWidget(BAD.pendingWidget); showBADAddedToast(BAD.projects.find(p=>p.id===pid)?.name||'Document'); BAD.pendingWidget = null; }
  closeBADModal();
}
function BADPickerNew() {
  const name = prompt('Document name:', 'New Document'); if (!name) return;
  BAD.newProject(name);
  if (BAD.pendingWidget) { BAD.addWidget(BAD.pendingWidget); showBADAddedToast(name); BAD.pendingWidget = null; }
  closeBADModal(); if (document.getElementById('bad-project-select')) refreshBADToolbar();
}
function closeBADModal() { const m = document.getElementById('bad-modal-bg'); if (m) m.remove(); }
function showBADAddedToast(name) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#1769FF;color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;font-weight:700;z-index:2000;transition:opacity .3s';
  t.textContent = `✓ Added to "${name}" — click Build a Doc to view`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2500);
}

let _drag=null, _resize=null;
function badStartDrag(e,wid){
  e.preventDefault();
  const el=document.getElementById('bw-'+wid);
  _drag={wid,el,ox:e.clientX-el.offsetLeft,oy:e.clientY-el.offsetTop};
  el.classList.add('selected'); el.style.zIndex=100;
}
function badStartResize(e,wid){
  e.preventDefault(); e.stopPropagation();
  const el=document.getElementById('bw-'+wid);
  const w=BAD.getCurrentProject()?.widgets.find(x=>x.id===wid);
  _resize={wid,el,x0:e.clientX,y0:e.clientY,w0:w?.w||300,h0:w?.h||200};
}
document.addEventListener('mousemove',e=>{
  if(_drag){const x=Math.max(0,e.clientX-_drag.ox),y=Math.max(0,e.clientY-_drag.oy);_drag.el.style.left=x+'px';_drag.el.style.top=y+'px';BAD.updateWidget(_drag.wid,{x,y});}
  if(_resize){const w=Math.max(180,e.clientX-_resize.x0+_resize.w0),h=Math.max(100,e.clientY-_resize.y0+_resize.h0);_resize.el.style.width=w+'px';_resize.el.style.height=h+'px';BAD.updateWidget(_resize.wid,{w,h});}
});
document.addEventListener('mouseup',()=>{
  if(_drag){_drag.el.style.zIndex='';_drag.el.classList.remove('selected');_drag=null;}
  _resize=null;
});

function badDuplicateWidget(wid){
  const p=BAD.getCurrentProject();if(!p)return;
  const src=p.widgets.find(w=>w.id===wid);if(!src)return;
  const copy=JSON.parse(JSON.stringify(src));
  copy.id='w'+Date.now();
  const _maxY=Math.max(...p.widgets.map(w=>w.y+(w.h||200)),0);
  copy.x=src.x;copy.y=_maxY+12;
  if(src.render)copy.render=src.render;
  p.widgets.push(copy);renderBAD();
  showCustomSuccessToast('Block duplicated — placed below');
}

// CUSTOM INDUSTRY & DEPARTMENT PERSISTENCE (localStorage)
// ═══════════════════════════════════════════════════════════════

const CUSTOM_STORAGE_KEY = '1p_epm_hub_custom_v1';

function customLoad() {
  try {
    const raw = localStorage.getItem(CUSTOM_STORAGE_KEY);
    if (!raw) return { industries: [], departments: [] };
    return JSON.parse(raw);
  } catch(e) { return { industries: [], departments: [] }; }
}

function customSave(data) {
  try { localStorage.setItem(CUSTOM_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function customGetAll() { return customLoad(); }

// Add a custom industry and register it into INDUSTRIES
function customAddIndustry(item) {
  // item: { id, emoji, name, hook, why, color }
  const data = customLoad();
  data.industries = data.industries.filter(x => x.id !== item.id);
  data.industries.push(item);
  customSave(data);
  // Register into live INDUSTRIES object
  customRegisterIndustry(item);
}

function customRegisterIndustry(item) {
  if (!INDUSTRIES[item.id]) {
    INDUSTRIES[item.id] = {
      color: item.color || '#A78BFA',
      emoji: item.emoji || '🏢',
      name: item.name,
      hook: item.hook || item.why || '',
      why: item.why || item.hook || '',
      pains: item.pains || [],
      solutions: [],
      compliance: item.compliance ? item.compliance.split(',').map(s=>s.trim()) : [],
      breach: { name: 'No documented breach', date: '', body: 'Custom industry entry.', sources: '', prevention: '', features: [] },
      personas: [],
      stats: [],
      _custom: true
    };
    INAMES[item.id] = item.name;
    IEMOJI[item.id] = item.emoji || '🏢';
    ICOLORS[item.id] = item.color || '#A78BFA';
  }
}

// Add a custom department and register into DEPARTMENTS
function customAddDepartment(item) {
  const data = customLoad();
  data.departments = data.departments.filter(x => x.id !== item.id);
  data.departments.push(item);
  customSave(data);
  customRegisterDepartment(item);
}

function customRegisterDepartment(item) {
  if (!DEPARTMENTS[item.id]) {
    DEPARTMENTS[item.id] = {
      emoji: item.emoji || '🏢',
      name: item.name,
      color: item.color || '#A78BFA',
      hook: item.hook || '',
      credential_inv: item.credential_inv || '',
      pains: item.pains || [],
      features: [],
      personas: [],
      vault_structure: item.vault_structure || '',
      csm_insight: item.csm_insight || '',
      stat1: '', stat1l: '',
      stat2: '', stat2l: '',
      stat3: '', stat3l: '',
      _custom: true
    };
  }
}

function customDeleteIndustry(id) {
  const data = customLoad();
  data.industries = data.industries.filter(x => x.id !== id);
  customSave(data);
  delete INDUSTRIES[id];
  delete INAMES[id];
  delete IEMOJI[id];
  delete ICOLORS[id];
}

function customDeleteDepartment(id) {
  const data = customLoad();
  data.departments = data.departments.filter(x => x.id !== id);
  customSave(data);
  delete DEPARTMENTS[id];
  cbDepts.delete(id);
}

// Load all saved custom items on page load
function customInit() {
  const data = customLoad();
  (data.industries || []).forEach(item => customRegisterIndustry(item));
  (data.departments || []).forEach(item => customRegisterDepartment(item));
}

const EMOJI_OPTIONS = ['🏢','🏭','🏥','🏦','⚖️','💻','🎓','🤝','🏛️','⚡','🔬','🏨','🎬','📊','💎','🏠','🧬','🖥️','🚀','🌿','🎯','🛒','🍔','✈️','🎮','📱','🔐','💼','🏋️','🎪','🌐','🔧','📡','🏗️','🎨','🎵','⚕️','🌊','🛡️','🚗'];

function openEmojiPicker(inputId) {
  const existing = document.getElementById('emoji-picker-pop');
  if (existing) { existing.remove(); return; }
  const target = document.getElementById(inputId);
  const grid = EMOJI_OPTIONS.map(e =>
    `<span style="font-size:20px;cursor:pointer;padding:4px;border-radius:4px;display:inline-block" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''" onclick="document.getElementById('${inputId}').textContent=this.textContent;document.getElementById('emoji-picker-pop').remove()">${e}</span>`
  ).join('');
  const pop = document.createElement('div');
  pop.id = 'emoji-picker-pop';
  pop.style.cssText = 'position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:10px;display:grid;grid-template-columns:repeat(8,1fr);gap:2px;z-index:3000;box-shadow:0 8px 32px #00000080;max-width:280px';
  pop.innerHTML = grid;
  // Position near the target
  const rect = target.getBoundingClientRect();
  pop.style.top = (rect.bottom + 6) + 'px';
  pop.style.left = rect.left + 'px';
  document.body.appendChild(pop);
  setTimeout(() => document.addEventListener('click', function h(e){ if(!pop.contains(e.target)&&e.target!==target){pop.remove();document.removeEventListener('click',h);}}, {once:false}), 100);
}

function saveCustomIndustry(editId) {
  const name = document.getElementById('ind-name').value.trim();
  if (!name) { alert('Industry name is required.'); return; }
  const emoji  = document.getElementById('ind-emoji-display').textContent.trim() || '🏢';
  const color  = document.getElementById('ind-color-val').value || '#A78BFA';
  const hook   = document.getElementById('ind-hook').value.trim();
  const why    = document.getElementById('ind-why').value.trim();
  const pains  = document.getElementById('ind-pains').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const comp   = document.getElementById('ind-compliance').value.split(',').map(s=>s.trim()).filter(Boolean);
  const id = editId || ('custom_ind_' + name.toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g,'_'));

  customAddIndustry({ id, emoji, name, hook, why, pains, color, compliance: comp });
  document.getElementById('custom-modal-bg').remove();

  // Refresh current view if on customer builder
  if (document.getElementById('cb-industry')) {
    const sel = document.getElementById('cb-industry');
    if (!sel.querySelector(`option[value="${id}"]`)) {
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = `${emoji} ${name} ✦`;
      sel.appendChild(opt);
    }
  }
  // Refresh industry sidebar if on industry tab
  if (document.querySelector('#sidebar .sec-hdr.industry')) {
    buildIndustrySidebar();
  }
  showCustomSuccessToast(`Industry "${name}" saved!`);

function saveCustomDepartment(editId) {
  const name = document.getElementById('dept-name').value.trim();
  if (!name) { alert('Department name is required.'); return; }
  const emoji  = document.getElementById('dept-emoji-display').textContent.trim() || '🏢';
  const color  = document.getElementById('dept-color-val').value || '#3A9EFF';
  const hook   = document.getElementById('dept-hook').value.trim();
  const creds  = document.getElementById('dept-creds').value.trim();
  const pains  = document.getElementById('dept-pains').value.split('\n').map(s=>s.trim()).filter(Boolean);
  const vault  = document.getElementById('dept-vault').value.trim();
  const insight= document.getElementById('dept-insight').value.trim();
  const id = editId || ('custom_dept_' + name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_'));

  customAddDepartment({ id, emoji, name, color, hook, credential_inv: creds, pains, vault_structure: vault, csm_insight: insight });
  document.getElementById('custom-modal-bg').remove();

  // Refresh dept checkbox in customer builder
  const checksDiv = document.getElementById('cbck-'+id);
  if (!checksDiv) {
    const deptsDiv = document.querySelector('.cb-checks');
    if (deptsDiv) {
      const lbl = document.createElement('label');
      lbl.className = 'cb-check' + (cbDepts.has(id) ? ' checked' : '');
      lbl.id = 'cbck-' + id;
      lbl.onclick = () => toggleDept(id);
      lbl.innerHTML = `<span class="cb-check-ico">${emoji}</span><span class="cb-check-lbl">${name} ✦</span>`;
      deptsDiv.appendChild(lbl);
    }
  }
  // Refresh dept sidebar if visible
  if (document.querySelector('#sidebar .sec-hdr')) buildDeptSidebar();
  showCustomSuccessToast(`Department "${name}" saved!`);
}

function showCustomSuccessToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#A78BFA;color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;font-weight:700;z-index:3000;transition:opacity .3s';
  t.textContent = '✓ ' + msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2500);
}

const CB_PROFILES_KEY = '1p_epm_cb_profiles_v1';
let cbSelectedIndustries = []; // array of iids (multi-select)

// ── PROFILE PERSISTENCE ──────────────────────────────────────
function cbSaveProfile() {
  const company = document.getElementById('cb-company')?.value.trim();
  if (!company) { alert('Add a company name first.'); return; }

  const profile = {
    id: 'prof_' + Date.now(),
    saved_at: new Date().toISOString(),
    company,
    industries: cbSelectedIndustries.slice(),
    size: cbGetActiveChips('chips-size')[0] || '',
    current: document.getElementById('cb-current-custom')?.value.trim() || cbGetActiveChips('chips-current')[0] || '',
    contact: document.getElementById('cb-contact')?.value.trim() || '',
    pains: cbGetTags('pain-tags'),
    stack: cbGetTags('stack-tags'),
    compliance: cbGetActiveChips('chips-compliance'),
    objections: cbGetActiveChips('chips-objections'),
    stage: cbGetActiveChips('chips-stage')[0] || '',
    depts: [...cbDepts],
    notes: document.getElementById('cb-notes')?.value.trim() || '',
    last_result: cbLastResult || null
  };

  try {
    const all = JSON.parse(localStorage.getItem(CB_PROFILES_KEY) || '[]');
    // update if same company exists, else prepend
    const idx = all.findIndex(p => p.company.toLowerCase() === company.toLowerCase());
    if (idx >= 0) all[idx] = profile; else all.unshift(profile);
    localStorage.setItem(CB_PROFILES_KEY, JSON.stringify(all.slice(0, 20))); // keep latest 20
    cbRefreshProfileBar();
    showCustomSuccessToast(`Profile saved — "${company}"`);
  } catch(e) { alert('Could not save: ' + e.message); }
}

function cbLoadProfiles() {
  try { return JSON.parse(localStorage.getItem(CB_PROFILES_KEY) || '[]'); }
  catch(e) { return []; }
}

function cbDeleteProfile(id) {
  try {
    const all = cbLoadProfiles().filter(p => p.id !== id);
    localStorage.setItem(CB_PROFILES_KEY, JSON.stringify(all));
    cbRefreshProfileBar();
    showCustomSuccessToast('Profile deleted.');
  } catch(e) {}
}

function cbLoadProfile(id) {
  const p = cbLoadProfiles().find(x => x.id === id);
  if (!p) return;

  // Restore all fields
  const setVal = (id, val) => { const el = document.getElementById(id); if(el) el.value = val||''; };
  setVal('cb-company', p.company);
  setVal('cb-contact', p.contact);
  setVal('cb-current-custom', p.current);
  setVal('cb-notes', p.notes);

  // Industries
  cbSelectedIndustries = p.industries || [];
  cbRenderIndustryTags();

  // Chips
  const restoreChips = (groupId, vals, multi) => {
    document.querySelectorAll(`#${groupId} .cb-chip`).forEach(b => {
      const active = multi ? vals.includes(b.textContent.trim()) : b.textContent.trim() === vals;
      b.classList.toggle('active', active);
    });
  };
  restoreChips('chips-size', p.size, false);
  restoreChips('chips-current', p.current, false);
  restoreChips('chips-compliance', p.compliance || [], true);
  restoreChips('chips-objections', p.objections || [], true);
  restoreChips('chips-stage', p.stage, false);

  // Tags
  const restoreTags = (tagsId, vals) => {
    const wrap = document.getElementById(tagsId); if(!wrap) return;
    wrap.innerHTML = '';
    (vals||[]).forEach(v => cbAddTag(tagsId, v));
  };
  restoreTags('pain-tags', p.pains);
  restoreTags('stack-tags', p.stack);

  // Depts
  cbDepts.clear();
  (p.depts||[]).forEach(did => {
    cbDepts.add(did);
    const el = document.getElementById('cbck-' + did);
    if(el) el.classList.add('checked');
  });
  // Uncheck others
  document.querySelectorAll('.cb-check.checked').forEach(el => {
    const did = el.id.replace('cbck-','');
    if(!cbDepts.has(did)) el.classList.remove('checked');
  });

  // If last result exists, show it
  if (p.last_result) {
    cbLastResult = p.last_result;
    renderStrategy(p.last_result.result, p.company, cbSelectedIndustries.length ? INDUSTRIES[cbSelectedIndustries[0]] : null);
  }

  // Trigger governance panel update
  cbUpdateGovernancePanels();
  showCustomSuccessToast(`Loaded — "${p.company}"`);
}

function cbRefreshProfileBar() {
  const profiles = cbLoadProfiles();
  const sel = document.getElementById('cb-saved-select');
  if (!sel) return;
  sel.innerHTML = `<option value="">— Load saved profile —</option>` +
    profiles.map(p => `<option value="${p.id}">${p.company} · ${new Date(p.saved_at).toLocaleDateString()}</option>`).join('');
}

// ── MULTI-INDUSTRY TAG INPUT ─────────────────────────────────
function cbRenderIndustryTags() {
  const wrap = document.getElementById('cb-ind-tags');
  if (!wrap) return;
  wrap.innerHTML = '';
  cbSelectedIndustries.forEach(iid => {
    const I = INDUSTRIES[iid]; if(!I) return;
    const hasIntel = !!GOVERNANCE_INTEL[iid];
    const pill = document.createElement('span');
    pill.className = 'cb-ind-pill';
    pill.style.background = I.color + '18';
    pill.style.color = I.color;
    pill.style.border = '1px solid ' + I.color + '44';
    pill.innerHTML = `${I.emoji} ${I.name}${hasIntel ? `<button class="gov-info-btn" onclick="openGovInsight('${iid}')" title="View governance brief">ⓘ</button>` : ''}<button onclick="cbRemoveIndustry('${iid}')">×</button>`;
    wrap.appendChild(pill);
  });
  // No longer auto-injects inline panels — governance is now pull-based via ⓘ
}

function cbAddIndustry(iid) {
  if (!iid || cbSelectedIndustries.includes(iid)) return;
  cbSelectedIndustries.push(iid);
  cbRenderIndustryTags();
  cbIndustryChange(iid); // trigger tech stack hints
  const input = document.getElementById('cb-ind-input');
  if(input){ input.value=''; input.focus(); }
  const dropdown = document.getElementById('cb-ind-dd');
  if(dropdown) dropdown.remove();
}

function cbRemoveIndustry(iid) {
  cbSelectedIndustries = cbSelectedIndustries.filter(x => x !== iid);
  cbRenderIndustryTags();
}

function cbShowIndustryDropdown(val) {
  const existing = document.getElementById('cb-ind-dd');
  if(existing) existing.remove();
  const wrap = document.getElementById('cb-ind-wrap');
  if(!wrap) return;
  const filtered = Object.entries(INDUSTRIES).filter(([iid,I]) =>
    (!val || I.name.toLowerCase().includes(val.toLowerCase())) &&
    !cbSelectedIndustries.includes(iid)
  ).slice(0, 12);
  if(!filtered.length) return;
  const dd = document.createElement('div');
  dd.className = 'cb-ind-dropdown'; dd.id = 'cb-ind-dd';
  dd.innerHTML = filtered.map(([iid,I]) =>
    `<div class="cb-ind-opt" onclick="cbAddIndustry('${iid}')">${I.emoji} ${I.name}</div>`
  ).join('');
  wrap.appendChild(dd);
}

function cbApplyPreset(preset) {
  // Industry presets for common account types
  const presets = {
    'Health System': ['healthcare','lifesciences'],
    'Regional Bank': ['financial','fintech'],
    'Law Firm': ['legal','professionalservices'],
    'Hospital + Pharma': ['healthcare','lifesciences','government'],
    'SaaS Startup': ['technology','fintech'],
    'Retail Chain': ['retail','hospitality'],
    'Gov Contractor': ['government','manufacturing'],
    'University': ['education','lifesciences'],
    'Manufacturer': ['manufacturing','energy'],
    'Media Co': ['media','technology'],
  };
  const ids = presets[preset] || [];
  ids.forEach(iid => { if (!cbSelectedIndustries.includes(iid)) cbSelectedIndustries.push(iid); });
  cbRenderIndustryTags();
}

const PRODUCT_KEY = '1p_epm_hub_products_v1';

  try {

function toggleProduct(pid) {
  if (pid === 'epm') return;
  activeProducts[pid] = !activeProducts[pid];
  try { localStorage.setItem(PRODUCT_KEY, JSON.stringify(activeProducts)); } catch(e) {}
  productSyncUI();

  const tab = curTab;
  if (tab === 'industry' && curIid) renderIndustry(curIid);

  showCustomSuccessToast(activeProducts[pid] ? `✓ ${name} activated` : `${name} deactivated`);

function productSyncUI() {

    Object.entries(group.data).forEach(([cid, C]) => {
      const el = document.createElement('div');
      el.className = 'ni' + (curCompId === cid ? ' active' : '');
      el.style.borderLeftColor = curCompId === cid ? group.color : '';
      el.innerHTML = `<span style="font-size:15px;flex-shrink:0">${C.emoji||'⚔️'}</span><span class="nn">${C.name}</span>`;
      el.onclick = () => {
        curCompId = cid;
        document.querySelectorAll('.ni').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        el.style.borderLeftColor = group.color;
        if (group.type === 'epm') renderCompetitor(cid);
        else if (group.type === 'trelica') renderSaaSCompetitor(cid);
        else renderDTCompetitor(cid);
      };
      sb.appendChild(el);
    });
  });

  if (!curCompId) {
    detail.innerHTML = `<div style="padding:24px 28px"><div style="font-size:9px;font-weight:800;letter-spacing:.16em;color:#EF4444;margin-bottom:8px">⚔️ COMPETE</div><div style="font-size:20px;font-weight:800;color:var(--t1);margin-bottom:8px">Battle Cards</div><div style="font-size:12px;color:var(--t3);line-height:1.7">All competitors in one place — EPM, Trelica SaaS Manager, and Device Trust.<br><br>Select a competitor from the sidebar.</div></div>`;
  }
}

function roadmapLoad() {
  try { return JSON.parse(localStorage.getItem(ROADMAP_KEY)) || DEFAULT_ROADMAP; }
  catch(e) { return DEFAULT_ROADMAP; }
}
function roadmapSave(data) {
  try { localStorage.setItem(ROADMAP_KEY, JSON.stringify(data)); } catch(e) {}
}

function showRoadmap() {
  const detail = document.getElementById('detail');
  const data = roadmapLoad();
  const isAdmin = window._adminMode === true;

  const statusStyles = {
    shipping:   { color:'#10B981', bg:'#10B98118', label:'Shipping Now' },
    inprogress: { color:'#3A9EFF', bg:'#3A9EFF18', label:'In Progress' },
    planned:    { color:'#F59E0B', bg:'#F59E0B18', label:'Planned' },
    shipped:    { color:'#10B981', bg:'#10B98118', label:'✓ Shipped' },
    slipped:    { color:'#EF4444', bg:'#EF444418', label:'Timeline Adjusted' },
  };
  const prodStyles = {
    epm:     { color:'#10B981', label:'EPM', emoji:'🔑' },
    trelica: { color:'#3A9EFF', label:'Trelica', emoji:'🔷' },
    dt:      { color:'#F59E0B', label:'Device Trust', emoji:'🛡️' },
  };

  const pill = (st) => {
    const s = statusStyles[st] || statusStyles.planned;
    return `<span style="font-size:9px;font-weight:800;padding:2px 8px;border-radius:10px;background:${s.bg};color:${s.color};border:1px solid ${s.color}33">${s.label}</span>`;
  };
  const prodBadge = (p) => {
    const s = prodStyles[p] || prodStyles.epm;
    return `<span style="font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;background:${s.color}18;color:${s.color};border:1px solid ${s.color}33">${s.emoji} ${s.label}</span>`;
  };

  const viewBtn = (v, label) => `<button onclick="roadmapView='${v}';showRoadmap()" style="padding:6px 14px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid ${roadmapView===v?'var(--border2)':'var(--border)'};background:${roadmapView===v?'var(--bg2)':'transparent'};color:${roadmapView===v?'var(--t1)':'var(--t4)'};transition:all .12s">${label}</button>`;

  let bodyHTML = '';

  if (roadmapView === 'current') {
    const byQuarter = {};
    data.items.forEach(item => {
      if (!byQuarter[item.quarter]) byQuarter[item.quarter] = [];
      byQuarter[item.quarter].push(item);
    });
    Object.entries(byQuarter).forEach(([quarter, items]) => {
      bodyHTML += `<div style="font-size:9px;font-weight:800;letter-spacing:.14em;color:var(--t4);margin:18px 0 10px">${quarter}</div>`;
      items.forEach(item => {
        const betaHTML = item.beta ? `
          <div style="margin-top:10px;background:#A78BFA08;border:1px solid #A78BFA30;border-radius:6px;padding:9px 12px">
            <div style="font-size:9px;font-weight:800;letter-spacing:.1em;color:#A78BFA;margin-bottom:4px">🔬 BETA — OPEN FOR ENROLLMENT</div>
            <div style="font-size:11px;color:var(--t2);line-height:1.55">${item.betaDetails||'Contact CS Ops to nominate an account.'}</div>
          </div>` : '';
        bodyHTML += `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 15px;margin-bottom:8px">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                ${prodBadge(item.product)}
                <span style="font-size:13px;font-weight:700;color:var(--t1)">${item.name}</span>
              </div>
              ${pill(item.status)}
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div><div style="font-size:9px;font-weight:800;letter-spacing:.1em;color:#EF4444;margin-bottom:4px">🔒 INTERNAL GUIDANCE</div>
                <div style="font-size:11px;color:var(--t2);line-height:1.6">${item.internal}</div></div>
              <div><div style="font-size:9px;font-weight:800;letter-spacing:.1em;color:#10B981;margin-bottom:4px">✓ CUSTOMER-SAFE TO SAY</div>
                <div style="font-size:11px;color:var(--t2);line-height:1.6">${item.external}</div></div>

            ${betaHTML}
            ${isAdmin ? `<div style="margin-top:8px;display:flex;gap:6px"><button onclick="roadmapEditItem('${item.id}')" style="font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--t4);cursor:pointer">✏️ Edit</button><button onclick="roadmapDeleteItem('${item.id}')" style="font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid #EF444430;background:transparent;color:#EF4444;cursor:pointer">✕</button></div>` : ''}

          <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 15px;margin-bottom:8px;opacity:${item.shipped?'0.85':'1'}">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap">
              <div style="display:flex;align-items:center;gap:8px">${prodBadge(item.product)}<span style="font-size:13px;font-weight:700;color:var(--t1)">${item.name}</span></div>

      bodyHTML = `<div style="padding:24px;color:var(--t4);font-size:12px">No open beta programs right now.</div>`;
    } else {

              </div>
            </div>
            <div style="font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:10px">${item.betaDetails||''}</div>
            <div style="font-size:9px;font-weight:800;letter-spacing:.1em;color:#A78BFA;margin-bottom:4px">INTERNAL GUIDANCE FOR NOMINATING ACCOUNTS</div>
            <div style="font-size:11px;color:var(--t2);line-height:1.6">${item.internal}</div>
          </div>`;
      });
    }
  }

  const betaCount = data.items.filter(i => i.beta).length;

  detail.innerHTML = `
    <div style="padding:20px 28px;max-width:860px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:9px;font-weight:800;letter-spacing:.16em;color:var(--t4);margin-bottom:6px">🗺️ PRODUCT ROADMAP</div>

function roadmapAddItem() {
  const data = roadmapLoad();
  const name = prompt('Feature name:'); if(!name) return;
  const product = prompt('Product (epm / trelica / dt):') || 'epm';
  const status = prompt('Status (shipping / inprogress / planned):') || 'planned';
  const quarter = prompt('Quarter (e.g. Q3 2026):') || 'Q3 2026';
  const internal = prompt('Internal guidance (what to tell the team):') || '';
  const external = prompt('Customer-safe message:') || '';
  const betaQ = confirm('Is this a beta program?');
  const betaDetails = betaQ ? (prompt('Beta details and nomination instructions:') || '') : '';
  data.items.push({ id:'rm'+Date.now(), product, name, status, quarter, internal, external, beta:betaQ, betaDetails });
  roadmapSave(data);
  showRoadmap();
  showCustomSuccessToast('Roadmap item added');
}

function roadmapEditItem(id) {
  const data = roadmapLoad();
  const item = data.items.find(i => i.id === id); if(!item) return;
  const name = prompt('Feature name:', item.name); if(!name) return;
  item.name = name;
  item.internal = prompt('Internal guidance:', item.internal) || item.internal;
  item.external = prompt('Customer-safe message:', item.external) || item.external;
  item.status = prompt('Status (shipping/inprogress/planned):', item.status) || item.status;
  roadmapSave(data);
  showRoadmap();
  showCustomSuccessToast('Item updated');
}

function roadmapDeleteItem(id) {
  if (!confirm('Delete this roadmap item?')) return;
  const data = roadmapLoad();
  data.items = data.items.filter(i => i.id !== id);
  roadmapSave(data);
  showRoadmap();
  showCustomSuccessToast('Item deleted');
}
