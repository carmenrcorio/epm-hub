<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>1Password EPM Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07111F;color:#A8BDD4;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#020C17;border-bottom:1px solid #1A3050;padding:0 20px;display:flex;align-items:stretch;gap:0;flex-shrink:0;height:44px}
.logo{font-size:13px;font-weight:800;color:#F0F6FF;letter-spacing:.04em;display:flex;align-items:center;padding-right:20px;border-right:1px solid #1A3050;margin-right:4px}
.logo span{color:#1769FF}
.tab{padding:0 16px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#3A5878;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:#7A9AB8}
.tab.active{color:#F0F6FF;border-bottom-color:#1769FF}
.tab.soon{color:#2A4060;cursor:default;pointer-events:none}
.tab .t-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;background:#1A305088;color:#2A4060;border:1px solid #1A3050;letter-spacing:.06em}
.topbar-right{margin-left:auto;display:flex;align-items:center}
.sw{position:relative}
.sw input{padding:5px 10px 5px 28px;background:#0D1E33;border:1px solid #1A3050;border-radius:5px;color:#F0F6FF;font-size:11px;outline:none;width:200px;transition:width .2s}
.sw input:focus{border-color:#1769FF55;width:240px}
.sw input::placeholder{color:#2A4060}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#2A4060}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:228px;flex-shrink:0;background:#020C17;border-right:1px solid #1A3050;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:#1A3050}
.sec-hdr{padding:10px 14px 4px;font-size:9px;font-weight:800;letter-spacing:.14em;flex-shrink:0}
.sec-hdr.admin{color:#4D8EFF}.sec-hdr.enduser{color:#00C4BE}.sec-hdr.developer{color:#A78BFA}.sec-hdr.industry{color:#F59E0B}
.ni{padding:7px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;display:flex;align-items:center;gap:7px}
.ni:hover{background:#0D1E3355}
.ni.active{background:#0D1E33}
.ni.active.na{border-left-color:#1769FF}.ni.active.ne{border-left-color:#00C4BE}.ni.active.nd{border-left-color:#A78BFA}.ni.active.ni2{border-left-color:#F59E0B}
.nn{font-size:12px;color:#5A7A9A;flex:1;line-height:1.3}
.ni.active .nn,.ni:hover .nn{color:#C8D8E8}
.ni.active .nn{color:#F0F6FF;font-weight:600}
.npg{font-size:10px;color:#2A4060;font-family:monospace}
.ntag{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.04em}
.ntag.unique{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.ntag.new{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.detail{flex:1;overflow-y:auto}
.detail::-webkit-scrollbar{width:4px}.detail::-webkit-scrollbar-thumb{background:#1A3050;border-radius:2px}
/* Feature page */
.fp{max-width:860px;padding:24px 32px 56px}
.fp-ref{font-size:10px;color:#2A4060;font-family:monospace;margin-bottom:14px}
.prob{background:#EF444410;border:1px solid #EF444430;border-radius:6px;padding:12px 16px;margin-bottom:18px}
.prob-l{font-size:9px;font-weight:800;letter-spacing:.14em;color:#EF4444;margin-bottom:4px}
.prob-t{font-size:13px;color:#FCA5A5;line-height:1.65}
.fp-tr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.fp-title{font-size:24px;font-weight:800;color:#F0F6FF;line-height:1.2}
.fp-badges{display:flex;gap:5px;flex-wrap:wrap;padding-top:4px;flex-shrink:0}
.fb{font-size:10px;font-weight:800;padding:3px 9px;border-radius:4px;letter-spacing:.05em}
.fb.unique{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B44}
.fb.new{background:#10B98118;color:#10B981;border:1px solid #10B98144}
.fb.enterprise{background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF44}
.fb.dev-essential{background:#7C3AED18;color:#A78BFA;border:1px solid #7C3AED44}
.fb.superpower{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B44}
.fp-intro{font-size:14px;color:#C8D8E8;line-height:1.8;margin-bottom:20px}
.blk{background:#0D1E33;border:1px solid #1A3050;border-radius:8px;padding:15px 17px;margin-bottom:11px}
.blk.bl{border-left:3px solid #1769FF}.blk.bt{border-left:3px solid #00C4BE}
.blk.ba{border-left:3px solid #F59E0B}.blk.br{border-left:3px solid #EF4444}
.blk.bg{border-left:3px solid #10B981}.blk.bp{border-left:3px solid #A78BFA}
.blk-t{font-size:9px;font-weight:800;letter-spacing:.12em;margin-bottom:9px}
.blk-t.blue{color:#4D8EFF}.blk-t.teal{color:#00C4BE}.blk-t.amber{color:#F59E0B}
.blk-t.red{color:#EF4444}.blk-t.green{color:#10B981}.blk-t.purple{color:#A78BFA}.blk-t.muted{color:#3A5878}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.chk{display:flex;gap:7px;align-items:flex-start;font-size:12px;color:#A8BDD4;line-height:1.55;margin-bottom:5px}
.chk::before{content:'✓';color:#10B981;font-weight:800;font-size:11px;flex-shrink:0;margin-top:2px}
.pt{font-size:12px;color:#7A9AB8;line-height:1.65;white-space:pre-line}
.sf{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #132847}
.sf:last-child{margin:0;padding:0;border:none}
.sf-title{font-size:13px;font-weight:700;color:#F0F6FF;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.sf-desc{font-size:12px;color:#7A9AB8;line-height:1.6}
.stag{font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.05em}
.stag.rec{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.stag.s1{background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF33}
.stag.adv{background:#7C3AED18;color:#A78BFA;border:1px solid #7C3AED33}
.stag.comp{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.code{background:#020810;border:1px solid #132847;border-radius:6px;padding:12px 14px;font-family:monospace;font-size:11px;color:#4D8EFF;line-height:1.75;margin-top:7px;overflow-x:auto}
.provs{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.prov{padding:3px 9px;background:#132847;border:1px solid #1A3050;border-radius:4px;font-size:11px;color:#A8BDD4}
.impact-bar{background:linear-gradient(135deg,#1769FF12,#00C4BE08);border:1px solid #1769FF28;border-radius:8px;padding:15px 17px;margin-bottom:12px}
.impact-l{font-size:9px;font-weight:800;letter-spacing:.14em;color:#4D8EFF;margin-bottom:7px}
.impact-t{font-size:13px;color:#C8D8E8;line-height:1.7}
.impact-q{font-style:italic;color:#5A7A9A;font-size:12px;margin-top:9px;padding-top:9px;border-top:1px solid #1A3050;line-height:1.6}
.meta3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
.mb{background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:12px 13px}
.mb-l{font-size:9px;font-weight:800;letter-spacing:.12em;color:#2A4878;margin-bottom:6px}
.mb-t{font-size:12px;color:#7A9AB8;line-height:1.6}
/* Cross-ref */
.xref{border-top:1px solid #1A3050;padding-top:18px;margin-top:4px}
.xref-t{font-size:9px;font-weight:800;letter-spacing:.14em;color:#2A4878;margin-bottom:10px}
.xref-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.xc{background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:11px 13px;cursor:pointer;transition:border-color .12s}
.xc:hover{border-color:#2A4878}
.xc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.xc-name{font-size:12px;font-weight:700;color:#F0F6FF;flex:1}
.xc-type{font-size:9px;font-weight:800;padding:1px 6px;border-radius:3px;letter-spacing:.06em;background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.xc-desc{font-size:11px;color:#5A7A9A;line-height:1.55}
.xc-link{font-size:10px;color:#1769FF;margin-top:4px;font-weight:600}
/* Industry page */
.ind-hero{padding:20px 28px 16px;border-bottom:1px solid #1A3050}
.ind-eye{font-size:9px;font-weight:800;letter-spacing:.16em;margin-bottom:7px}
.ind-title{font-size:24px;font-weight:800;color:#F0F6FF;margin-bottom:7px}
.ind-hook{font-size:13px;line-height:1.75;font-style:italic;color:#7A9AB8}
.ind-body{padding:20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ind-full{padding:0 28px 32px;display:flex;flex-direction:column;gap:14px}
.pain-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.px{color:#EF4444;font-weight:800;font-size:11px;flex-shrink:0;margin-top:2px}
.pt2{font-size:12px;color:#7A9AB8;line-height:1.55}
.sol-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sc{background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:11px 12px;cursor:pointer;transition:border-color .12s}
.sc:hover{border-color:#2A4878}
.sol-tag{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.05em;margin-bottom:6px}
.sol-name{font-size:12px;font-weight:700;color:#F0F6FF;margin-bottom:4px}
.sol-desc{font-size:11px;color:#5A7A9A;line-height:1.55}
.sol-link{font-size:10px;color:#1769FF;margin-top:4px;font-weight:600}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pc{background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:11px 12px}
.pc-r{font-size:11px;font-weight:700;color:#F0F6FF;margin-bottom:3px}
.pc-q{font-size:11px;color:#5A7A9A;line-height:1.55;font-style:italic}
.comp-strip{display:flex;flex-wrap:wrap;gap:5px}
.cb{font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;background:#1769FF14;color:#4D8EFF;border:1px solid #1769FF33}
.stat-row{display:flex;gap:9px}
.sb{flex:1;background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:11px 13px;text-align:center}
.sn{font-size:18px;font-weight:800}
.sl{font-size:10px;color:#5A7A9A;margin-top:2px;line-height:1.4}
.breach-blk{background:#EF444408;border:1px solid #EF444430;border-radius:8px;padding:16px 18px}
.breach-hdr{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap}
.breach-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;color:#EF4444;background:#EF444418;padding:2px 8px;border-radius:3px;border:1px solid #EF444433}
.breach-name{font-size:14px;font-weight:700;color:#FCA5A5}
.breach-date{font-size:11px;color:#5A7A9A;margin-left:auto}
.breach-body{font-size:12px;color:#7A9AB8;line-height:1.7;margin-bottom:10px}
.breach-src{font-size:10px;color:#2A4060;margin-bottom:12px;font-style:italic}
.prev-hdr{font-size:9px;font-weight:800;letter-spacing:.1em;color:#10B981;background:#10B98110;padding:2px 8px;border-radius:3px;border:1px solid #10B98133;display:inline-block;margin-bottom:7px}
.prev-body{font-size:12px;color:#A8BDD4;line-height:1.7}
.prev-feats{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.pf{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF33;cursor:pointer}
.pf:hover{background:#1769FF33}
.empty{display:flex;align-items:center;justify-content:center;height:200px;color:#2A4060;font-size:13px}
/* ── FILTER BAR ─────────────────────────────── */
.filter-bar{display:flex;align-items:center;gap:8px;padding:12px 24px 0;flex-shrink:0;flex-wrap:wrap}
.flt{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #1A3050;color:#5A7A9A;background:transparent;transition:all .12s;letter-spacing:.03em}
.flt:hover{color:#C8D8E8;border-color:#2A4878}
.flt.active-all{background:#1769FF18;color:#4D8EFF;border-color:#1769FF55}
.flt.active-admin{background:#1769FF18;color:#4D8EFF;border-color:#1769FF55}
.flt.active-enduser{background:#00C4BE18;color:#00C4BE;border-color:#00C4BE55}
.flt.active-developer{background:#7C3AED18;color:#A78BFA;border-color:#7C3AED55}
.flt-divider{width:1px;height:18px;background:#1A3050;margin:0 2px}
.flt-count{font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;margin-left:4px;background:#1A305066}
/* ── TILE GRID ───────────────────────────────── */
.tile-wrap{padding:16px 24px 48px}
.tile-section-hdr{font-size:9px;font-weight:800;letter-spacing:.16em;margin:18px 0 10px;display:flex;align-items:center;gap:10px}
.tile-section-hdr::after{content:'';flex:1;height:1px;background:#1A3050}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:11px;margin-bottom:4px}
.tile{background:#0D1E33;border:1px solid #1A3050;border-radius:9px;padding:14px 15px;cursor:pointer;transition:all .14s;display:flex;flex-direction:column;gap:6px;position:relative}
.tile:hover{border-color:#2A4878;background:#0F2240;transform:translateY(-1px)}
.tile-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.tile-name{font-size:13px;font-weight:700;color:#F0F6FF;line-height:1.3;flex:1}
.tile-badge{font-size:8px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.tile-badge.unique{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.tile-badge.new{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.tile-badge.enterprise{background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF33}
.tile-badge.dev-essential{background:#7C3AED18;color:#A78BFA;border:1px solid #7C3AED33}
.tile-badge.superpower{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.tile-prob{font-size:11px;color:#EF4444;line-height:1.5;font-style:italic}
.tile-sum{font-size:11px;color:#5A7A9A;line-height:1.55}
.tile-arrow{font-size:11px;color:#1769FF;margin-top:auto;font-weight:700}
.tile-sec-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:9px 0 0 9px}
.tile-pg{font-size:9px;color:#2A4060;font-family:monospace;margin-left:auto}
/* ── CUSTOMER BUILDER ────────────────────────────────────────── */
.cb-layout{display:flex;height:100%;overflow:hidden}
.cb-form{width:360px;flex-shrink:0;background:#020C17;border-right:1px solid #1A3050;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px}
.cb-form::-webkit-scrollbar{width:3px}.cb-form::-webkit-scrollbar-thumb{background:#1A3050}
.cb-output{flex:1;overflow-y:auto}
.cb-output::-webkit-scrollbar{width:4px}.cb-output::-webkit-scrollbar-thumb{background:#1A3050;border-radius:2px}
.cb-head{font-size:14px;font-weight:800;color:#F0F6FF;margin-bottom:2px}
.cb-sub{font-size:11px;color:#2A4060;line-height:1.5}
.cb-section{display:flex;flex-direction:column;gap:6px}
.cb-label{font-size:9px;font-weight:800;letter-spacing:.13em;color:#2A4878}
.cb-input{background:#0D1E33;border:1px solid #1A3050;border-radius:5px;color:#EAF3FF!important;font-size:13px;padding:7px 10px;outline:none;width:100%;transition:border-color .12s;font-family:inherit}
.cb-input::placeholder{color:#3A6080;font-weight:400}
.cb-input:not(select):not(:placeholder-shown){color:#EAF3FF!important;font-weight:500}
.cb-input:focus{border-color:#1769FF55}
.cb-input::placeholder{color:#2A4060}
select.cb-input option{background:#0D1E33}
textarea.cb-input{resize:vertical;min-height:70px;line-height:1.6}
.cb-checks{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.cb-check{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:5px;cursor:pointer;border:1px solid #1A3050;background:#0D1E33;transition:all .12s}
.cb-check:hover{border-color:#2A4878}
.cb-check.checked{border-color:#1769FF55;background:#1769FF10}
.cb-check input{display:none}
.cb-check-lbl{font-size:11px;color:#7A9AB8;line-height:1.3}
.cb-check.checked .cb-check-lbl{color:#C8D8E8}
.cb-check-ico{font-size:13px;flex-shrink:0}
.cb-generate{padding:11px;background:#1769FF;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.03em;transition:all .12s;width:100%;margin-top:4px}
.cb-generate:hover{background:#1255CC}
.cb-generate:disabled{background:#1A3050;color:#3A5878;cursor:not-allowed}
.cb-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:14px}
.cb-spin-ring{width:36px;height:36px;border:3px solid #1A3050;border-top-color:#1769FF;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cb-spin-msg{font-size:12px;color:#3A5878}
.cb-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:40px}
.cb-empty-ico{font-size:48px;opacity:.2}
.cb-empty-t{font-size:14px;font-weight:700;color:#2A4060}
.cb-empty-s{font-size:12px;color:#1A3050;text-align:center;max-width:280px;line-height:1.6}
.cb-out-wrap{padding:22px 28px 56px;display:flex;flex-direction:column;gap:14px}
.cb-headline{background:linear-gradient(135deg,#1769FF18,#00C4BE08);border:1px solid #1769FF33;border-radius:10px;padding:18px 20px}
.cb-hl-co{font-size:11px;font-weight:800;letter-spacing:.12em;color:#4D8EFF;margin-bottom:6px}
.cb-hl-txt{font-size:20px;font-weight:800;color:#F0F6FF;line-height:1.3;margin-bottom:8px}
.cb-hl-sum{font-size:13px;color:#A8BDD4;line-height:1.75}
.cb-card{background:#0D1E33;border:1px solid #1A3050;border-radius:8px;overflow:hidden}
.cb-card-hdr{padding:11px 15px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1A3050}
.cb-card-ico{font-size:14px}
.cb-card-title{font-size:10px;font-weight:800;letter-spacing:.13em;color:#3A5878}
.cb-card-body{padding:13px 15px;display:flex;flex-direction:column;gap:9px}
.cb-dept-card{background:#07111F;border:1px solid #1A3050;border-radius:7px;padding:13px 14px}
.cb-dept-name{font-size:12px;font-weight:700;color:#F0F6FF;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.cb-dept-frame{font-size:12px;color:#7A9AB8;line-height:1.65;margin-bottom:8px}
.cb-dept-feats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.cb-dfeat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF33;cursor:pointer}
.cb-dfeat:hover{background:#1769FF33}
.cb-dept-q{font-size:11px;color:#5A7A9A;font-style:italic;line-height:1.55;border-top:1px solid #1A3050;padding-top:7px}
.cb-row{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:#A8BDD4;line-height:1.6}
.cb-row::before{content:'→';color:#1769FF;font-size:11px;flex-shrink:0;margin-top:2px}
.cb-feat-row{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #132847}
.cb-feat-row:last-child{border:none;padding-bottom:0}
.cb-feat-name{font-size:12px;font-weight:700;color:#F0F6FF;min-width:150px;flex-shrink:0}
.cb-feat-frame{font-size:12px;color:#7A9AB8;line-height:1.6;flex:1}
.cb-persona-row{background:#07111F;border:1px solid #1A3050;border-radius:6px;padding:10px 12px}

/* ══ TECH STACK SECTION ══════════════════════════════════════ */
.ts-wrap{padding:0 28px 28px}
.ts-hdr{font-size:9px;font-weight:800;letter-spacing:.14em;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.ts-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.ts-gap-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ts-gap-stat{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--t1)}
.ts-gap-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ts-gap-dot.red{background:#EF4444}
.ts-gap-dot.amber{background:#F59E0B}
.ts-gap-dot.green{background:#10B981}
.ts-gap-label{font-size:11px;color:var(--t3);font-weight:400;margin-left:2px}
.ts-gap-text{font-size:12px;color:var(--t2);flex:1;min-width:200px;line-height:1.55}
.ts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px}
.ts-tool{border-radius:7px;padding:10px 12px;border:1px solid;position:relative}
.ts-tool.sso-n{background:#EF444408;border-color:#EF444430}
.ts-tool.sso-p{background:#F59E0B08;border-color:#F59E0B30}
.ts-tool.sso-y{background:#10B98108;border-color:#10B98130}
.ts-tool-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.ts-tool-name{font-size:12px;font-weight:700;color:var(--t1);flex:1}
.ts-sso-badge{font-size:9px;font-weight:800;padding:1px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.ts-tool.sso-n .ts-sso-badge{background:#EF444420;color:#EF4444;border:1px solid #EF444440}
.ts-tool.sso-p .ts-sso-badge{background:#F59E0B20;color:#F59E0B;border:1px solid #F59E0B40}
.ts-tool.sso-y .ts-sso-badge{background:#10B98120;color:#10B981;border:1px solid #10B98140}
.ts-tool-cat{font-size:10px;color:var(--t4);margin-bottom:5px}
.ts-tool-note{font-size:11px;color:var(--t3);line-height:1.5}
.ts-coverage{font-size:10px;color:#3A9EFF;margin-top:4px;font-weight:600}
.ts-feature-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.ts-feat-tag{font-size:10px;padding:2px 7px;border-radius:3px;background:#3A9EFF14;color:#70B8FF;border:1px solid #3A9EFF25;font-weight:600}


/* ── CUSTOM INDUSTRY / DEPT ─────────────────────────────────── */
.custom-badge{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;background:#A78BFA18;color:#A78BFA;border:1px solid #A78BFA33;letter-spacing:.05em;margin-left:5px}
.cb-add-custom-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px dashed var(--border2);background:transparent;color:var(--t4);transition:all .12s;white-space:nowrap}
.cb-add-custom-btn:hover{border-color:#A78BFA55;color:#A78BFA;background:#A78BFA08}
.custom-modal-bg{position:fixed;inset:0;background:#00000080;z-index:2000;display:flex;align-items:center;justify-content:center}
.custom-modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:22px 24px;width:420px;max-width:95vw;box-shadow:0 20px 60px #00000090;max-height:85vh;overflow-y:auto}
.custom-modal::-webkit-scrollbar{width:3px}.custom-modal::-webkit-scrollbar-thumb{background:var(--border)}
.custom-modal-title{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:4px}
.custom-modal-sub{font-size:11px;color:var(--t3);margin-bottom:18px;line-height:1.5}
.custom-modal-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px}
.custom-modal-emoji{width:52px;flex-shrink:0;text-align:center;font-size:22px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px;cursor:pointer;transition:border-color .12s}
.custom-modal-emoji:hover{border-color:var(--border2)}
.custom-modal-label{font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--t4);margin-bottom:5px}
.custom-modal-input{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--t1);font-size:12px;padding:8px 10px;outline:none;width:100%;font-family:inherit;transition:border-color .12s}
.custom-modal-input:focus{border-color:#A78BFA55}
.custom-modal-input::placeholder{color:var(--t4)}
.custom-modal-textarea{resize:vertical;min-height:60px;line-height:1.6}
.custom-modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.custom-modal-cancel{padding:7px 16px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:12px;font-weight:600;cursor:pointer}
.custom-modal-save{padding:7px 18px;border-radius:5px;border:none;background:#A78BFA;color:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:background .12s}
.custom-modal-save:hover{background:#9061F9}
.custom-items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.custom-item-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px}
.custom-item-emoji{font-size:16px;flex-shrink:0}
.custom-item-name{font-size:12px;font-weight:600;color:var(--t1);flex:1}
.custom-item-del{background:none;border:none;color:var(--t4);cursor:pointer;font-size:14px;padding:0 2px;transition:color .12s}
.custom-item-del:hover{color:#EF4444}


/* ── CUSTOMER BUILDER UPGRADES ──────────────────────────────── */
.cb-profile-bar{display:flex;align-items:center;gap:8px;padding:10px 14px 0;flex-shrink:0;flex-wrap:wrap}
.cb-profile-select{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--t2);font-size:11px;padding:5px 9px;outline:none;flex:1;min-width:140px;cursor:pointer}
.cb-profile-select:focus{border-color:#A78BFA55}
.cb-profile-btn{padding:5px 11px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--t3);white-space:nowrap;transition:all .12s}
.cb-profile-btn:hover{border-color:var(--border2);color:var(--t2)}
.cb-profile-btn.save{border-color:#A78BFA44;color:#A78BFA}
.cb-profile-btn.save:hover{background:#A78BFA10}
.cb-ind-tags-wrap{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:5px 7px;display:flex;flex-wrap:wrap;gap:5px;min-height:36px;cursor:text;transition:border-color .12s}
.cb-ind-tags-wrap:focus-within{border-color:#A78BFA55}
.cb-ind-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}

.cb-ind-pill button:hover{opacity:1}

.cb-ind-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:7px;max-height:220px;overflow-y:auto;z-index:200;box-shadow:0 8px 24px #00000060}

.cb-ind-opt{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2)}
.cb-ind-opt:hover{background:var(--bg2)}
.cb-ind-opt.selected{background:#A78BFA10;color:#A78BFA}
.cb-preset-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.cb-preset{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid #A78BFA33;background:#A78BFA08;color:#A78BFA;transition:all .12s}
.cb-preset:hover{background:#A78BFA18;border-color:#A78BFA66}
.gov-panel{background:var(--bg2);border:1px solid var(--border);border-radius:7px;margin-bottom:6px;overflow:hidden}
.cb-section-out{background:var(--surface);border:1px solid var(--border);border-left:4px solid #3A9EFF;border-radius:0 8px 8px 0;padding:16px 18px;margin-bottom:12px}
.cb-section-title{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:800;letter-spacing:.14em;color:var(--t4);margin-bottom:12px}
.cb-snapshot-card{background:linear-gradient(135deg,var(--surface),var(--bg2));border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px}
.cb-out-wrap{padding:16px 18px}
.cb-error{padding:14px;background:#EF444408;border:1px solid #EF444430;border-radius:7px;color:#FF9999;font-size:12px}

.gov-panel-trigger{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;transition:background .12s}
.gov-panel-trigger:hover{background:#1769FF08}
.gov-panel-ico{font-size:13px;flex-shrink:0}
.gov-panel-title{font-size:10px;font-weight:700;color:var(--t2);flex:1}

.gov-panel-body{display:none;padding:0 12px 12px}
.gov-panel-body.open{display:block}

.gov-frameworks{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.gov-fw{font-size:9px;font-weight:800;padding:2px 7px;border-radius:3px;background:#1769FF14;color:#70B8FF;border:1px solid #1769FF25}
.cb-edu-section{background:var(--surface);border:1px solid var(--border);border-left:3px solid #F59E0B;border-radius:5px;padding:10px 12px;margin-top:8px}
.cb-edu-title{font-size:9px;font-weight:800;letter-spacing:.12em;color:#F59E0B;margin-bottom:6px}
.cb-edu-row{display:flex;gap:7px;align-items:flex-start;font-size:11px;color:var(--t2);margin-bottom:4px;line-height:1.55}
.cb-edu-row::before{content:"→";color:#F59E0B;flex-shrink:0;font-weight:700}


/* ══ PRODUCT SELECTOR ════════════════════════════════════════ */

<script>
let curTab='features',curFid=null,curIid=null,curFilter='all',srch='';

// ─── FEATURE FILTER BAR HTML ──────────────────────────────────
function filterBarHTML(active){
  const counts={all:FEATURES.length,admin:FEATURES.filter(f=>f.s==='admin').length,enduser:FEATURES.filter(f=>f.s==='enduser').length,developer:FEATURES.filter(f=>f.s==='developer').length};
  return`<div class="filter-bar">
    <button class="flt${active==='all'?' active-all':''}" onclick="showTiles('all')">⊞ All Features<span class="flt-count">${counts.all}</span></button>
    <span class="flt-divider"></span>
    <button class="flt${active==='admin'?' active-admin':''}" onclick="showTiles('admin')">🛡 Admin Controls<span class="flt-count">${counts.admin}</span></button>
    <button class="flt${active==='enduser'?' active-enduser':''}" onclick="showTiles('enduser')">👤 End-User Tools<span class="flt-count">${counts.enduser}</span></button>
    <button class="flt${active==='developer'?' active-developer':''}" onclick="showTiles('developer')">⚙️ Developer Power<span class="flt-count">${counts.developer}</span></button>
  </div>`;
}

// ─── TILE GRID ────────────────────────────────────────────────
const SEC_COLOR={admin:'#1769FF',enduser:'#00C4BE',developer:'#A78BFA'};
const SEC_LABEL={admin:'🛡 ADMIN CONTROLS',enduser:'👤 END-USER TOOLS',developer:'⚙️ DEVELOPER POWER'};
const BADGE_LABELS={unique:'UNIQUE',new:'NEW','dev-essential':'DEV ESSENTIAL',enterprise:'ENTERPRISE',superpower:'SUPERPOWER'};

function tileHTML(f){
  const col=SEC_COLOR[f.s];
  const badge=f.badge?`<span class="tile-badge ${f.badge}">${BADGE_LABELS[f.badge]||f.badge}</span>`:'';
  // Short summary: first sentence of intro, max 100 chars
  const sum=f.intro.replace(/\n/g,' ').split(/\.\s/)[0].substring(0,110)+(f.intro.length>110?'…':'');
  // Problem: first ~80 chars
  const prob=f.prob.substring(0,90)+(f.prob.length>90?'…':'');
  const wf = makeFeatureWidget(f.id);
  const badBtn = wf ? `<button class="add-bad-btn" title="Add to Build a Doc" onclick="event.stopPropagation();ensureBADProject();BAD.addWidget(makeFeatureWidget('${f.id}'));showBADAddedToast(BAD.getCurrentProject().name)">📌</button>` : '';
  return`<div class="tile has-add-bad" onclick="selectFeature('${f.id}')">
    ${badBtn}
    <span class="tile-sec-stripe" style="background:${col}"></span>
    <div class="tile-top">
      <span class="tile-name">${f.n}</span>
      ${badge}
    </div>
    <div class="tile-prob">${prob}</div>
    <div class="tile-sum">${sum}</div>
    <div style="display:flex;align-items:center;margin-top:6px">
      <span class="tile-arrow">View full page →</span>
      <span class="tile-pg">${f.p}</span>
    </div>
  </div>`;
}

function showTiles(filter){
  curFilter=filter;
  curFid=null;
  buildFeatureSidebar();
  const sections=filter==='all'
    ?[{k:'admin'},{k:'enduser'},{k:'developer'}]
    :[{k:filter}];
  let html=filterBarHTML(filter)+'<div class="tile-wrap">';
  sections.forEach(({k})=>{
    const feats=FEATURES.filter(f=>f.s===k&&(!srch||f.n.toLowerCase().includes(srch)));
    if(!feats.length)return;
    if(filter==='all') html+=`<div class="tile-section-hdr" style="color:${SEC_COLOR[k]}">${SEC_LABEL[k]}</div>`;
    html+=`<div class="tile-grid">${feats.map(tileHTML).join('')}</div>`;
  });
  html+='</div>';
  document.getElementById('detail').innerHTML=html;
  document.getElementById('detail').scrollTop=0;
}

const FEATURES=[
{id:'scim',s:'admin',p:'p.07',n:'SCIM Bridge',badge:'enterprise',prob:'Manual onboarding and offboarding is slow, error-prone, and a security liability. The average org takes 7+ days to fully deprovision an employee.',intro:'Connect 1Password to your Identity Provider and automate every step of the user lifecycle. New hire gets access the moment their IdP account is created. Departed employee is revoked within minutes.',blocks:[{t:'providers',title:'COMPATIBLE IDENTITY PROVIDERS',items:['Okta','Azure AD / Entra ID','Google Workspace','JumpCloud','OneLogin','Ping Identity']},{t:'checks',title:'WHAT GETS AUTOMATED',color:'blue',items:['New hire gets 1Password access the moment their IdP account is created','Group memberships sync from IdP — vault access follows your org chart','Employee departs: account suspended instantly, access revoked everywhere','GDPR-compliant auto-deletion of suspended users after configurable period']},{t:'two',l:{t:'plain',title:'THE OFFBOARDING PROBLEM',color:'red',text:'Average org takes 7+ days to fully deprovision an employee. In that window, every shared credential they ever knew is a live door. SCIM closes it the moment HR marks them departed.'},r:{t:'plain',title:'ZERO MANUAL INVITATIONS',color:'blue',text:'At 200-person scale, manual provisioning costs IT ~4 hours per week. SCIM eliminates that entirely — no spreadsheet, no ticket queue, no gaps.'}}],impact:'Eliminates the #1 source of unauthorized access after employee departure. Reduces IT provisioning time to zero.',quote:'"We had 200 employees and no dedicated IT team. SCIM made 1Password go from IT project to just works." — IT Manager',who:'IT Admin · CISO / Security Lead · HR / People Ops · IT Helpdesk',replaces:'Manual onboarding tickets, spreadsheet offboarding checklists, and the 7-day deprovision window.',adoption:'Zero IT provisioning tickets and same-day onboarding confirmed in the admin log within 30 days of go-live.'},
{id:'hosted-scim',s:'admin',p:'p.08',n:'Hosted SCIM',badge:'new',prob:'"We can\'t self-host the SCIM bridge — we don\'t have the infrastructure." IT teams without DevOps capacity were blocked from SCIM automation.',intro:'The full power of SCIM provisioning with zero infrastructure to manage. 1Password hosts and operates the SCIM bridge — no Docker, no cloud services, no networking, no maintenance.',blocks:[{t:'two',l:{t:'plain',title:'BEFORE HOSTED SCIM',color:'red',text:'Deploy and maintain a Docker container or cloud service. Configure networking. Handle uptime. IT teams without DevOps were blocked entirely.'},r:{t:'plain',title:'WITH HOSTED SCIM',color:'green',text:'Enable SCIM in your admin console. Connect your IdP. Done. No infrastructure, no containers, no maintenance. 1Password handles everything.'}}],impact:'Removes the single biggest blocker to SCIM adoption in mid-market.',who:'Mid-Market IT · SMBs on managed IT · Security-conscious enterprise',replaces:'The self-hosted SCIM bridge deployment that blocked mid-market from automated provisioning.',adoption:'SCIM active in admin console with IdP sync events in audit log — no Docker containers.'},
{id:'sso',s:'admin',p:'p.09',n:'SSO Integration',badge:'enterprise',prob:'Employees have one more password to remember — the most important one. A standalone 1Password master password is the #1 friction point behind failed adoption.',intro:'Let your team sign into 1Password through your existing Identity Provider. Biometric unlock still works offline. No single point of failure.',blocks:[{t:'providers',title:'SUPPORTED PROVIDERS',items:['Okta','Azure AD / Entra ID','Google Workspace','Duo SSO','OneLogin','Any OIDC Provider']},{t:'checks',title:'WHAT SSO GIVES YOU',color:'blue',items:['Authenticate via IdP — familiar flow, zero friction for employees already using Okta or Azure','Biometric offline unlock — Face ID, Touch ID, Windows Hello without network','SSO failure protection — 1Password stays accessible if IdP goes down','Excluded Groups policy for break-glass and IT admin accounts']},{t:'plain',title:'⚠️ SSO ALONE IS NOT ENOUGH',color:'amber',text:'SSO protects ~40–60% of apps in your org. 80% of employees use apps not managed by IT. 1Password covers everything SSO misses.'}],impact:'Reduces password recovery requests to IT. Eliminates the standalone 1Password master password as the adoption friction point.',who:'IT Admin · All Employees · CISO / Security Lead · Compliance Officer',replaces:'The standalone 1Password master password — the friction behind most failed adoption attempts.',adoption:'100% of non-excluded users authenticating via SSO with biometric unlock as offline method.'},
{id:'multi-tenancy',s:'admin',p:'p.10',n:'Multi-Tenancy',badge:'new',prob:'Managing multiple 1Password accounts for different business units is operationally fragmented. Admins context-switch between portals with no unified visibility.',intro:'Manage multiple 1Password accounts from a single administrative interface. One pane of glass for organizations with complex structures.',blocks:[{t:'subfeatures',items:[{icon:'🏢',title:'Enterprise with Subsidiaries',desc:'Parent company manages separate accounts per subsidiary — consolidated visibility, independent control.'},{icon:'🤝',title:'MSPs & Channel Partners',desc:'Manage all client accounts at scale without context-switching between separate admin portals.'},{icon:'🌍',title:'Regional Business Units',desc:'Different accounts per region with local admin control and executive-level visibility across all.'}]},{t:'two',l:{t:'plain',title:'WHAT YOU GET',color:'blue',text:'✓ Unified admin dashboard across all accounts\n✓ Cross-account reporting and audit log access\n✓ Centralized billing and seat management'},r:{t:'plain',title:'WHAT STAYS SEPARATE',color:'green',text:'✓ Vault contents — no cross-account data bleed\n✓ User bases — each account manages its own\n✓ Encryption — independent keys per account'}}],impact:'Eliminates operational overhead of managing separate accounts in isolation. Critical for MSPs and enterprise with complex org structures.',who:'Enterprise IT (multi-subsidiary) · MSPs / Channel Partners · Regional IT Leads',replaces:'Context-switching between separate admin portals and disconnected per-BU reporting.',adoption:'All business units visible in single admin dashboard with cross-account usage reports.'},
{id:'guest-accounts',s:'admin',p:'p.11',n:'Guest Accounts',badge:null,prob:'Contractors and external partners need credential access — but giving them full seats exposes too much, and sharing via email or Slack has no revoke control.',intro:'Scoped vault access for contractors and external partners. They get exactly what they need — nothing else. Combine with Item Expiry to make access self-destruct when the engagement ends.',blocks:[{t:'checks',title:'HOW GUEST ACCOUNTS WORK',color:'teal',items:['Guests access only explicitly shared vaults — no other vault visibility','Pair with Item Expiry — credentials auto-expire when the contract ends','Admin controls restrict what guests can do with the access they\'re given','Provisioning and deprovisioning without IT tickets']},{t:'two',l:{t:'plain',title:'USE CASES',color:'blue',text:'• Marketing agency managing social credentials\n• Legal counsel on matter-specific logins\n• IT contractor with system access during a project\n• Vendor accessing client portal for integration work'},r:{t:'plain',title:'WITHOUT GUEST ACCOUNTS',color:'red',text:'Sharing raw credentials via email or Slack. No audit trail. No revoke control. Access persists long after the engagement ends.'}}],impact:'Eliminates the credential-sharing liability with every contractor engagement.',who:'IT Admin · Legal · Marketing · Operations · Any team using contractors',replaces:'Slack DMs and email threads containing raw credentials shared with external parties.',adoption:'Guest account provisioning events in audit log; Item Expiry alerts fired before contractor access windows close.'},
{id:'auth-policies',s:'admin',p:'p.12',n:'Auth Policies',badge:null,prob:'Security policy enforcement requires writing code, configuring MDM profiles, or hoping employees comply voluntarily.',intro:'Set organization-wide authentication rules once. They enforce themselves — everywhere, for everyone, forever.',blocks:[{t:'subfeatures',items:[{icon:'🔐',title:'Two-Factor Authentication',tag:'RECOMMENDED FIRST',tagc:'rec',desc:'Enforce 2FA org-wide with authenticator app, hardware key, or Duo. The single highest-impact security action — 30 seconds to enable.'},{icon:'🏢',title:'Account Creation Control',tag:'SET DAY ONE',tagc:'s1',desc:'Prevent employees creating personal 1Password accounts with company email. Route them automatically to your business instance.'},{icon:'⚙️',title:'Excluded Groups from SSO',tag:'ADVANCED',tagc:'adv',desc:'Exclude specific groups from SSO requirement — for IT admins, break-glass accounts, service users.'},{icon:'🗑️',title:'Suspended User Auto-Deletion',tag:'COMPLIANCE',tagc:'comp',desc:'Automatically delete suspended users after a configurable period. GDPR compliance without manual intervention.'}]}],impact:'No code. No MDM. No manual compliance checks. Authentication policies enforce your security requirements automatically the moment you toggle them on.',who:'IT Administrator · CISO / Security Lead · Compliance Officer · HR / People Ops',replaces:'Manual 2FA enrollment campaigns, MDM configuration profiles, and quarterly access review spreadsheets.',adoption:'100% 2FA for active users; zero accounts created with company email outside the business instance.'},
{id:'app-policies',s:'admin',p:'p.13',n:'App & Access Policies',badge:null,prob:'Once credentials are in 1Password, there\'s no control over how employees use them — copy-paste to Slack, export to spreadsheets, share externally without governance.',intro:'Control every surface, permission, and sharing scope from a single admin console.',blocks:[{t:'checks',title:'POLICY CONTROLS',color:'blue',items:['Clipboard access restrictions — prevent copy-paste in high-risk contexts','Browser extension and desktop app behavior controls per group or org-wide','Vault creation restrictions — prevent employees creating unapproved vaults','External sharing restrictions — control who can share outside the org and for how long']},{t:'plain',title:'LEAST-PRIVILEGE BY DEFAULT',color:'teal',text:'Pair App & Access Policies with vault segmentation to enforce least-privilege at the policy layer — not just the vault layer. This is what SOC 2 Type II auditors actually want to see.'}],impact:'Closes the gap between "credentials are in 1Password" and "credentials are governed."',who:'IT Admin · CISO · Security Lead · Compliance Officer',replaces:'Manual policy enforcement and hoping employees follow credential governance guidelines voluntarily.',adoption:'Policy violations surfaced in admin console; external sharing logged in Events API.'},
{id:'firewall',s:'admin',p:'p.14',n:'Firewall & Sign-In Attempts',badge:null,prob:'Credential stuffing, geographic attacks, and unauthorized access attempts are invisible until damage is done.',intro:'Real-time visibility into every access attempt — with the ability to block threats directly from the report.',blocks:[{t:'checks',title:'SIGN-IN ATTEMPTS REPORT',color:'blue',items:['See every sign-in attempt — successful and failed — in real time','Detect unusual geographic access patterns the moment they happen','View device, IP, location, and timestamp for every attempt','One-click to add any attempt directly to Firewall Rules']},{t:'checks',title:'FIREWALL RULES',color:'red',items:['Restrict access by country or IP range with one toggle','Block an entire country from accessing your account instantly','Allowlist or blocklist specific IPs','Changes apply instantly, org-wide — no app update needed']}],impact:'Block credential stuffing, enforce geographic compliance, and detect unauthorized access — without waiting for a SIEM alert.',who:'CISO / Security Lead · Security Operations · IT Administrator · Compliance Officer',replaces:'Manual IP log reviews and the reactive discovery model where geographic attacks go undetected.',adoption:'Sign-ins from unexpected geographies blocked same day; firewall rules updated after every offboarding.'},
{id:'watchtower',s:'admin',p:'p.15',n:'Business Watchtower',badge:'superpower',prob:'You don\'t know which credentials in your org are weak, reused, or already compromised.',intro:'Your always-on security radar. Surfaces credential risk across every shared vault before it becomes an incident.',blocks:[{t:'subfeatures',items:[{icon:'🔴',title:'Compromised Passwords',desc:'Flags passwords in known breach databases — before an attacker uses them against you.'},{icon:'🟡',title:'Weak Passwords',desc:'Surfaces passwords failing strength thresholds. A remediation target, not just a warning.'},{icon:'🟠',title:'Reused Passwords',desc:'Identifies credentials used across multiple sites — one stolen password shouldn\'t unlock everything.'},{icon:'🔵',title:'Inactive 2FA',desc:'Shows employees with 2FA available but not enabled. One-click enforcement from the report.'},{icon:'🟢',title:'Expiring Items',desc:'Alerts 30, 14, and 7 days before expiry. Not after the outage.'},{icon:'⚪',title:'Items in Wrong Account',desc:'Flags work credentials in personal vaults — a compliance risk otherwise invisible.'}]},{t:'plain',title:'PRIVACY-FIRST DESIGN',color:'green',text:'Visible only to Owners and Security group members. Admins see issue counts — not the actual credentials. Architecture enforces this, not policy.'}],impact:'Customers who actively use Watchtower see measurable credential health improvements within 90 days.',quote:'"Watchtower cut our exposed credential count by more than half in the first quarter." — Security Lead, 900-person financial services firm',who:'CISO / Security Lead · IT Administrator · Security Operations · GRC / Compliance Officer',replaces:'The quarterly manual credential audit with always-on automated monitoring.',adoption:'Weekly scans running; issue count dropping 10%+ per quarter; Watchtower metrics in every QBR.'},
{id:'domain-breach',s:'admin',p:'p.16',n:'Domain Breach Report',badge:null,prob:'Company emails appear in breaches constantly. Most orgs find out when an attacker already used the credential.',intro:'Instant alerts when company email addresses appear in known breaches. Verify your domain once in 5 minutes — monitors continuously with zero ongoing management.',blocks:[{t:'checks',title:'HOW IT WORKS',color:'blue',items:['Verify your company email domain once — 5-minute setup','Continuous monitoring against known breach databases and new intelligence','Instant alert when any company email appears in a new breach','Report shows which accounts were exposed so you can force password resets']},{t:'plain',title:'SET THIS UP ON DAY ONE',color:'amber',text:'Domain Breach Report should be the second thing every new admin enables — right after 2FA enforcement. It takes 5 minutes and runs continuously with no ongoing management.'}],impact:'Collapses the detection window from months to hours.',who:'CISO · IT Admin · Security Lead · GRC / Compliance Officer',replaces:'Third-party breach monitoring services and manual HaveIBeenPwned checks.',adoption:'Domain verified and report active within first week; zero unresolved high-severity alerts older than 24 hours.'},
{id:'events-api',s:'admin',p:'p.17',n:'Events API → SIEM',badge:null,prob:'Credential access events are invisible to your security stack. Your SIEM has logs from everything except the tool that holds the most sensitive credentials.',intro:'Stream every 1Password event to your SIEM in real time. Every vault access, policy change, sign-in attempt — timestamped, immutable, 365-day retention.',blocks:[{t:'providers',title:'NATIVE SIEM INTEGRATIONS',items:['Splunk','Datadog','Elastic / Kibana','Microsoft Sentinel','Rapid7','Blumira']},{t:'checks',title:'WHAT GETS STREAMED',color:'blue',items:['Every vault access — who accessed what, when, from which device and IP','Every policy change with full attribution','Every sign-in attempt — successful, failed, geographic context','Every item creation, modification, and deletion','MFA events, sharing events, all admin actions']},{t:'plain',title:'COMPLIANCE BY FRAMEWORK',color:'teal',text:'PCI-DSS: credential access logs as continuous audit evidence\nSOC 2 Type II: continuous access monitoring and export\nSOX: segregation of duties enforcement via vault policies\nHIPAA: immutable audit trail for shared credential access\nGDPR / DORA: breach detection and credential hygiene reporting'}],impact:'Transforms 1Password from a security blind spot into a first-class data source for your security stack.',quote:'"Our auditors now get the PCI-DSS access evidence they need in minutes — what used to take weeks." — CISO, Regional Investment Bank',who:'CISO · Compliance Officer · Security Operations / SOC Analyst · IT Admin',replaces:'Manual access log exports and the quarterly scramble to assemble audit evidence.',adoption:'Events streaming to SIEM within 48 hours; first security dashboard built within 30 days.'},
{id:'usage-reports',s:'admin',p:'p.18',n:'Usage Reports',badge:null,prob:'Admins don\'t know which vaults are actively used, which teams need enablement, or which employees are on outdated app versions.',intro:'Vault activity tracking and compliance evidence — privacy-first. See what\'s happening across your vaults without seeing what\'s inside them.',blocks:[{t:'checks',title:'VAULT USAGE REPORTS',color:'blue',items:['Track every action in any vault: who accessed what, when, from which device','Ideal for high-privilege vaults: IT admin, finance, executive, infrastructure','Export for audit submission or compliance evidence','Pair with Events API to push usage data to your SIEM']},{t:'checks',title:'EMPLOYEE VAULT REPORTING',color:'teal',items:['High-level overview of security issue counts across all employee vaults','See issue types without seeing specific credentials — privacy-preserving by design','Identify which teams have the highest credential risk']}],impact:'Replaces ad hoc admin spot-checks with structured, exportable reporting.',who:'IT Administrator · CISO / Security Lead · GRC / Compliance Officer',replaces:'Ad hoc spot-checks and manual log exporting for compliance.',adoption:'Monthly vault activity exports in compliance packages; Device Report reviewed after every major release.'},
{id:'cred-mgmt',s:'enduser',p:'p.19',n:'Credential Management',badge:null,prob:'Most teams think of 1Password as a place to store passwords. That\'s 10% of what it can hold. Logins, server credentials, payment cards, documents, licenses — all living in spreadsheets and email threads.',intro:'1Password stores virtually every category of sensitive business data — not just passwords. 20 built-in item types, unlimited custom fields, custom sections, file attachments on any item.',blocks:[{t:'subfeatures',items:[{icon:'🔐',title:'Login',desc:'Username, password, URL, TOTP/2FA stored alongside the credential. Autofills across browser, desktop, and mobile.'},{icon:'📝',title:'Secure Note',desc:'Free-form encrypted text. Runbooks, procedures, emergency protocols, architecture decisions. Fully searchable, fully audited.'},{icon:'💳',title:'Credit Card',desc:'Card number, expiry, CVV, PIN, billing address. Autofills payment forms. For corporate cards shared across finance.'},{icon:'🏦',title:'Bank Account',desc:'Routing, account number, SWIFT/IBAN, PIN. For finance teams whose banking credentials currently live in a spreadsheet.'},{icon:'🖥️',title:'Server',desc:'Hostname/IP, port, username, password, private key, admin console URL. The full connection context — not just the password.'},{icon:'🗄️',title:'Database',desc:'Type, server, port, database name, username, password, SID. Full connection context in one item.'},{icon:'💻',title:'Software License',desc:'License key, purchase date, expiry. Pairs with Item Expiry to alert before renewals lapse.'},{icon:'🔏',title:'API Credential',desc:'Credential value, type, hostname, expiry. For API keys not yet managed by Secrets Automation.'},{icon:'🪪',title:'Identity / Passport / Driver License',desc:'Full identity data for staff that fill forms constantly — autofills registration workflows and contact pages.'},{icon:'📄',title:'Document',desc:'Any file, encrypted. PDFs, contracts, certificates — up to 1GB, access-controlled, every download logged.'}]},{t:'plain',title:'CUSTOM FIELDS — THE REAL POWER',color:'blue',text:'Every item type supports unlimited custom fields:\n• Concealed — hidden by default, masked in audit logs\n• TOTP — one-time password generator built into the field\n• Date — with Item Expiry integration\n• File Attachment — attach any file directly to any item\nCustom sections group related fields under named headers within a single item.'},{t:'plain',title:'THE DISCOVERY FRAMEWORK',color:'teal',text:'Ask IT: "Where are your server credentials stored right now?"\nAsk Finance: "Where do you keep corporate card and banking credentials?"\nAsk Legal: "Where are your executed contracts and matter management logins?"\nAsk HR: "Where are your HRIS credentials and sensitive onboarding docs?"\n\nEvery "spreadsheet" or "I just remember it" is a credential management conversation.'}],impact:'Breadth of item types turns every department conversation into a 1Password conversation. Each department that starts storing becomes a new renewal stakeholder.',who:'All End Users · IT Admin · Finance · Legal · HR · Operations · DevOps',replaces:'Spreadsheets with sensitive credentials, shared drives with confidential documents, sticky notes with payment card details.',adoption:'Item type diversity in Usage Reports — accounts using 5+ item categories have measurably higher renewal rates.'},
{id:'onboarding',s:'enduser',p:'p.20',n:'Onboarding Experience',badge:null,prob:'New users get an invite and don\'t know what to do next. Low activation equals low adoption — a tool nobody uses doesn\'t protect anyone.',intro:'From first invite to fully active in under 10 minutes. Extension-first flow. QR Code Sign-In. Every friction point designed out.',blocks:[{t:'subfeatures',items:[{icon:'🔌',title:'Extension-First Flow',desc:'Browser extension installed as the very first step — before anything else. MDM deployment pushes the extension before the invite goes out.'},{icon:'📱',title:'QR Code Sign-In',desc:'Scan once to add 1Password to any device. Replaces the 26-character Secret Key. New laptop onboarded in 10 seconds.'}]},{t:'plain',title:'MDM DEPLOYMENT TIP',color:'amber',text:'Push the browser extension and desktop app before sending invites. Employees open 1Password and it\'s already there — installed, trusted, and waiting. This single change doubles first-week activation rates.'}],impact:'Activation is the hardest step in adoption. Every friction point removed directly increases active-user percentage.',who:'IT Admin / IT Helpdesk · HR · End User / New Employee',replaces:'The 12-step setup email, 26-character Secret Key manual entry, and the "how do I add a new device?" helpdesk ticket.',adoption:'85%+ of invited users completing setup within 48 hours.'},
{id:'passkeys',s:'enduser',p:'p.21',n:'Passkeys',badge:null,prob:'Passwords can be stolen, phished, or guessed. 80%+ of breaches involve a credential element.',intro:'A cryptographic credential that entirely replaces the password — can\'t be stolen, phished, or forgotten. Private key lives in 1Password, never transmitted. Sign-in via biometrics.',blocks:[{t:'subfeatures',items:[{icon:'🔒',title:'No Password to Steal',desc:'Private key never leaves 1Password. A breach at the website leaks nothing useful.'},{icon:'🎣',title:'No Phishing Risk',desc:'Passkeys bound to the specific domain. A fake login page can\'t capture what\'s never entered.'},{icon:'📱',title:'No 2FA Required',desc:'Cryptographic signature provides stronger auth than password + OTP combined.'}]},{t:'checks',title:'1PASSWORD\'S PASSKEY ADVANTAGE',color:'blue',items:['Synced across all devices — unlike device-bound passkeys that strand you when you switch phones','Cross-platform: macOS, Windows, iOS, Android, any browser — no OS lock-in','Admin policy to enable or disable passkey storage org-wide']}],impact:'Eliminates the most common attack vector at the authentication layer.',who:'End User / Employee · CISO / Security Lead · IT Administrator',replaces:'The password + 2FA combination with a single phishing-resistant cryptographic credential.',adoption:'Passkey autofill appearing for passkey-capable sites; password usage declining on those domains over time.'},
{id:'secure-sharing',s:'enduser',p:'p.22',n:'Secure Item Sharing',badge:null,prob:'"Can you just Slack me the password?" is how credentials get compromised. Every raw credential shared over email or chat is a liability with no audit trail.',intro:'Share any credential via a time-limited, encrypted link. Recipients don\'t need a 1Password account. The link decrypts only in the browser.',blocks:[{t:'checks',title:'HOW IT WORKS',color:'teal',items:['Time-limited: expire links in 1 hour, 1 day, or 30 days','No 1Password account required for recipients','Revoke at any time before the link expires','Admin controls: restrict who can share externally and for how long']}],impact:'Eliminates the "just Slack it" pattern. Every shared link is logged, time-limited, and revocable.',who:'All Users · Marketing · Legal · Operations · IT Admin',replaces:'Slack DMs and email attachments containing raw passwords.',adoption:'Shared item links visible in Usage Reports; no "Slack me the password" patterns in audit logs.'},
{id:'travel-mode',s:'enduser',p:'p.22',n:'Travel Mode',badge:'unique',prob:'Crossing a border means your entire vault could be accessible if your device is searched. There\'s no secure option for executives traveling internationally with sensitive access.',intro:'Temporarily remove sensitive vaults from your device when crossing borders. They don\'t lock — they disappear. There is no locked vault to force open.',blocks:[{t:'checks',title:'HOW TRAVEL MODE WORKS',color:'blue',items:['Mark specific vaults as "safe for travel" — all others removed from device completely','Enable remotely by admins or by users before boarding','Appears as if those vaults simply don\'t exist — nothing to surrender at customs','Disable after clearing customs — vaults reappear immediately on all devices']},{t:'plain',title:'UNIQUE TO 1PASSWORD',color:'amber',text:'Bitwarden doesn\'t have Travel Mode. LastPass doesn\'t. Dashlane doesn\'t. Keeper doesn\'t.\nThis is a uniquely 1Password feature. In any competitive evaluation involving executives who travel internationally — this is the conversation stopper.'}],impact:'Converts a previously impossible security choice into a one-tap solution.',who:'Executives / C-Suite · Legal / Compliance · End User (international travel) · IT Admin',replaces:'The impossible border choice: travel with full vault exposed, or leave credentials behind.',adoption:'Travel Mode usage visible in admin console; executive champion created after first international trip.'},
{id:'location-items',s:'enduser',p:'p.23',n:'Location-Based Items',badge:null,prob:'Field staff manually search for credentials needed at specific physical locations every single time they arrive.',intro:'Add a physical location to any item. It surfaces automatically on mobile when nearby. Location data stays on-device — never stored or tracked by 1Password.',blocks:[{t:'checks',title:'PERFECT FOR',color:'teal',items:['Rotating office door codes that appear when field tech arrives on-site','Field staff accessing lockbox combinations at remote locations','Shared WiFi passwords at satellite offices that surface on arrival']},{t:'plain',title:'PRIVACY GUARANTEE',color:'green',text:'Location data never stored, shared, or tracked by 1Password. The geofencing logic runs entirely on the user\'s device. Architecturally enforced — not by policy.'}],impact:'One of the three smart features that drive the highest post-onboarding engagement. Users who discover this become internal champions.',who:'Field Operations / Facilities · End User / Power User · IT Admin',replaces:'Sticky notes with door codes and the "does anyone know the WiFi password?" Slack message.',adoption:'Location items accessed without search queries in Usage Reports.'},
{id:'item-expiry',s:'enduser',p:'p.23',n:'Item Expiry & Reminders',badge:null,prob:'SSL certificates expire, API keys rotate, vendor contracts end — nobody knows until the outage.',intro:'Set expiry dates on any item type. Watchtower alerts 30, 14, and 7 days before expiry. Not after the outage.',blocks:[{t:'checks',title:'USE IT FOR',color:'amber',items:['SSL certificates and API keys — most likely to cause outages when they expire silently','Access tokens and OAuth credentials with defined rotation windows','Vendor contracts and NDA expiry dates','Guest Account credentials — set expiry so contractor access self-destructs at engagement end']}],impact:'Converts the most preventable class of security incidents into a managed, proactive process.',who:'IT Admin · DevOps · Legal · Operations · All End Users managing time-sensitive credentials',replaces:'Calendar reminders for certificate expiry, the scramble when an API key stops working.',adoption:'Expiry alerts actioned before outages; zero expired-credential incidents in accounts where Item Expiry is actively used.'},
{id:'collections',s:'enduser',p:'p.23',n:'Collections',badge:null,prob:'Power users managing 5+ vaults spend more time finding credentials than using them.',intro:'Organize multiple vaults into a single custom filtered view. Collections are personal — each user creates their own, vault permissions unchanged.',blocks:[{t:'checks',title:'WHO NEEDS COLLECTIONS',color:'purple',items:['Power users managing 5+ vaults who need a single workspace','Team leads with project-specific views spanning multiple vaults','DevOps engineers with credentials spread across infrastructure, dev, and staging vaults']}],impact:'Power users who discover Collections become internal champions — they demo it to colleagues without prompting.',who:'Power Users · Team Leads · IT Admin / DevOps',replaces:'Vault-by-vault navigation and context-switching overhead.',adoption:'Collections created by power users managing 3+ vaults.'},
{id:'free-families',s:'enduser',p:'p.24',n:'Free 1Password Families',badge:'unique',prob:'The credential habits employees develop at home follow them to work. Password reuse between personal and professional accounts is a common breach entry point.',intro:'Every business seat includes a free Families account — employee and up to 5 family members. No extra cost. No other EPM does this.',blocks:[{t:'checks',title:'WHY THIS MATTERS TO THE BUSINESS',color:'teal',items:['Employees who use 1Password at home use it better at work — measurably higher adoption rates','Less password reuse spilling into work accounts','Highest-rated employee benefit in security-first organizations']},{t:'plain',title:'UNIQUE TO 1PASSWORD',color:'amber',text:'Bitwarden doesn\'t offer this. LastPass doesn\'t. Dashlane doesn\'t. Keeper doesn\'t.\n\nWhen 1Password becomes personal — when an employee\'s family uses it — it stops feeling like an IT mandate. That\'s when adoption becomes genuine.'},{t:'plain',title:'THE HR ANGLE',color:'green',text:'HR and People Ops own this story. Free Families is a recruiting differentiator, a retention signal, and a benefits-package item that costs the org nothing beyond the seat already purchased.'}],impact:'Creates personal investment that drives organic adoption and protects renewal.',who:'CHRO / HR Leadership · All Employees · IT Administrator · AE / CSM',replaces:'The personal-work credential hygiene gap.',adoption:'Families redemption above 50% within 90 days.'},
{id:'marketplace',s:'enduser',p:'p.24',n:'1Password Marketplace',badge:null,prob:'IT teams don\'t know what integrations exist, how to evaluate them, or how to activate them. The integration surface is underused because it\'s undiscovered.',intro:'Every supported integration in one place — no login required. Browse, evaluate, and activate integrations across the entire 1Password ecosystem.',blocks:[{t:'providers',title:'IDENTITY',items:['Okta','Azure AD / Entra ID','Google Workspace','JumpCloud','Ping Identity']},{t:'providers',title:'SIEM & SECURITY',items:['Splunk','Microsoft Sentinel','Rapid7','Blumira','Elastic','Datadog']},{t:'providers',title:'DEVELOPER',items:['GitHub','GitLab','CircleCI','Terraform','Pulumi','Kubernetes']},{t:'providers',title:'PRODUCTIVITY & IT',items:['Slack','JAMF','ServiceNow','Postman','VS Code']}],impact:'Closes the "I didn\'t know 1Password could do that" gap.',who:'IT Admin · CSM · AE · Security Buyer',replaces:'The manual process of searching for individual integrations.',adoption:'At least one Marketplace integration active per key department within 90 days.'},
{id:'cli',s:'developer',p:'p.26',n:'1Password CLI',badge:'dev-essential',prob:'Secrets are hardcoded in scripts, stored in .env files, or passed through insecure channels.',intro:'Access, inject, and manage secrets from 1Password natively in your terminal, scripts, and development workflows. Authenticate with biometrics.',blocks:[{t:'checks',title:'WHAT THE CLI UNLOCKS',color:'purple',items:['Read secrets in any script without hardcoding values — ever','Inject secrets as environment variables at runtime — .env files become optional','Authenticate with biometrics instead of re-entering credentials','Full CRUD operations on vaults, users, groups, and policies']},{t:'code',title:'INJECT A SECRET AT RUNTIME',code:'# Instead of:\nexport DB_URL="postgres://user:actualpass@host/db"\n\n# Use op run:\nop run -- node server.js\n# DB_URL injected from 1Password at runtime\n# Never written to disk. Never in .env.'}],impact:'Engineering teams that adopt CLI + Secret References report zero hardcoded credential incidents.',quote:'"We haven\'t had a hardcoded credential since we adopted the CLI." — Staff Engineer, 300-person SaaS company',who:'Software Engineer · DevOps / Platform Engineer · Security Engineer',replaces:'Hardcoded credentials in scripts, .env files committed to git, secrets passed via Slack.',adoption:'Zero hardcoded credentials in CI/CD logs; Secret References visible in code reviews.'},
{id:'secret-refs',s:'developer',p:'p.26',n:'Secret References',badge:null,prob:'Secrets live in the code, in the .env file, in the CI/CD variable store — visible to anyone with repo access.',intro:'Reference secrets by path instead of value. The secret is injected at runtime from 1Password — it never lives in your code, your repo, or your environment file.',blocks:[{t:'code',title:'SECRET REFERENCE SYNTAX',code:'# OLD WAY:\nDB_URL=postgres://user:actualpassword@prod/main\n\n# NEW WAY:\nDB_URL=op://prod/postgres/connection_string\nSTRIPE_KEY=op://prod/stripe/secret_key\n\n# 1Password injects the value at runtime.\n# Only the reference ever touches your codebase.'}],impact:'Every Secret Reference is a credential that can never be stolen from that codebase.',who:'Software Engineer · DevOps / Platform Engineer · Security Engineer',replaces:'Actual credential values in .env files and hardcoded strings in application code.',adoption:'Secret References visible in code reviews; zero plaintext credentials in any CI/CD log.'},
{id:'secrets-automation',s:'developer',p:'p.27',n:'Secrets Automation',badge:null,prob:'Secrets for different environments are scattered across .env files, CI/CD variables, and wikis. Rotation means updating 12 places — and hoping you got them all.',intro:'Centralize every secret for every CI/CD pipeline in one auditable location. Native integrations with every major CI/CD platform. Rotate once — every consumer gets the update.',blocks:[{t:'providers',title:'NATIVE CI/CD INTEGRATIONS',items:['GitHub Actions','CircleCI','GitLab CI','Jenkins','Terraform','Ansible','Kubernetes','AWS / Azure / GCP']},{t:'code',title:'GITHUB ACTIONS EXAMPLE',code:'- uses: 1password/load-secrets-action@v2\n  with:\n    export-env: true\n  env:\n    API_KEY: op://prod/api/key\n    DB_URL: op://prod/rds/conn_string'}],impact:'Replaces the .env file anti-pattern with a centralized, auditable secrets store.',who:'DevOps / Platform Engineer · Security Engineer · Software Engineer · CISO',replaces:'Environment-specific .env files, CI/CD variable stores with no audit trail.',adoption:'All pipeline secrets via Secret References; secret access events in audit log for every deployment.'},
{id:'environments',s:'developer',p:'p.27',n:'1Password Environments',badge:'new',prob:'Dev, staging, and prod secrets are different — but management is chaos. .env files on every developer\'s machine, no version control, no role-based access.',intro:'Manage secrets for every environment from 1Password — structured, versioned, role-based. No more .env files on individual developer machines.',blocks:[{t:'checks',title:'WHAT ENVIRONMENTS GIVES YOU',color:'purple',items:['Named environments (dev, staging, prod) as vault structures','Role-based access: devs get dev, senior engineers get staging, DevOps gets prod','Audit trail on every secret access across every environment','Rotate in 1Password — every consumer gets the update automatically']},{t:'plain',title:'Q3 2026 — COMMITTED',color:'amber',text:'1Password Environments is in the Q3 2026 roadmap with a Committed confidence indicator. Use in forward-looking conversations with engineering-heavy accounts.'}],impact:'Eliminates the leading cause of secret sprawl — the ad-hoc .env file in 40 different states on 40 developer laptops.',who:'DevOps / Platform Engineer · Security Engineer · Software Engineer',replaces:'Environment-specific .env files on individual developer machines.',adoption:'Zero .env files on developer machines after migration.'},
{id:'service-accounts',s:'developer',p:'p.28',n:'Service Accounts',badge:null,prob:'Automated workflows need access to secrets — but they can\'t use human credentials. Machine processes running under human accounts create an unauditable mess.',intro:'Create named machine identities that can access vault items — without a human user in the loop. Fully auditable. Permission-scoped per vault.',blocks:[{t:'checks',title:'WHAT SERVICE ACCOUNTS CAN DO',color:'purple',items:['Assign Read, Write, and Share permissions per vault — scoped to exactly what the workflow needs','Generate share links from automation workflows programmatically','Every service account action in audit log with full attribution and timestamp']}],impact:'Eliminates the "run CI under someone\'s personal credentials" anti-pattern.',who:'DevOps / Platform Engineer · Security Engineer · Software Engineer · CISO',replaces:'Machine processes running under human credentials in CI/CD pipelines.',adoption:'Every automated workflow using a named service account; zero CI pipelines running under human credentials.'},
{id:'ssh',s:'developer',p:'p.28',n:'SSH Key Management',badge:null,prob:'SSH keys are generated, stored locally, and forgotten — until they\'re compromised.',intro:'Generate, store, and use SSH keys natively in 1Password. Works with the SSH agent natively in terminal. Watchtower scans for unencrypted keys on disk.',blocks:[{t:'checks',title:'SSH KEY SECURITY',color:'purple',items:['Detects unencrypted SSH keys on local disk across your org','Flags keys without passphrases — a silent security vulnerability','Works with the SSH agent — native terminal use, zero workflow change']},{t:'code',title:'SSH AGENT SETUP',code:'# ~/.ssh/config:\nHost *\n  IdentityAgent "~/Library/Group Containers/\n  2BUA8C4S2C.com.1password/t/agent.sock"\n\n# All ssh uses 1Password-stored keys:\nssh user@prod-server\n# Touch ID prompt — key never on disk in plaintext'}],impact:'Brings SSH key management under the same governance model as everything else in 1Password.',who:'DevOps / Platform Engineer · Security Engineer · Software Engineer',replaces:'Unmanaged ~/.ssh folders, unencrypted key files, shared private keys.',adoption:'Zero unencrypted SSH keys in Watchtower; all prod SSH access via 1Password-stored keys.'},
{id:'postman',s:'developer',p:'p.29',n:'Postman Integration',badge:null,prob:'API tokens end up hardcoded in Postman collection files that get shared and committed — exposing live credentials every time the file moves.',intro:'Access API tokens stored in 1Password directly in Postman workspaces. Test endpoints without exposing credentials in collection files.',blocks:[{t:'checks',title:'WHAT THE INTEGRATION DOES',color:'purple',items:['Secrets sync across every device where Postman is installed — from 1Password, not local storage','End-to-end encrypted — Postman never sees your secrets','Rotated credentials in 1Password automatically flow to every Postman workspace']}],impact:'Closes the Postman credential leak pattern — one of the most common sources of API key exposure.',who:'Developers · API Teams · QA Engineers',replaces:'API tokens hardcoded in Postman collection files.',adoption:'No credentials in Postman collection files — all API tokens referencing 1Password.'},
{id:'pulumi',s:'developer',p:'p.29',n:'Pulumi ESC Integration',badge:null,prob:'Infrastructure-as-code secrets end up in Terraform state files and Pulumi stack configs — written to disk and version-controlled.',intro:'Manage infrastructure secrets with 1Password as the central store. Secrets injected at runtime — never written to Pulumi state files.',blocks:[{t:'checks',title:'WHAT PULUMI ESC + 1PASSWORD GIVES YOU',color:'purple',items:['Integrates with existing Pulumi stacks — no migration required','Secrets injected at runtime — never in state files or stack configs','Extends 1Password to the full IaC workflow']}],impact:'Brings zero-secrets-in-code into the infrastructure-as-code layer.',who:'DevOps / Infrastructure Engineer · Platform Engineer',replaces:'API credentials stored in Terraform state files and Pulumi stack configs.',adoption:'Zero credentials in IaC state files; all infrastructure secrets in 1Password audit log.'},
{id:'sdks',s:'developer',p:'p.29',n:'1Password SDKs',badge:null,prob:'Custom applications and internal tools need secrets access but can\'t use the CLI or native integrations.',intro:'Build 1Password into your own apps, internal tools, and automation workflows. Read and write vault items programmatically.',blocks:[{t:'providers',title:'SUPPORTED LANGUAGES',items:['Node.js / TypeScript','Python','Go','Ruby','Java']},{t:'checks',title:'WHAT YOU CAN BUILD',color:'purple',items:['Custom secret distribution workflows at runtime','Internal tools that authenticate against 1Password-stored credentials','Automation scripts with full CRUD on vault items','Compliance tools that query vault state for audit reporting']}],impact:'Extends 1Password\'s security model into any custom application or internal tool.',who:'Software Engineer · Platform / Internal Tools Engineer · Security Engineer',replaces:'Custom-built secret management code and bespoke retrieval scripts.',adoption:'At least one internal tool pulling secrets via SDK within 60 days.'},
{id:'cicd',s:'developer',p:'p.29',n:'GitHub / GitLab / CircleCI',badge:null,prob:'CI/CD pipelines expose secrets in logs, environment variable stores, and pipeline configs.',intro:'Native integrations across the full CI/CD ecosystem. Credentials appear only in the process that needs them — never in logs or configs.',blocks:[{t:'providers',title:'SUPPORTED PLATFORMS',items:['GitHub Actions','GitLab CI','CircleCI','Jenkins','Drone CI','Buildkite']},{t:'code',title:'GITHUB ACTIONS EXAMPLE',code:'steps:\n  - uses: 1password/load-secrets-action@v2\n    with:\n      export-env: true\n    env:\n      AWS_KEY: op://prod/aws/access_key\n  - run: npm run deploy\n  # Not stored in GitHub Secrets\n  # Not visible in workflow run logs'}],impact:'Eliminates the CI/CD pipeline as a credential leak vector.',who:'DevOps / Platform Engineer · Software Engineer · Security Engineer',replaces:'GitHub Secrets, GitLab CI variables, CircleCI environment variables stored outside 1Password.',adoption:'All pipeline secrets via 1Password; zero credentials in CI/CD environment variable stores.'},
{id:'terraform',s:'developer',p:'p.29',n:'Terraform / Ansible / K8s',badge:null,prob:'Infrastructure credentials end up in Terraform plans, Ansible playbooks, and Kubernetes secrets — in plaintext, in state files, in version control.',intro:'Inject credentials into Terraform plans, Ansible playbooks, and Kubernetes workloads at runtime — never hardcoded, never in state files.',blocks:[{t:'providers',title:'SUPPORTED IaC & ORCHESTRATION',items:['Terraform','Ansible','Kubernetes','Docker Compose','AWS CloudFormation','Pulumi']},{t:'checks',title:'WHAT THIS COVERS',color:'purple',items:['Terraform: read secrets at plan time without storing in state files','Ansible: inject vault credentials via 1Password CLI','Kubernetes: sync 1Password secrets as K8s Secret objects with auto-rotation','Docker: inject credentials at container runtime']}],impact:'Extends zero-secrets-in-code into the infrastructure layer.',who:'Infrastructure Engineer · DevOps · Platform Engineer · Security Engineer',replaces:'Credentials in Terraform state, Ansible vault files, K8s secret manifests in version control.',adoption:'Zero credentials in any IaC state file or manifest committed to version control.'},
{id:'vscode',s:'developer',p:'p.29',n:'VS Code & Developer Desktop',badge:null,prob:'Developers context-switch between 1Password and their IDE constantly. Every switch is a friction point that creates workarounds.',intro:'1Password integrates natively into VS Code and the developer desktop — autofill across every tool, cloud console, and platform. Mac, Windows, Linux, iOS, Android, all browsers.',blocks:[{t:'checks',title:'THE DEVELOPER SURFACE',color:'purple',items:['VS Code: access 1Password-stored secrets without leaving the editor','Browser extension: autofill into cloud consoles (AWS, GCP, Azure) and internal tools','Desktop app: biometric unlock, CLI integration, SSH agent','Cross-platform: macOS, Windows, Linux — one consistent experience everywhere']},{t:'plain',title:'THE AUTOFILL ADVANTAGE',color:'blue',text:'Developer experience determines developer adoption. Developers who find 1Password faster than their workarounds become internal champions. Those who don\'t become the loudest voices against renewal.'}],impact:'Developer experience is adoption. Seamless VS Code and desktop integration converts 1Password from "IT mandate" to "tool I actually prefer."',who:'All Developers · All End Users · IT Admin',replaces:'The context switch between 1Password and the tool needing credentials.',adoption:'Autofill events in Usage Reports matching active developer tooling.'},
