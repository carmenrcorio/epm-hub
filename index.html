<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>1Password EPM Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#07111F;color:#A8BDD4;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#020C17;border-bottom:1px solid #1A3050;padding:0 20px;display:flex;align-items:stretch;gap:0;flex-shrink:0;height:44px}
.logo{font-size:13px;font-weight:800;color:#F0F6FF;letter-spacing:.04em;display:flex;align-items:center;padding-right:20px;border-right:1px solid #1A3050;margin-right:4px}
.logo span{color:#1769FF}
.tab{padding:0 16px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#3A5878;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab:hover{color:#7A9AB8}
.tab.active{color:#F0F6FF;border-bottom-color:#1769FF}
.tab.soon{color:#2A4060;cursor:default;pointer-events:none}
.tab .t-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;background:#1A305088;color:#2A4060;border:1px solid #1A3050;letter-spacing:.06em}
.topbar-right{margin-left:auto;display:flex;align-items:center}
.sw{position:relative}
.sw input{padding:5px 10px 5px 28px;background:#0D1E33;border:1px solid #1A3050;border-radius:5px;color:#F0F6FF;font-size:11px;outline:none;width:200px;transition:width .2s}
.sw input:focus{border-color:#1769FF55;width:240px}
.sw input::placeholder{color:#2A4060}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;color:#2A4060}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:228px;min-width:228px;max-width:228px;flex-shrink:0;background:#020C17;border-right:1px solid #1A3050;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;position:relative}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:#1A3050}
.sec-hdr{padding:10px 14px 4px;font-size:9px;font-weight:800;letter-spacing:.14em;flex-shrink:0}
.sec-hdr.admin{color:#4D8EFF}.sec-hdr.enduser{color:#00C4BE}.sec-hdr.developer{color:#A78BFA}.sec-hdr.industry{color:#F59E0B}
.ni{padding:7px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;display:flex;align-items:center;gap:7px}
.ni:hover{background:#0D1E3355}
.ni.active{background:#0D1E33}
.ni.active.na{border-left-color:#1769FF}.ni.active.ne{border-left-color:#00C4BE}.ni.active.nd{border-left-color:#A78BFA}.ni.active.ni2{border-left-color:#F59E0B}
.nn{font-size:12px;color:#5A7A9A;flex:1;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.ni.active .nn,.ni:hover .nn{color:#C8D8E8}
.ni.active .nn{color:#F0F6FF;font-weight:600}
.npg{font-size:10px;color:#2A4060;font-family:monospace}
.ntag{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.04em}
.ntag.unique{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.ntag.new{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.detail{flex:1;overflow-y:auto}
.detail::-webkit-scrollbar{width:4px}.detail::-webkit-scrollbar-thumb{background:#1A3050;border-radius:2px}
/* Feature page */
.fp{max-width:860px;padding:24px 32px 56px}
.fp-ref{font-size:10px;color:#2A4060;font-family:monospace;margin-bottom:14px}
.prob{background:#EF444410;border:1px solid #EF444430;border-radius:6px;padding:12px 16px;margin-bottom:18px}
.prob-l{font-size:9px;font-weight:800;letter-spacing:.14em;color:#EF4444;margin-bottom:4px}
.prob-t{font-size:13px;color:#FCA5A5;line-height:1.65}
.fp-tr{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.fp-title{font-size:24px;font-weight:800;color:#F0F6FF;line-height:1.2}
.fp-badges{display:flex;gap:5px;flex-wrap:wrap;padding-top:4px;flex-shrink:0}
.fb{font-size:10px;font-weight:800;padding:3px 9px;border-radius:4px;letter-spacing:.05em}
.fb.unique{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B44}
.fb.new{background:#10B98118;color:#10B981;border:1px solid #10B98144}
.fb.enterprise{background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF44}
.fb.dev-essential{background:#7C3AED18;color:#A78BFA;border:1px solid #7C3AED44}
.fb.superpower{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B44}
.fp-intro{font-size:14px;color:#C8D8E8;line-height:1.8;margin-bottom:20px}
.blk{background:#0D1E33;border:1px solid #1A3050;border-radius:8px;padding:15px 17px;margin-bottom:11px}
.blk.bl{border-left:3px solid #1769FF}.blk.bt{border-left:3px solid #00C4BE}
.blk.ba{border-left:3px solid #F59E0B}.blk.br{border-left:3px solid #EF4444}
.blk.bg{border-left:3px solid #10B981}.blk.bp{border-left:3px solid #A78BFA}
.blk-t{font-size:9px;font-weight:800;letter-spacing:.12em;margin-bottom:9px}
.blk-t.blue{color:#4D8EFF}.blk-t.teal{color:#00C4BE}.blk-t.amber{color:#F59E0B}
.blk-t.red{color:#EF4444}.blk-t.green{color:#10B981}.blk-t.purple{color:#A78BFA}.blk-t.muted{color:#3A5878}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.chk{display:flex;gap:7px;align-items:flex-start;font-size:12px;color:#A8BDD4;line-height:1.55;margin-bottom:5px}
.chk::before{content:'✓';color:#10B981;font-weight:800;font-size:11px;flex-shrink:0;margin-top:2px}
.pt{font-size:12px;color:#7A9AB8;line-height:1.65;white-space:pre-line}
.sf{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #132847}
.sf:last-child{margin:0;padding:0;border:none}
.sf-title{font-size:13px;font-weight:700;color:#F0F6FF;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.sf-desc{font-size:12px;color:#7A9AB8;line-height:1.6}
.stag{font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.05em}
.stag.rec{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.stag.s1{background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF33}
.stag.adv{background:#7C3AED18;color:#A78BFA;border:1px solid #7C3AED33}
.stag.comp{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.code{background:#020810;border:1px solid #132847;border-radius:6px;padding:12px 14px;font-family:monospace;font-size:11px;color:#4D8EFF;line-height:1.75;margin-top:7px;overflow-x:auto}
.provs{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.prov{padding:3px 9px;background:#132847;border:1px solid #1A3050;border-radius:4px;font-size:11px;color:#A8BDD4}
.impact-bar{background:linear-gradient(135deg,#1769FF12,#00C4BE08);border:1px solid #1769FF28;border-radius:8px;padding:15px 17px;margin-bottom:12px}
.impact-l{font-size:9px;font-weight:800;letter-spacing:.14em;color:#4D8EFF;margin-bottom:7px}
.impact-t{font-size:13px;color:#C8D8E8;line-height:1.7}
.impact-q{font-style:italic;color:#5A7A9A;font-size:12px;margin-top:9px;padding-top:9px;border-top:1px solid #1A3050;line-height:1.6}
.meta3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
.mb{background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:12px 13px}
.mb-l{font-size:9px;font-weight:800;letter-spacing:.12em;color:#2A4878;margin-bottom:6px}
.mb-t{font-size:12px;color:#7A9AB8;line-height:1.6}
/* Cross-ref */
.xref{border-top:1px solid #1A3050;padding-top:18px;margin-top:4px}
.xref-t{font-size:9px;font-weight:800;letter-spacing:.14em;color:#2A4878;margin-bottom:10px}
.xref-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.xc{background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:11px 13px;cursor:pointer;transition:border-color .12s}
.xc:hover{border-color:#2A4878}
.xc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.xc-name{font-size:12px;font-weight:700;color:#F0F6FF;flex:1}
.xc-type{font-size:9px;font-weight:800;padding:1px 6px;border-radius:3px;letter-spacing:.06em;background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.xc-desc{font-size:11px;color:#5A7A9A;line-height:1.55}
.xc-link{font-size:10px;color:#1769FF;margin-top:4px;font-weight:600}
/* Industry page */
.ind-hero{padding:20px 28px 16px;border-bottom:1px solid #1A3050}
.ind-eye{font-size:9px;font-weight:800;letter-spacing:.16em;margin-bottom:7px}
.ind-title{font-size:24px;font-weight:800;color:#F0F6FF;margin-bottom:7px}
.ind-hook{font-size:13px;line-height:1.75;font-style:italic;color:#7A9AB8}
.ind-body{padding:20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ind-full{padding:0 28px 32px;display:flex;flex-direction:column;gap:14px}
.pain-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.px{color:#EF4444;font-weight:800;font-size:11px;flex-shrink:0;margin-top:2px}
.pt2{font-size:12px;color:#7A9AB8;line-height:1.55}
.sol-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sc{background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:11px 12px;cursor:pointer;transition:border-color .12s}
.sc:hover{border-color:#2A4878}
.sol-tag{display:inline-block;font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.05em;margin-bottom:6px}
.sol-name{font-size:12px;font-weight:700;color:#F0F6FF;margin-bottom:4px}
.sol-desc{font-size:11px;color:#5A7A9A;line-height:1.55}
.sol-link{font-size:10px;color:#1769FF;margin-top:4px;font-weight:600}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pc{background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:11px 12px}
.pc-r{font-size:11px;font-weight:700;color:#F0F6FF;margin-bottom:3px}
.pc-q{font-size:11px;color:#5A7A9A;line-height:1.55;font-style:italic}
.comp-strip{display:flex;flex-wrap:wrap;gap:5px}
.cb{font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;background:#1769FF14;color:#4D8EFF;border:1px solid #1769FF33}
.stat-row{display:flex;gap:9px}
.sb{flex:1;background:#0D1E33;border:1px solid #1A3050;border-radius:7px;padding:11px 13px;text-align:center}
.sn{font-size:18px;font-weight:800}
.sl{font-size:10px;color:#5A7A9A;margin-top:2px;line-height:1.4}
.breach-blk{background:#EF444408;border:1px solid #EF444430;border-radius:8px;padding:16px 18px}
.breach-hdr{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap}
.breach-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;color:#EF4444;background:#EF444418;padding:2px 8px;border-radius:3px;border:1px solid #EF444433}
.breach-name{font-size:14px;font-weight:700;color:#FCA5A5}
.breach-date{font-size:11px;color:#5A7A9A;margin-left:auto}
.breach-body{font-size:12px;color:#7A9AB8;line-height:1.7;margin-bottom:10px}
.breach-src{font-size:10px;color:#2A4060;margin-bottom:12px;font-style:italic}
.prev-hdr{font-size:9px;font-weight:800;letter-spacing:.1em;color:#10B981;background:#10B98110;padding:2px 8px;border-radius:3px;border:1px solid #10B98133;display:inline-block;margin-bottom:7px}
.prev-body{font-size:12px;color:#A8BDD4;line-height:1.7}
.prev-feats{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.pf{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF33;cursor:pointer}
.pf:hover{background:#1769FF33}
.empty{display:flex;align-items:center;justify-content:center;height:200px;color:#2A4060;font-size:13px}
/* ── FILTER BAR ─────────────────────────────── */
.filter-bar{display:flex;align-items:center;gap:8px;padding:12px 24px 0;flex-shrink:0;flex-wrap:wrap}
.flt{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #1A3050;color:#5A7A9A;background:transparent;transition:all .12s;letter-spacing:.03em}
.flt:hover{color:#C8D8E8;border-color:#2A4878}
.flt.active-all{background:#1769FF18;color:#4D8EFF;border-color:#1769FF55}
.flt.active-admin{background:#1769FF18;color:#4D8EFF;border-color:#1769FF55}
.flt.active-enduser{background:#00C4BE18;color:#00C4BE;border-color:#00C4BE55}
.flt.active-developer{background:#7C3AED18;color:#A78BFA;border-color:#7C3AED55}
.flt-divider{width:1px;height:18px;background:#1A3050;margin:0 2px}
.flt-count{font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;margin-left:4px;background:#1A305066}
/* ── TILE GRID ───────────────────────────────── */
.tile-wrap{padding:16px 24px 48px}
.tile-section-hdr{font-size:9px;font-weight:800;letter-spacing:.16em;margin:18px 0 10px;display:flex;align-items:center;gap:10px}
.tile-section-hdr::after{content:'';flex:1;height:1px;background:#1A3050}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:11px;margin-bottom:4px}
.tile{background:#0D1E33;border:1px solid #1A3050;border-radius:9px;padding:14px 15px;cursor:pointer;transition:all .14s;display:flex;flex-direction:column;gap:6px;position:relative}
.tile:hover{border-color:#2A4878;background:#0F2240;transform:translateY(-1px)}
.tile-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.tile-name{font-size:13px;font-weight:700;color:#F0F6FF;line-height:1.3;flex:1}
.tile-badge{font-size:8px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.tile-badge.unique{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.tile-badge.new{background:#10B98118;color:#10B981;border:1px solid #10B98133}
.tile-badge.enterprise{background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF33}
.tile-badge.dev-essential{background:#7C3AED18;color:#A78BFA;border:1px solid #7C3AED33}
.tile-badge.superpower{background:#F59E0B18;color:#F59E0B;border:1px solid #F59E0B33}
.tile-prob{font-size:11px;color:#EF4444;line-height:1.5;font-style:italic}
.tile-sum{font-size:11px;color:#5A7A9A;line-height:1.55}
.tile-arrow{font-size:11px;color:#1769FF;margin-top:auto;font-weight:700}
.tile-sec-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:9px 0 0 9px}
.tile-pg{font-size:9px;color:#2A4060;font-family:monospace;margin-left:auto}
/* ── CUSTOMER BUILDER ────────────────────────────────────────── */
.cb-layout{display:flex;height:100%;overflow:hidden}
.cb-form{width:360px;flex-shrink:0;background:#020C17;border-right:1px solid #1A3050;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px}
.cb-form::-webkit-scrollbar{width:3px}.cb-form::-webkit-scrollbar-thumb{background:#1A3050}
.cb-output{flex:1;overflow-y:auto}
.cb-output::-webkit-scrollbar{width:4px}.cb-output::-webkit-scrollbar-thumb{background:#1A3050;border-radius:2px}
.cb-head{font-size:14px;font-weight:800;color:#F0F6FF;margin-bottom:2px}
.cb-sub{font-size:11px;color:#2A4060;line-height:1.5}
.cb-section{display:flex;flex-direction:column;gap:6px}
.cb-label{font-size:9px;font-weight:800;letter-spacing:.13em;color:#2A4878}
.cb-input{background:#0D1E33;border:1px solid #1A3050;border-radius:5px;color:#EAF3FF!important;font-size:13px;padding:7px 10px;outline:none;width:100%;transition:border-color .12s;font-family:inherit}
.cb-input::placeholder{color:#3A6080;font-weight:400}
.cb-input:not(select):not(:placeholder-shown){color:#EAF3FF!important;font-weight:500}
.cb-input:focus{border-color:#1769FF55}
.cb-input::placeholder{color:#2A4060}
select.cb-input option{background:#0D1E33}
textarea.cb-input{resize:vertical;min-height:70px;line-height:1.6}
.cb-checks{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.cb-check{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:5px;cursor:pointer;border:1px solid #1A3050;background:#0D1E33;transition:all .12s}
.cb-check:hover{border-color:#2A4878}
.cb-check.checked{border-color:#1769FF55;background:#1769FF10}
.cb-check input{display:none}
.cb-check-lbl{font-size:11px;color:#7A9AB8;line-height:1.3}
.cb-check.checked .cb-check-lbl{color:#C8D8E8}
.cb-check-ico{font-size:13px;flex-shrink:0}
.cb-generate{padding:11px;background:#1769FF;border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:.03em;transition:all .12s;width:100%;margin-top:4px}
.cb-generate:hover{background:#1255CC}
.cb-generate:disabled{background:#1A3050;color:#3A5878;cursor:not-allowed}
.cb-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;gap:14px}
.cb-spin-ring{width:36px;height:36px;border:3px solid #1A3050;border-top-color:#1769FF;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cb-spin-msg{font-size:12px;color:#3A5878}
.cb-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;padding:40px}
.cb-empty-ico{font-size:48px;opacity:.2}
.cb-empty-t{font-size:14px;font-weight:700;color:#2A4060}
.cb-empty-s{font-size:12px;color:#1A3050;text-align:center;max-width:280px;line-height:1.6}
.cb-out-wrap{padding:22px 28px 56px;display:flex;flex-direction:column;gap:14px}
.cb-headline{background:linear-gradient(135deg,#1769FF18,#00C4BE08);border:1px solid #1769FF33;border-radius:10px;padding:18px 20px}
.cb-hl-co{font-size:11px;font-weight:800;letter-spacing:.12em;color:#4D8EFF;margin-bottom:6px}
.cb-hl-txt{font-size:20px;font-weight:800;color:#F0F6FF;line-height:1.3;margin-bottom:8px}
.cb-hl-sum{font-size:13px;color:#A8BDD4;line-height:1.75}
.cb-card{background:#0D1E33;border:1px solid #1A3050;border-radius:8px;overflow:hidden}
.cb-card-hdr{padding:11px 15px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #1A3050}
.cb-card-ico{font-size:14px}
.cb-card-title{font-size:10px;font-weight:800;letter-spacing:.13em;color:#3A5878}
.cb-card-body{padding:13px 15px;display:flex;flex-direction:column;gap:9px}
.cb-dept-card{background:#07111F;border:1px solid #1A3050;border-radius:7px;padding:13px 14px}
.cb-dept-name{font-size:12px;font-weight:700;color:#F0F6FF;margin-bottom:4px;display:flex;align-items:center;gap:7px}
.cb-dept-frame{font-size:12px;color:#7A9AB8;line-height:1.65;margin-bottom:8px}
.cb-dept-feats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.cb-dfeat{font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;background:#1769FF18;color:#4D8EFF;border:1px solid #1769FF33;cursor:pointer}
.cb-dfeat:hover{background:#1769FF33}
.cb-dept-q{font-size:11px;color:#5A7A9A;font-style:italic;line-height:1.55;border-top:1px solid #1A3050;padding-top:7px}
.cb-row{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:#A8BDD4;line-height:1.6}
.cb-row::before{content:'→';color:#1769FF;font-size:11px;flex-shrink:0;margin-top:2px}
.cb-feat-row{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:1px solid #132847}
.cb-feat-row:last-child{border:none;padding-bottom:0}
.cb-feat-name{font-size:12px;font-weight:700;color:#F0F6FF;min-width:150px;flex-shrink:0}
.cb-feat-frame{font-size:12px;color:#7A9AB8;line-height:1.6;flex:1}

/* ══ TECH STACK SECTION ══════════════════════════════════════ */
.ts-wrap{padding:0 28px 28px}
.ts-hdr{font-size:9px;font-weight:800;letter-spacing:.14em;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.ts-hdr::after{content:'';flex:1;height:1px;background:var(--border)}
.ts-gap-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ts-gap-stat{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--t1)}
.ts-gap-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ts-gap-dot.red{background:#EF4444}
.ts-gap-dot.amber{background:#F59E0B}
.ts-gap-dot.green{background:#10B981}
.ts-gap-label{font-size:11px;color:var(--t3);font-weight:400;margin-left:2px}
.ts-gap-text{font-size:12px;color:var(--t2);flex:1;min-width:200px;line-height:1.55}
.ts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px}
.ts-tool{border-radius:7px;padding:10px 12px;border:1px solid;position:relative}
.ts-tool.sso-n{background:#EF444408;border-color:#EF444430}
.ts-tool.sso-p{background:#F59E0B08;border-color:#F59E0B30}
.ts-tool.sso-y{background:#10B98108;border-color:#10B98130}
.ts-tool-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.ts-tool-name{font-size:12px;font-weight:700;color:var(--t1);flex:1}
.ts-sso-badge{font-size:9px;font-weight:800;padding:1px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.ts-tool.sso-n .ts-sso-badge{background:#EF444420;color:#EF4444;border:1px solid #EF444440}
.ts-tool.sso-p .ts-sso-badge{background:#F59E0B20;color:#F59E0B;border:1px solid #F59E0B40}
.ts-tool.sso-y .ts-sso-badge{background:#10B98120;color:#10B981;border:1px solid #10B98140}
.ts-tool-cat{font-size:10px;color:var(--t4);margin-bottom:5px}
.ts-tool-note{font-size:11px;color:var(--t3);line-height:1.5}
.ts-coverage{font-size:10px;color:#3A9EFF;margin-top:4px;font-weight:600}
.ts-feature-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.ts-feat-tag{font-size:10px;padding:2px 7px;border-radius:3px;background:#3A9EFF14;color:#70B8FF;border:1px solid #3A9EFF25;font-weight:600}


/* ── CUSTOM INDUSTRY / DEPT ─────────────────────────────────── */
.custom-badge{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;background:#A78BFA18;color:#A78BFA;border:1px solid #A78BFA33;letter-spacing:.05em;margin-left:5px}
.cb-add-custom-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px dashed var(--border2);background:transparent;color:var(--t4);transition:all .12s;white-space:nowrap}
.cb-add-custom-btn:hover{border-color:#A78BFA55;color:#A78BFA;background:#A78BFA08}
.custom-modal-bg{position:fixed;inset:0;background:#00000080;z-index:2000;display:flex;align-items:center;justify-content:center}
.custom-modal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:22px 24px;width:420px;max-width:95vw;box-shadow:0 20px 60px #00000090;max-height:85vh;overflow-y:auto}
.custom-modal::-webkit-scrollbar{width:3px}.custom-modal::-webkit-scrollbar-thumb{background:var(--border)}
.custom-modal-title{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:4px}
.custom-modal-sub{font-size:11px;color:var(--t3);margin-bottom:18px;line-height:1.5}
.custom-modal-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px}
.custom-modal-emoji{width:52px;flex-shrink:0;text-align:center;font-size:22px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px;cursor:pointer;transition:border-color .12s}
.custom-modal-emoji:hover{border-color:var(--border2)}
.custom-modal-label{font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--t4);margin-bottom:5px}
.custom-modal-input{background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--t1);font-size:12px;padding:8px 10px;outline:none;width:100%;font-family:inherit;transition:border-color .12s}
.custom-modal-input:focus{border-color:#A78BFA55}
.custom-modal-input::placeholder{color:var(--t4)}
.custom-modal-textarea{resize:vertical;min-height:60px;line-height:1.6}
.custom-modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.custom-modal-cancel{padding:7px 16px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:12px;font-weight:600;cursor:pointer}
.custom-modal-save{padding:7px 18px;border-radius:5px;border:none;background:#A78BFA;color:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:background .12s}

.custom-items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.custom-item-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px}

.custom-item-name{font-size:12px;font-weight:600;color:var(--t1);flex:1}
.custom-item-del{background:none;border:none;color:var(--t4);cursor:pointer;font-size:14px;padding:0 2px;transition:color .12s}
.custom-item-del:hover{color:#EF4444}

.cb-profile-select{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--t2);font-size:11px;padding:5px 9px;outline:none;flex:1;min-width:140px;cursor:pointer}

.cb-ind-pill button:hover{opacity:1}

.cb-preset-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}

.gov-fw-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.gov-fw-badge{font-size:9px;font-weight:800;padding:3px 8px;border-radius:4px;background:#1769FF14;color:#70B8FF;border:1px solid #1769FF25}
.gov-edu-block{background:var(--bg2);border:1px solid var(--border);border-left:3px solid #F59E0B;border-radius:0 7px 7px 0;padding:12px 14px}
.gov-edu-block-title{font-size:9px;font-weight:800;letter-spacing:.12em;color:#F59E0B;margin-bottom:8px}
.gov-edu-row{display:flex;gap:7px;align-items:flex-start;font-size:11px;color:var(--t2);margin-bottom:6px;line-height:1.6}
.gov-edu-row::before{content:"→";color:#F59E0B;font-weight:700;flex-shrink:0}
@keyframes govSlideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes govFadeIn{from{opacity:0}to{opacity:1}}

.gov-panel-trigger{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;transition:background .12s}
.gov-panel-trigger:hover{background:#1769FF08}
.gov-panel-ico{font-size:13px;flex-shrink:0}
.gov-panel-title{font-size:10px;font-weight:700;color:var(--t2);flex:1}
.gov-panel-chevron{font-size:9px;color:var(--t4);transition:transform .15s;flex-shrink:0}
.gov-panel-chevron.open{transform:rotate(90deg)}
.gov-panel-body{display:none;padding:0 12px 12px}
.gov-panel-body.open{display:block}
.gov-panel-sub{font-size:11px;color:var(--t3);margin-bottom:8px;line-height:1.6;padding-top:6px;border-top:1px solid var(--border)}
.gov-rule{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;font-size:11px}
.gov-rule-ico{flex-shrink:0;font-size:11px}
.gov-rule-text{color:var(--t2);line-height:1.55}

.gov-frameworks{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.gov-fw{font-size:9px;font-weight:800;padding:2px 7px;border-radius:3px;background:#1769FF14;color:#70B8FF;border:1px solid #1769FF25}
.cb-edu-section{background:var(--surface);border:1px solid var(--border);border-left:3px solid #F59E0B;border-radius:5px;padding:10px 12px;margin-top:8px}
.cb-edu-title{font-size:9px;font-weight:800;letter-spacing:.12em;color:#F59E0B;margin-bottom:6px}
.cb-edu-row{display:flex;gap:7px;align-items:flex-start;font-size:11px;color:var(--t2);margin-bottom:4px;line-height:1.55}

/* ══ PRODUCT SELECTOR ════════════════════════════════════════ */
.product-bar{display:flex;align-items:center;gap:8px;padding:7px 16px;background:#091826;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.product-bar-label{font-size:9px;font-weight:800;letter-spacing:.14em;color:var(--t4);white-space:nowrap;margin-right:2px}
.product-toggle{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--t4);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.product-toggle:hover{border-color:var(--border2);color:var(--t2)}
.product-toggle.active-epm{background:#10B98114;border-color:#10B98155;color:#10B981}
.product-toggle.active-trelica{background:#3A9EFF14;border-color:#3A9EFF55;color:#70B8FF}
.product-toggle.active-dt{background:#F59E0B14;border-color:#F59E0B55;color:#F59E0B}
.product-toggle .pt-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.product-separator{width:1px;height:16px;background:var(--border);margin:0 4px;flex-shrink:0}
.product-platform-badge{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:800;letter-spacing:.1em;border:1px solid #A78BFA44;background:#A78BFA08;color:#A78BFA;cursor:pointer;white-space:nowrap;transition:all .12s;margin-left:auto}
.product-platform-badge:hover{background:#A78BFA14;border-color:#A78BFA66}
/* Product badges on feature tiles */
.feat-product-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;border:1px solid;white-space:nowrap}
.feat-product-badge.epm{background:#10B98112;color:#10B981;border-color:#10B98133}
.feat-product-badge.trelica{background:#3A9EFF12;color:#70B8FF;border-color:#3A9EFF33}
.feat-product-badge.dt{background:#F59E0B12;color:#F59E0B;border-color:#F59E0B33}
/* Product-specific content sections */
.product-section{border-radius:8px;padding:14px 16px;margin-bottom:12px;border:1px solid}
.product-section.trelica{background:#3A9EFF08;border-color:#3A9EFF25}
.product-section.dt{background:#F59E0B08;border-color:#F59E0B25}
.product-section-hdr{font-size:9px;font-weight:800;letter-spacing:.13em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.product-section.trelica .product-section-hdr{color:#70B8FF}
.product-section.dt .product-section-hdr{color:#F59E0B}
.product-section-body{font-size:12px;color:var(--t2);line-height:1.7}
.product-section-row{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px;font-size:11px;color:var(--t2)}
.product-section-row::before{content:"→";font-weight:700;flex-shrink:0}
.product-section.trelica .product-section-row::before{color:#3A9EFF}
.product-section.dt .product-section-row::before{color:#F59E0B}
/* Locked product content */
.product-locked{background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:16px;text-align:center;margin-bottom:10px}
.product-locked-ico{font-size:20px;margin-bottom:6px}
.product-locked-t{font-size:12px;font-weight:700;color:var(--t3);margin-bottom:4px}
.product-locked-s{font-size:11px;color:var(--t4);line-height:1.6}
.product-locked-btn{margin-top:10px;padding:5px 14px;border-radius:5px;border:1px solid #A78BFA44;background:#A78BFA08;color:#A78BFA;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s}
.product-locked-btn:hover{background:#A78BFA18}
/* Platform progression card */
.platform-card{background:linear-gradient(135deg,var(--surface),var(--bg2));border:1px solid #A78BFA30;border-radius:10px;padding:18px 20px;margin:16px 28px}
.platform-card-title{font-size:10px;font-weight:800;letter-spacing:.14em;color:#A78BFA;margin-bottom:12px}
.platform-steps{display:flex;gap:0;align-items:stretch}
.platform-step{flex:1;padding:12px 14px;border-radius:7px;border:1px solid;position:relative}
.platform-step.active{opacity:1}
.platform-step.locked{opacity:.5;border-style:dashed;cursor:pointer}
.platform-step.locked:hover{opacity:.7}
.platform-step-label{font-size:9px;font-weight:800;letter-spacing:.1em;margin-bottom:4px}
.platform-step-name{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px}
.platform-step-desc{font-size:10px;color:var(--t3);line-height:1.55}
.platform-step.epm{background:#10B98108;border-color:#10B98130}.platform-step.epm .platform-step-label{color:#10B981}
.platform-step.trelica{background:#3A9EFF08;border-color:#3A9EFF30}.platform-step.trelica .platform-step-label{color:#3A9EFF}
.platform-step.dt{background:#F59E0B08;border-color:#F59E0B30}.platform-step.dt .platform-step-label{color:#F59E0B}
.platform-step.xam{background:#A78BFA08;border-color:#A78BFA30}.platform-step.xam .platform-step-label{color:#A78BFA}
.platform-arrow{display:flex;align-items:center;padding:0 8px;color:var(--t4);font-size:14px;flex-shrink:0}

/* ── BRIGHTER BODY TEXT ─────────────────────────────────────── */
.pt, .fp-intro, .sf-desc, .ind-hook, .breach-body, .prev-body,
.blt, .chk, .cb-dept-frame, .cb-feat-frame, .cb-sub,
.mb-t, .xc-desc, .sol-desc, .pc-q, .cb-dept-q,
.pain-t, .pt2, .blk-t.muted, .cb-action-btn,

}
/* Section labels / muted keep slightly dimmer but still readable */

  color:#7AAACA !important;
}
/* ══ BUILD-A-DOC STYLES ════════════════════════════════════ */
.bad-layout{display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:0}
.bad-toolbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.bad-project-select{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--t1);font-size:12px;font-weight:600;padding:6px 10px;outline:none;cursor:pointer;min-width:200px}
.bad-project-select:focus{border-color:#3A9EFF55}
.bad-btn{padding:6px 14px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--t3);transition:all .12s;white-space:nowrap}
.bad-btn:hover{border-color:var(--border2);color:var(--t2)}
.bad-btn.primary{background:var(--blue2);border-color:var(--blue2);color:#fff}
.bad-btn.primary:hover{background:#1050CC}
.bad-btn.danger{border-color:#EF444433;color:#EF4444}
.bad-btn.danger:hover{background:#EF444418}
.bad-empty-msg{font-size:12px;color:var(--t4);font-style:italic}
.bad-canvas-wrap{flex:1;overflow:auto;position:relative;background:var(--bg)}
.bad-canvas-wrap::-webkit-scrollbar{width:5px;height:5px}
.bad-canvas-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.bad-canvas{position:relative;min-width:1400px;min-height:900px;
  background-image:radial-gradient(circle,var(--border2) 1px,transparent 1px);
  background-size:28px 28px}
.bad-empty-canvas{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:600px;gap:12px;color:var(--t4)}
.bad-empty-canvas-ico{font-size:48px;opacity:.25}
.bad-empty-canvas-t{font-size:14px;font-weight:700;color:var(--t3)}
.bad-empty-canvas-s{font-size:12px;color:var(--t4);text-align:center;max-width:360px;line-height:1.65}
/* Widget */
.bad-widget{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 4px 20px #00000030;min-width:240px;min-height:120px;display:flex;flex-direction:column;transition:box-shadow .12s}
.bad-widget:hover{box-shadow:0 6px 28px #00000050}
.bad-widget.selected{border-color:#3A9EFF80;box-shadow:0 0 0 2px #3A9EFF30}
.bad-widget-hdr{padding:9px 12px;display:flex;align-items:center;gap:7px;cursor:grab;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;user-select:none}
.bad-widget-hdr:active{cursor:grabbing}
.bad-widget-stripe{width:3px;height:16px;border-radius:2px;flex-shrink:0}
.bad-widget-title{font-size:11px;font-weight:700;color:var(--t1);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bad-widget-btns{display:flex;gap:4px;flex-shrink:0}
.bad-wbtn{width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:var(--t3);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.bad-wbtn:hover{background:var(--bg);color:var(--t1)}
.bad-widget-body{flex:1;overflow:auto;padding:12px 13px;font-size:12px;color:var(--t2);line-height:1.65}
.bad-widget-body::-webkit-scrollbar{width:3px}
.bad-widget-body::-webkit-scrollbar-thumb{background:var(--border)}
.bad-widget-body[contenteditable="true"]{outline:none;border:1px dashed var(--border);border-radius:4px;padding:10px;min-height:40px}
.bad-widget-footer{display:flex;align-items:center;justify-content:flex-end;padding:4px 8px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.bad-resize{width:14px;height:14px;cursor:se-resize;opacity:.4;background:radial-gradient(circle at 100% 100%,var(--border2) 4px,transparent 5px);transition:opacity .1s}
.bad-resize:hover{opacity:1}
/* Add-to-BAD button (shown on content blocks) */
.add-bad-btn{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg2);color:var(--t3);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s,color .12s;z-index:10}
.add-bad-btn:hover{color:var(--blue);border-color:#3A9EFF55;background:#3A9EFF10}
.has-add-bad:hover .add-bad-btn,.add-bad-btn:focus{opacity:1}
.has-add-bad{position:relative}
/* BAD picker modal */
.bad-modal-bg{position:fixed;inset:0;background:#00000070;z-index:1000;display:flex;align-items:center;justify-content:center}
.bad-modal{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:20px 22px;width:340px;box-shadow:0 16px 48px #00000080}
.bad-modal-t{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:4px}
.bad-modal-s{font-size:11px;color:var(--t3);margin-bottom:14px}
.bad-modal-options{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.bad-modal-opt{padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--t2);font-size:12px;cursor:pointer;text-align:left;transition:all .1s}
.bad-modal-opt:hover{border-color:var(--border2);color:var(--t1)}
.bad-modal-opt.new{border-style:dashed;color:var(--t3)}
.bad-modal-opt.new:hover{border-color:#3A9EFF55;color:var(--blue)}
.bad-modal-actions{display:flex;gap:7px;justify-content:flex-end}
.bad-modal-cancel{padding:6px 14px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:11px;font-weight:600;cursor:pointer}
.bad-modal-cancel:hover{color:var(--t2)}
/* type-specific widget content */
.bw-stat{font-size:22px;font-weight:800;color:var(--t1);margin-bottom:3px}
.bw-stat-l{font-size:11px;color:var(--t3)}
.bw-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px}
.bw-s{background:var(--bg);border-radius:6px;padding:8px 10px;text-align:center;border:1px solid var(--border)}
.bw-feature-prob{font-size:11px;color:#FF8888;font-style:italic;margin-bottom:7px;line-height:1.5}
.bw-feature-sol{font-size:12px;color:var(--t2);line-height:1.65}
.bw-breach{background:#EF444408;border:1px solid #EF444430;border-radius:6px;padding:10px 12px}
.bw-breach-name{font-size:11px;font-weight:700;color:#FCA5A5;margin-bottom:5px}
.bw-breach-body{font-size:11px;color:var(--t3);line-height:1.6}
.bw-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.bw-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;background:#3A9EFF18;color:#70B8FF;border:1px solid #3A9EFF30}
.bw-pains{display:flex;flex-direction:column;gap:4px}
.bw-pain{display:flex;gap:6px;align-items:flex-start;font-size:11px;color:var(--t3)}
.bw-pain::before{content:"✗";color:#EF4444;font-size:10px;flex-shrink:0;margin-top:1px}
.bw-title-widget{font-size:20px;font-weight:800;color:var(--t1);outline:none;border:none;background:transparent;width:100%;font-family:inherit}
.bw-subtitle{font-size:13px;color:var(--t3);outline:none;border:none;background:transparent;width:100%;margin-top:4px;font-family:inherit}
/* Widget context label */
.bw-context{font-size:9px;font-weight:800;letter-spacing:.12em;color:var(--t4);margin-bottom:6px}

/* Print / PDF styles */
@media print{
  .topbar,.sidebar,.filter-bar,.bad-toolbar,.add-bad-btn,.bad-wbtn,.bad-resize,.bad-widget-footer{display:none!important}
  body{background:#fff!important;color:#1A2E47!important}
  .bad-canvas{background:#fff!important;min-width:unset!important;min-height:unset!important;background-image:none!important}
  .bad-widget{box-shadow:none!important;border:1px solid #CBD5E1!important;background:#fff!important;break-inside:avoid}
  .bad-widget-hdr{background:#F0F6FF!important;border-color:#CBD5E1!important}
  .bad-widget-title,.bw-stat{color:#1A2E47!important}
  .bad-widget-body{color:#334155!important}
}

<body>
<div class="topbar">
  <div class="logo">1<span>P</span> EPM HUB</div>
  <div class="tab active" id="tab-features" onclick="switchTab('features')">📖 Features</div>
  <div class="tab" id="tab-intel" onclick="switchTab('intel')">🌍 Intel</div>
  <div class="tab" id="tab-compete" onclick="switchTab('compete')">⚔️ Compete</div>
  <div class="tab" id="tab-roadmap" onclick="switchTab('roadmap')">🗺️ Roadmap</div>
  <div class="tab" id="tab-build" onclick="switchTab('build')">✨ Build</div>
  <div class="tab" id="tab-platform" onclick="switchTab('platform')">◆ Platform</div>
  <div class="topbar-right">
    <div class="sw"><span class="si">🔍</span><input type="text" id="srch-input" placeholder="Search..." oninput="doSearch(this.value)" style="transition:background .15s"/></div>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="detail" id="detail"><div class="empty">← Select an item</div></div>
</div>
<script>
let curTab='features',curFid=null,curIid=null,curFilter='all',srch='';

// ─── FEATURE FILTER BAR HTML ──────────────────────────────────
function filterBarHTML(active){
  const counts={all:FEATURES.length,admin:FEATURES.filter(f=>f.s==='admin').length,enduser:FEATURES.filter(f=>f.s==='enduser').length,developer:FEATURES.filter(f=>f.s==='developer').length};
  return`<div class="filter-bar">
    <button class="flt${active==='all'?' active-all':''}" onclick="showTiles('all')">⊞ All Features<span class="flt-count">${counts.all}</span></button>
    <span class="flt-divider"></span>
    <button class="flt${active==='admin'?' active-admin':''}" onclick="showTiles('admin')">🛡 Admin Controls<span class="flt-count">${counts.admin}</span></button>
    <button class="flt${active==='enduser'?' active-enduser':''}" onclick="showTiles('enduser')">👤 End-User Tools<span class="flt-count">${counts.enduser}</span></button>
    <button class="flt${active==='developer'?' active-developer':''}" onclick="showTiles('developer')">⚙️ Developer Power<span class="flt-count">${counts.developer}</span></button>
  </div>`;
}

// ─── TILE GRID ────────────────────────────────────────────────
const SEC_COLOR={admin:'#1769FF',enduser:'#00C4BE',developer:'#A78BFA'};
const SEC_LABEL={admin:'🛡 ADMIN CONTROLS',enduser:'👤 END-USER TOOLS',developer:'⚙️ DEVELOPER POWER'};
const BADGE_LABELS={unique:'UNIQUE',new:'NEW','dev-essential':'DEV ESSENTIAL',enterprise:'ENTERPRISE',superpower:'SUPERPOWER'};

function tileHTML(f){
  const col=SEC_COLOR[f.s];
  const badge=f.badge?`<span class="tile-badge ${f.badge}">${BADGE_LABELS[f.badge]||f.badge}</span>`:'';
  // Short summary: first sentence of intro, max 100 chars
  const sum=f.intro.replace(/\n/g,' ').split(/\.\s/)[0].substring(0,110)+(f.intro.length>110?'…':'');
  // Problem: first ~80 chars
  const prob=f.prob.substring(0,90)+(f.prob.length>90?'…':'');
  const wf = makeFeatureWidget(f.id);
  const badBtn = wf ? `<button class="add-bad-btn" title="Add to Build a Doc" onclick="event.stopPropagation();ensureBADProject();BAD.addWidget(makeFeatureWidget('${f.id}'));showBADAddedToast(BAD.getCurrentProject().name)">📌</button>` : '';
  return`<div class="tile has-add-bad" onclick="selectFeature('${f.id}')">
    ${badBtn}
    <span class="tile-sec-stripe" style="background:${col}"></span>
    <div class="tile-top">
      <span class="tile-name">${f.n}</span>
      ${badge}
    </div>
    <div class="tile-prob">${prob}</div>
    <div class="tile-sum">${sum}</div>
    <div style="display:flex;align-items:center;margin-top:6px">
      <span class="tile-arrow">View full page →</span>
      <span class="tile-pg">${f.p}</span>
    </div>
  </div>`;
}

function showTiles(filter){
  curFilter=filter;
  curFid=null;
  buildFeatureSidebar();
  const sections=filter==='all'
    ?[{k:'admin'},{k:'enduser'},{k:'developer'}]
    :[{k:filter}];
  let html=filterBarHTML(filter)+'<div class="tile-wrap">';
  sections.forEach(({k})=>{
    const feats=FEATURES.filter(f=>f.s===k&&(!srch||f.n.toLowerCase().includes(srch)));
    if(!feats.length)return;
    if(filter==='all') html+=`<div class="tile-section-hdr" style="color:${SEC_COLOR[k]}">${SEC_LABEL[k]}</div>`;
    html+=`<div class="tile-grid">${feats.map(tileHTML).join('')}</div>`;
  });
  html+='</div>';
  document.getElementById('detail').innerHTML=html;

  document.getElementById('detail').scrollTop=0;
}

// ─── INDUSTRY RENDER ─────────────────────────────────────────
function renderIndustry(iid){
  const I=INDUSTRIES[iid];if(!I)return;

// ─── SIDEBARS ─────────────────────────────────────────────────
function buildFeatureSidebar(){
  const sb=document.getElementById('sidebar');
  // Save tab bar if present (set by showFeaturesHub before calling us)
  const tabBar = sb.querySelector('.feat-product-tabbar');
  sb.innerHTML='';
  if(tabBar) sb.appendChild(tabBar);
  [{k:'admin',l:'🛡 ADMIN CONTROLS',cl:'na'},{k:'enduser',l:'👤 END-USER TOOLS',cl:'ne'},{k:'developer',l:'⚙️ DEVELOPER POWER',cl:'nd'}].forEach(({k,l,cl})=>{
    const h=document.createElement('div');h.className=`sec-hdr ${k}`;h.textContent=l;sb.appendChild(h);
    FEATURES.filter(f=>f.s===k&&(!srch||f.n.toLowerCase().includes(srch))).forEach(f=>{
      const el=document.createElement('div');el.className=`ni ${cl}${curFid===f.id?' active':''}`;
      el.id=`nf-${f.id}`;
      const tag=f.badge==='unique'?'<span class="ntag unique">UNIQUE</span>':f.badge==='new'?'<span class="ntag new">NEW</span>':'';
      el.innerHTML=`<span class="nn">${f.n}</span>${tag}<span class="npg">${f.p}</span>`;
      el.onclick=()=>selectFeature(f.id);sb.appendChild(el);
    });
  });
}

function buildIndustrySidebar(){
  const sb=document.getElementById('sidebar');sb.innerHTML='';
  const h=document.createElement('div');h.className='sec-hdr industry';h.textContent='SELECT INDUSTRY';sb.appendChild(h);
  Object.entries(INDUSTRIES).filter(([iid,I])=>!srch||I.name.toLowerCase().includes(srch)).forEach(([iid,I])=>{
    const el=document.createElement('div');el.className=`ni ni2${curIid===iid?' active':''}`;
    el.innerHTML=`<span style="font-size:16px">${I.emoji}</span><span class="nn">${I.name}${I._custom?'<span class="custom-badge">CUSTOM</span>':''}</span>`;
    el.onclick=()=>showIndustry(iid);sb.appendChild(el);
  });
}

// ─── TAB SWITCHING ─────────────────────────────────────────────
function switchTab(tab){
  const valid=['features','intel','compete','roadmap','build','platform',
    // legacy aliases — keep working if anything references them
    'industry','departments','customer-builder','bad','trelica','dt'];
  if(!valid.includes(tab))return;
  curTab=tab;
  document.querySelectorAll('.tab:not(.soon)').forEach(t=>t.classList.remove('active'));
  const tabEl=document.getElementById('tab-'+tab);if(tabEl)tabEl.classList.add('active');
  const sb=document.getElementById('sidebar');

  // ── New 6-tab routing ──
  if(tab==='features'){sb.style.display='';showFeaturesHub();return;}
  if(tab==='intel'){sb.style.display='';showIntelHub();return;}
  if(tab==='compete'){showCompeteUnified();return;}
  if(tab==='roadmap'){sb.style.display='none';showRoadmap();return;}
  if(tab==='build'){sb.style.display='none';showBuild();return;}
  if(tab==='platform'){sb.style.display='none';showPlatformView();return;}

  // ── Legacy aliases (backward compat) ──
  if(tab==='industry'){switchTab('intel');return;}
  if(tab==='departments'){switchTab('intel');return;}
  if(tab==='customer-builder'){sb.style.display='none';showBuild('cb');return;}
  if(tab==='bad'){sb.style.display='none';showBuild('bad');return;}
  if(tab==='trelica'){switchTab('features');return;}
  if(tab==='dt'){switchTab('features');return;}
}

function selectFeature(fid){
  curFid=fid;
  // keep filter in sync: if feature is in a specific section, reflect that
  const f=FEATURES.find(x=>x.id===fid);
  if(f&&curFilter!=='all'&&curFilter!==f.s) curFilter=f.s;
  buildFeatureSidebar();renderFeature(fid);
}
function showIndustry(iid){
  curIid=iid;buildIndustrySidebar();renderIndustry(iid);
}
function doSearch(v){
  srch=v.toLowerCase().trim();
  if(curTab==='features'){buildFeatureSidebar();if(!curFid)showTiles(curFilter);}
  if(curTab==='industry')buildIndustrySidebar();
  if(curTab==='departments')buildDeptSidebar();
  // Show result count in search box placeholder area
  const input = document.getElementById('srch-input');
  if(input){
    if(srch){
      const count = document.querySelectorAll('#sidebar .ni').length;
      input.style.background = count > 0 ? '#1769FF15' : '#EF444415';
      input.title = count > 0 ? `${count} result${count!==1?'s':''} found` : 'No results';
    } else {
      input.style.background = '';
      input.title = '';
    }
  }
}

'ai-ml':{
  emoji:'🤖',name:'AI & Machine Learning',color:'#A855F7',
  hook:'AI has created the most dangerous new credential attack surface in enterprise history — and most organizations have no governance model for it whatsoever. Every AI tool your team uses requires an API key. Every AI agent you build needs credentials to function. Every developer using GitHub Copilot, Cursor, or Claude has an access token that IT doesn\'t know about. The "shadow AI" problem is the shadow IT problem, but the credentials are worth more and the blast radius is larger.',
  credential_inv:'OpenAI / Azure OpenAI API keys (GPT-4, o1, o3 access) · Anthropic API keys (Claude) · Google Gemini API credentials · Cohere, Mistral, Hugging Face access tokens · GitHub Copilot / Cursor / Codeium tokens · AI image generation API keys (Midjourney, Stability AI, DALL-E) · Vector database credentials (Pinecone, Weaviate, Qdrant, Chroma) · Model serving infrastructure (AWS SageMaker, Azure ML, GCP Vertex AI) · Fine-tuning dataset storage access (S3 buckets, GCS, Azure Blob) · AI agent tool credentials (the CRM, database, email, and Slack access your AI agents use to take actions) · LangChain / LlamaIndex framework configuration secrets · Embedding model API keys',
  pains:['AI API keys (OpenAI, Anthropic, Cohere) hardcoded in notebooks, committed to git repos, or pasted into Slack — each one capable of running up six-figure API bills or accessing sensitive model outputs if compromised','No governance model for AI agent credentials — when your AI agent needs to call Salesforce, query your database, or send an email, where do those credentials live? Most teams answer "in the code" or "in an env file"','Shadow AI explosion: engineers, marketers, and analysts signing up for GPT-4, Midjourney, and Perplexity with company email addresses, creating unmanaged credential accounts outside IT visibility — and outside the Domain Breach Report unless 1Password is watching','AI tool sprawl: the average enterprise now uses 40+ AI tools, each requiring its own API key or OAuth token, none of which are centrally governed','Prompt injection risk: if an AI agent processes documents or emails that contain credential-like strings, it could exfiltrate them — 1Password means real credentials are never in plaintext contexts that AI models could process or leak','EU AI Act and emerging AI governance frameworks are beginning to require auditability of AI system access controls — "who authorized this AI to have these credentials" is a compliance question that is coming'],

  hook:'The shared workstation problem is one of the most widespread and least-solved credential challenges in enterprise environments. Healthcare nursing stations, retail point-of-sale terminals, lab instrument computers, manufacturing floor HMIs, school computer labs — all have the same fundamental problem: multiple people, one computer, one shared login. 1Password doesn\'t eliminate the shared computer, but it transforms how credentials are managed on and around it.',
  credential_inv:'Shared workstation OS logins (Windows local accounts, domain accounts used across shifts) · Application credentials accessed from shared terminals (LIMS, EHR, POS, SCADA HMI) · Instrument-specific software logins on shared lab workstations · Shared kiosk and self-service terminal management credentials · Break room computer credentials for shift workers without personal devices · Manufacturing floor terminal access to ERP and production management systems · School computer lab credentials for shared student workstations · Retail back-office shared computers with multiple employees per shift',
  pains:['The fundamental tension: shared workstations exist because individual accounts create friction at the point of work — nurses can\'t be logging in and out of EHR systems between every patient interaction, retail associates can\'t manage separate POS sessions per transaction. But shared credentials create compliance liability and eliminate audit trail.','No individual attribution on actions taken from shared workstations — when a transaction is voided, a record is modified, or an access event occurs, you can\'t determine who was at the keyboard','21 CFR Part 11, HIPAA, and PCI-DSS all require individual attribution on access to regulated data — which shared workstation credentials fundamentally cannot provide in their current form','Instrument software on shared lab computers with a single service account login — everyone uses the same account, and the audit log shows the account name, not the researcher','Password rotation on shared workstation accounts is operationally painful — any change requires updating every person who uses that workstation, which means it rarely happens','The "I was last logged in" problem: shift workers arriving at a shared workstation where the previous shift never logged out — and taking actions under the previous person\'s session'],
  features:[
    {fid:'onboarding',tag:'INDIVIDUAL CONTEXT',tc:'#6366F1',bc:'#6366F118',why:'The practical solution for shared workstations: each user gets their own 1Password account. QR Code Sign-In lets them quickly authenticate to their personal 1Password vault on any shared device. Shared application credentials live in a team vault accessible to all authorized users — but the 1Password access event shows which individual retrieved the credential. Individual attribution, shared access model.'},
    {fid:'cred-mgmt',tag:'SHARED VAULT',tc:'#4D8EFF',bc:'#1769FF18',why:'Shared workstation application credentials (the LIMS login, the POS system password, the EHR shared service account) live in a team vault that all authorized shift workers can access — but each individual retrieves them through their own 1Password account. The shared credential, but individual access events.'},
    {fid:'auth-policies',tag:'MFA ON SHARED',tc:'#10B981',bc:'#10B98118',why:'MFA enforcement on the 1Password account each user authenticates with — even on a shared device. The authentication event is individual even when the downstream credential is shared.'},
    {fid:'events-api',tag:'SHIFT AUDIT',tc:'#F59E0B',bc:'#F59E0B18',why:'Events API logs show which 1Password user account retrieved the shared workstation credential and when — creating the individual attribution layer that shared OS logins cannot provide. HIPAA and 21 CFR Part 11 audit trail built on top of shared infrastructure.'},
    {fid:'item-expiry',tag:'CREDENTIAL ROTATION',tc:'#EF4444',bc:'#EF444418',why:'Shared workstation credentials with set rotation schedules — Item Expiry alerts the vault admin before the rotation window. When credentials are updated in the vault, every user who retrieves the credential from the vault gets the current version automatically. No manual distribution.'},
    {fid:'location-items',tag:'STATION CONTEXT',tc:'#A78BFA',bc:'#7C3AED18',why:'Location-based items surface the right credentials when a user with 1Password on mobile approaches a specific workstation — the instrument credentials for Bench 3, the POS credentials for Register 7. Reduces lookup time on the floor.'},
  ],
  personas:[
    {role:'IT Director / Operations Technology',q:'"Your shared workstations — the nursing stations, the lab benches, the retail POS terminals — right now every action taken from those is attributed to the shared account, not the individual. If a compliance auditor asked you who accessed patient records on Ward 4 between 2am and 6am last Tuesday, what do you show them?"'},
    {role:'Compliance / Quality Assurance',q:'"For your 21 CFR Part 11 or HIPAA audit, the auditor will ask for individual attribution on regulated data access. Your shared workstation accounts can\'t provide that. How are you currently addressing that gap?"'},
    {role:'Lab Manager / Research IT',q:'"Your instrument workstations — the HPLC, the sequencer, the mass spec — they all have shared service account logins. When the FDA inspects, what does your electronic records attribution look like?"'},
    {role:'CISO',q:'"The shared workstation problem is often where compliance gaps are widest. What\'s your current plan to achieve individual attribution on regulated system access from terminals that physically can\'t be dedicated to single users?"'},
  ],
  vault_structure:'🖥️ Shared Station Credentials Vault (all authorized shift workers have access, individual retrieval logged) · 👤 Individual User Vaults (personal credentials, QR Sign-In context) · 🔑 Admin / Override Credentials (supervisors only) · 📋 Instrument-Specific Vaults (per instrument, per lab) · 🔄 Rotation-Tracked Credentials (Item Expiry set)',
  csm_insight:'The shared workstation conversation is one of the most nuanced in the 1Password book — we don\'t fully solve the shared workstation problem, but we meaningfully improve it. Be honest about what 1Password does and doesn\'t do here: we don\'t replace OS-level authentication or eliminate shared accounts at the system level. What we provide is individual attribution at the credential retrieval layer — each person retrieving the shared credential through their own 1Password account creates an individual access event. For compliance-sensitive environments, that audit layer is genuinely valuable even if it\'s not a complete solution. Position it as an improvement, not a transformation. Customers in research labs and healthcare who have this problem are often large, strategic accounts — the relationship value is high even when the use case is imperfect.',
  stat1:'Individual audit',stat1l:'Attribution created at 1Password retrieval layer even for shared downstream credentials',
  stat2:'21 CFR Part 11',stat2l:'Compliance audit trail improvement — each retrieval event is individually attributed',
  stat3:'Zero',stat3l:'Password distribution needed when shared credential rotates — vault update reaches all authorized users'},

'operations':{
  emoji:'🏗️',name:'Operations & Facilities',color:'#84CC16',
  hook:'Operations teams manage the credentials nobody thinks about until they matter — facility access codes, building management system logins, vendor access for maintenance, HVAC and utilities management portals. These credentials are often the entry point attackers use when they can\'t get through the front door. The Oldsmar water treatment attack started with a facilities-adjacent remote access credential.',
  credential_inv:'Building management system credentials (BMS, BAS — HVAC, lighting, access control) · Facility security system admin access (CCTV, badge access, alarm systems) · Vendor and contractor access credentials for facility maintenance · Shipping and receiving platform logins · Fleet management system credentials · Facilities procurement and vendor portal access · Physical security system management credentials · Operational equipment monitoring platform logins · Property management portal credentials · Utility provider account access (electricity, gas, water monitoring platforms)',
  pains:['Facility vendor and contractor credentials never formally managed — HVAC technician has VPN access from a job two years ago that was never revoked. This is the Colonial Pipeline and Oldsmar pattern repeated in every facilities department.','Building management system credentials shared with multiple facilities managers and vendors with no audit trail — when a door access record is modified or a thermostat is changed, attribution is impossible','Physical security system admin credentials (CCTV, badge access) in a spreadsheet that\'s been copied to every facilities manager who\'s joined the team in five years','High contractor volume in facilities — HVAC, electrical, plumbing, cleaning services — each with some level of system access that never gets formally revoked','No process for credential rotation when a facilities vendor relationship ends — the vendor\'s credentials to building management systems outlast the contract by months or years','Facilities credentials are often treated as "low risk" — which is why they\'re the entry point attackers exploit. An attacker with BMS access can manipulate physical security systems, disable fire suppression, or create physical access.'],
  features:[
    {fid:'guest-accounts',tag:'VENDOR ACCESS',tc:'#84CC16',bc:'#84CC1618',why:'Facility vendor and contractor access scoped to specific system credentials with automatic expiry. HVAC technician gets access to the BMS during the maintenance window, credential self-destructs when the work order closes. No persistent contractor access outlasting the engagement.'},
    {fid:'item-expiry',tag:'ACCESS EXPIRY',tc:'#4D8EFF',bc:'#1769FF18',why:'Every vendor and contractor credential in a facilities vault has an expiry date matching the service contract. When the contract ends, 1Password alerts before expiry and access self-destructs after — no manual revocation required.'},
    {fid:'location-items',tag:'SITE CREDENTIALS',tc:'#F59E0B',bc:'#F59E0B18',why:'Location-based credentials surface automatically when a facilities manager or field tech arrives at a specific building or site. The BMS credentials for Building C appear when the technician is on-site — not across all sites.'},
    {fid:'cred-mgmt',tag:'FACILITY VAULT',tc:'#10B981',bc:'#10B98118',why:'Building management credentials, vendor access codes, facility security system logins, and utility portal access organized in structured vaults by site and system type — replacing the shared spreadsheet and the sticky note on the control room wall.'},
    {fid:'secure-sharing',tag:'VENDOR SHARE',tc:'#A78BFA',bc:'#7C3AED18',why:'Share specific facility system credentials with vendors via time-limited encrypted links for maintenance windows. Never the master access, never via email, never persistent.'},
    {fid:'events-api',tag:'FACILITY AUDIT',tc:'#EF4444',bc:'#EF444418',why:'Every facility system credential access logged and attributed. When a physical security event occurs, the audit trail for who accessed which facility system credential is already built.'},
  ],
  personas:[
    {role:'Director of Facilities / VP Operations',q:'"Your HVAC vendor, your elevator service company, your access control maintenance team — how many of them have active remote access credentials to your building management systems right now from engagements that have already ended?"'},
    {role:'Physical Security Manager',q:'"Your CCTV and badge access system admin credentials — where do they live, who has access to them, and what\'s your audit trail if someone makes an unauthorized change to door access permissions?"'},
    {role:'IT / OT Security',q:'"Facilities credentials are frequently the entry point attackers use because they\'re the least governed. What\'s your current credential governance model for building management and physical security systems?"'},
    {role:'COO / VP Operations',q:'"The Oldsmar water treatment attack used a shared TeamViewer credential with no MFA to access industrial control systems. Do your operational technology systems have individually attributed credentials with MFA enforcement?"'},
  ],
  vault_structure:'🏗️ Building Management Systems (facilities management team) · 🔒 Physical Security Systems (security team, access-controlled) · 🔧 Vendor & Contractor Access (Guest Accounts, contract-expiry) · 🌍 Site-Specific Credentials (organized by location, location-items enabled) · 📋 Facilities Procurement & Vendor Portals',
  csm_insight:'Facilities is a department that\'s rarely sold to directly — it usually comes up in the context of an IT or OT security assessment that surfaces the vendor access problem. The entry point is almost always the contractor access story: ask how many vendor remote access credentials are currently active for engagements that have ended. The answer is almost always "I don\'t know" — and that becomes the conversation. The Oldsmar and Colonial Pipeline analogies land hard in any operational context.',
  stat1:'#1',stat1l:'Unmanaged vendor remote access — the most common entry point in OT/facilities attacks',
  stat2:'Zero',stat2l:'Vendor credential access persisting past contract end with Guest Accounts + Item Expiry',
  stat3:'Location',stat3l:'Based items surface site-specific credentials automatically — no manual lookup on the floor'},

'product-design':{

  hook:'Product and design teams are sitting on two distinct credential risks: the design tool sprawl problem (Figma, Adobe CC, InVision, Miro, Loom — all shared, all unmanaged) and the user research data problem (research repositories containing raw user interviews, behavioral data, and competitive intelligence that\'s accessed through shared credentials with no governance). Neither is typically on IT\'s radar.',
  credential_inv:'Design platform credentials (Figma, Adobe Creative Cloud, Sketch, InVision, Framer) · Prototyping and collaboration tool access (Miro, Notion, Confluence, Loom) · User research repository access (Dovetail, UserTesting, Maze, Hotjar, FullStory) · Product analytics platform credentials (Mixpanel, Amplitude, Heap, Pendo) · Beta and feature flag management systems (LaunchDarkly, Optimizely) · Staging and preview environment credentials for design review · External design agency and contractor access to brand assets · Stock photo and asset library accounts (Getty, Shutterstock, Noun Project) · Internal design system documentation platform access',
  pains:['Design tool subscriptions shared across team via seat-sharing workarounds — one Adobe CC account credentials shared between three designers because individual seats are expensive. Violation of license terms and a credential security gap simultaneously.','User research repository access shared across product, design, and research teams with no individual attribution on who accessed which participant data — a GDPR and participant confidentiality liability','Design agency contractor access to Figma files and brand asset libraries persists indefinitely after the engagement ends — with the full creative archive accessible to a relationship that no longer exists','Product analytics platform credentials (Mixpanel, Amplitude) give access to behavioral data for potentially millions of users — shared among product managers and analysts with no access controls or audit trail','Staging environment credentials for design review passed around in Slack messages — developers, designers, and PMs all sharing the same staging login with no governance','Feature flag management credentials (LaunchDarkly) with production access shared across the product team — one compromised credential can change which features are visible to which users in production'],
  features:[

    {fid:'guest-accounts',tag:'CONTRACTOR ACCESS',tc:'#4D8EFF',bc:'#1769FF18',why:'Design contractor access scoped to specific project vaults. Agency gets what they need for the engagement, access self-destructs at project wrap. No creative archive access outlasting the relationship.'},
    {fid:'cred-mgmt',tag:'TOOL VAULT',tc:'#10B981',bc:'#10B98118',why:'All design tool credentials, research platform access, and analytics logins organized in vaults by tool category and access tier. Shared credentials accessible to authorized team members, individual credentials in personal vaults.'},

    {fid:'app-policies',tag:'DATA ACCESS',tc:'#A78BFA',bc:'#7C3AED18',why:'User research repository and product analytics access restricted by vault policy. Only the researchers and PMs with a legitimate need-to-know can retrieve participant data credentials.'},
    {fid:'scim',tag:'DESIGNER LIFECYCLE',tc:'#00C4BE',bc:'#00C4BE18',why:'Design team members provisioned with the right tool access on day one and fully offboarded when they leave — the Figma, Adobe, and research platform access that\'s currently left active for months after a designer\'s departure closes the moment HR marks the departure.'},
  ],
  personas:[

    {role:'Head of Product / CPO',q:'"Your product analytics credentials give access to behavioral data for potentially millions of users. How many people currently have access to those credentials, and is that access individually attributed?"'},
    {role:'Research Lead',q:'"Your user research repository — participant interview data, behavioral recordings, sensitive qualitative data — is that accessed through a shared credential or individual accounts? And what\'s your GDPR audit trail?"'},
    {role:'IT / Productivity Tools Manager',q:'"Design is one of the most SaaS-heavy departments in the company and one of the least credential-governed. How many design tool accounts are shared in violation of license terms, and what\'s your offboarding process for designers?"'},
  ],
  vault_structure:'🎨 Design Tools (full design team) · 🔬 User Research Platforms (research team + access-restricted) · 📊 Product Analytics (PMs + analysts, scoped) · 🎭 Staging & Preview Environments (sprint-scoped, Item Expiry) · 🤝 Agency & Contractor Access (Guest Accounts, project-scoped) · 📦 Brand Asset Libraries',
  csm_insight:'Product and design is rarely a primary buyer but is a high-value expansion conversation once 1Password is in the organization. The entry point is the design agency access story — ask whether contractor Figma access was ever revoked — or the product analytics data sensitivity angle. GDPR is the compliance hook for user research repository access. Staging environment credential chaos is universal in product teams and resonates immediately.',
  stat1:'GDPR',stat1l:'Participant data in user research repositories requires individual attribution — shared credentials create liability',
  stat2:'Zero',stat2l:'Agency access to creative archives persisting past contract end with Guest Accounts + Item Expiry',

'data-analytics':{
  emoji:'📊',name:'Data & Analytics',color:'#06B6D4',
  hook:'Data and analytics teams hold the credentials to every source of organizational truth — databases, data warehouses, BI tools, analytics platforms. A compromised data team credential isn\'t just a security incident; it\'s potential data exfiltration of everything your company knows about its customers, its operations, and its competitive position. And most data teams are running on a credential model that was designed for a single data engineer, not a 30-person data org.',
  credential_inv:'Data warehouse credentials (Snowflake, BigQuery, Redshift, Databricks) · Database connection strings (PostgreSQL, MySQL, MongoDB, DynamoDB) · BI platform credentials (Tableau, Looker, Power BI, Metabase) · Data pipeline orchestration credentials (Airflow, dbt, Prefect, Dagster) · Data lake and object storage access (S3, GCS, Azure Data Lake) · Third-party data provider API keys (Clearbit, ZoomInfo, Bloomberg, Refinitiv) · Customer data platform access (Segment, Rudderstack, mParticle) · ETL tool credentials (Fivetran, Stitch, Airbyte) · Data catalog access (Alation, Atlan, Collibra) · Analytics product API keys (Amplitude, Mixpanel, Heap)',
  pains:['Data warehouse credentials shared across the data team in a shared .env file or team Slack channel — a single compromised credential gives full read access to every table in the warehouse, including customer PII and financial records','Database connection strings hardcoded in dbt models, Airflow DAGs, and data pipeline code committed to git repositories — where they\'re visible to every engineer with repo access and potentially to external contributors','No individual attribution on data warehouse queries — when a data breach investigation asks which analyst ran the query that exfiltrated customer records, the shared service account log is the only evidence','Third-party data enrichment API keys (Clearbit, ZoomInfo) with no rotation policy — often the same key used since the contract was signed, never rotated even after team member departures','Customer data platform credentials (Segment, RudderStack) give access to the raw event stream for every customer interaction — shared across data engineers and product analysts with no access tier separation','dbt service account with production data warehouse write access running under a developer\'s personal credentials — if that developer leaves, the pipeline breaks until someone manually finds and updates all the places the credential was used'],
  features:[
    {fid:'cli',tag:'PIPELINE SECRETS',tc:'#06B6D4',bc:'#06B6D418',why:'Data warehouse credentials, database connection strings, and pipeline API keys injected into dbt, Airflow, and ETL tools at runtime via op:// references. No hardcoded credentials in DAGs, models, or pipeline configs that end up in git history.'},
    {fid:'secrets-automation',tag:'ORCHESTRATION',tc:'#4D8EFF',bc:'#1769FF18',why:'Airflow, dbt Cloud, Prefect, and Dagster all support secret injection via 1Password Secrets Automation. Rotate the Snowflake service account in 1Password — every pipeline consumer gets the updated credential on next run.'},
    {fid:'service-accounts',tag:'PIPELINE IDS',tc:'#10B981',bc:'#10B98118',why:'Named service accounts for every automated data pipeline. The Snowflake credential running your nightly dbt job is a named machine identity — not a developer\'s personal account that breaks when they leave.'},
    {fid:'events-api',tag:'QUERY AUDIT',tc:'#F59E0B',bc:'#F59E0B18',why:'Individual attribution on every data warehouse credential retrieval. When a breach investigation asks who queried the customer PII table, the 1Password Events API log shows which analyst retrieved the credential and when — even if the warehouse itself shows a shared service account.'},
    {fid:'app-policies',tag:'DATA TIER',tc:'#A78BFA',bc:'#7C3AED18',why:'Vault segmentation separates production database credentials (senior data engineers + DevOps) from development credentials (full data team). An analyst can\'t reach production connection strings — policy enforced, not trust dependent.'},
    {fid:'scim',tag:'DATA TEAM LIFECYCLE',tc:'#EF4444',bc:'#EF444418',why:'Data engineer departs → Snowflake, BigQuery, and pipeline credentials revoked within minutes. No data exfiltration window between last day and credential revocation. No manually-updated service account passwords.'},
  ],
  personas:[
    {role:'Head of Data / VP Data Engineering',q:'"Your Snowflake or BigQuery service account credentials — are they in a named, governed location with rotation tracking, or are they in a .env file that\'s been copy-pasted to every new data engineer who\'s joined the team in the last three years?"'},
    {role:'Data Engineering Lead',q:'"Your dbt and Airflow configurations — if I ran a credential scanner across your data pipeline code right now, how many database connection strings would I find in plaintext in git history?"'},
    {role:'CISO',q:'"Your data warehouse holds customer PII, financial records, and competitive intelligence. The credential to that warehouse — is it governed the same way as your banking credentials, or is it in a shared Slack channel because \'data team only\' felt secure enough?"'},
    {role:'Analytics Engineering Lead',q:'"When a data engineer leaves, what\'s the current process to rotate all the database credentials they had access to — and how long does that rotation actually take today?"'},

  vault_structure:'🗄️ Production Data Warehouse (senior data engineers + DevOps) · 💻 Development & Staging Data (full data team) · 🔑 Pipeline Service Accounts (machine identities, no human users) · 📊 BI & Analytics Platform Credentials · 🔌 Third-Party Data Provider APIs · 🌊 Event Stream & CDP Access (access-restricted)',
  csm_insight:'Data teams are an increasingly strategic conversation because the credentials they manage — data warehouse access, database connection strings, pipeline service accounts — are as high-value as any in the organization. The entry point is almost always the "is it in a .env file?" question. Lead with the CLI demo if talking to a technical data engineer. Lead with the breach attribution story if talking to a CISO or data leader. The pipeline service account story (named machine identities for every dbt run) is the most technically resonant with data engineers who\'ve been burned by a pipeline breaking when a developer left.',
  stat1:'Production',stat1l:'Database credentials in data pipeline code — found in git history of 73% of data repos scanned (GitGuardian)',
